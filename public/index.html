<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEXUS — голосовой чат</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: radial-gradient(circle at 20% 30%, #0a0c14, #020308);
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    color: #f0f3fa;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #1a1d27; border-radius: 10px; }
::-webkit-scrollbar-thumb { background: #5865f2; border-radius: 10px; }

.app {
    display: flex;
    height: 100vh;
    backdrop-filter: blur(2px);
}

/* стеклянный сайдбар */
.sidebar {
    width: 270px;
    background: rgba(18, 22, 30, 0.8);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255,255,255,0.06);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.logo {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #8f9eff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 8px;
}

.room {
    padding: 12px 16px;
    margin: 4px 0;
    border-radius: 14px;
    cursor: pointer;
    transition: 0.2s;
    background: rgba(255,255,255,0.02);
    border: 1px solid transparent;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 500;
}

.room:hover {
    background: rgba(88,101,242,0.2);
    border-color: rgba(88,101,242,0.5);
    transform: translateX(4px);
}

.stats {
    margin-top: auto;
    background: rgba(0,0,0,0.3);
    border-radius: 20px;
    padding: 16px;
    font-size: 13px;
}

/* основной чат */
.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: rgba(8, 10, 18, 0.4);
}

.messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.message-bubble {
    max-width: 80%;
    animation: fadeUp 0.2s ease;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px);}
    to { opacity: 1; transform: translateY(0);}
}

.message-name {
    font-size: 12px;
    font-weight: 600;
    color: #a6a9c2;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.message-text {
    background: rgba(46, 51, 64, 0.7);
    backdrop-filter: blur(8px);
    padding: 10px 18px;
    border-radius: 24px;
    border-top-left-radius: 6px;
    font-size: 14px;
    width: fit-content;
    border: 0.5px solid rgba(255,255,255,0.05);
}

.voice-bubble {
    background: rgba(46, 51, 64, 0.6);
    backdrop-filter: blur(12px);
    padding: 12px 20px;
    border-radius: 34px;
    display: flex;
    align-items: center;
    gap: 14px;
    width: fit-content;
}

audio {
    border-radius: 40px;
    height: 36px;
    background: #10121c;
}

/* панель ввода */
.input-panel {
    padding: 20px 28px 28px;
    background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
}

.input-wrapper {
    display: flex;
    gap: 12px;
    align-items: center;
    background: rgba(30, 34, 46, 0.9);
    backdrop-filter: blur(16px);
    border-radius: 60px;
    padding: 6px 6px 6px 20px;
    border: 1px solid rgba(255,255,255,0.1);
}

.input-wrapper input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 14px 0;
    color: white;
    font-size: 15px;
    outline: none;
}

.btn-icon {
    background: rgba(255,255,255,0.05);
    border: none;
    color: white;
    font-size: 20px;
    width: 44px;
    height: 44px;
    border-radius: 40px;
    cursor: pointer;
    transition: 0.15s;
}

.btn-icon:hover {
    background: #5865f2;
    transform: scale(1.05);
}

.btn-send {
    background: #5865f2;
}

.recording-btn {
    background: #e03a3a;
    animation: pulse 0.8s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(224,58,58,0.7); }
    100% { box-shadow: 0 0 0 10px rgba(224,58,58,0); }
}

.speaking {
    box-shadow: 0 0 0 3px #5865f2, 0 0 0 8px rgba(88,101,242,0.3);
    transition: 0.06s linear;
}

#recTime {
    font-size: 14px;
    font-weight: bold;
    color: #ff8c8c;
    background: #1e1f2a;
    padding: 6px 12px;
    border-radius: 40px;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
</head>
<body>

<div class="app">
    <div class="sidebar">
        <div class="logo">✨ NEXUS</div>
        <div>
            <div class="room" onclick="join('general')"># general</div>
            <div class="room" onclick="join('gaming')">🎮 gaming</div>
            <div class="room" onclick="join('music')">🎵 music</div>
        </div>
        <div class="stats">
            <div>🌐 Online: <span id="online">0</span></div>
            <div>🎙️ Voice: <span id="voiceOnline">0</span></div>
            <div id="roomUsersList" style="font-size:12px; margin-top:8px;"></div>
        </div>
    </div>

    <div class="chat">
        <div id="messages" class="messages"></div>
        <div class="input-panel">
            <div class="input-wrapper">
                <input type="text" id="input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') send()">
                <button class="btn-icon" id="voiceMsgBtn" title="Удерживай для записи (макс 20с)">🎙️</button>
                <span id="recTime"></span>
                <button class="btn-icon" onclick="joinVoiceChat()" title="Войти в голосовой канал">🔊</button>
                <button class="btn-icon" onclick="muteMic()" title="Заглушить микрофон">🎧</button>
                <button class="btn-icon" onclick="leaveVoiceChat()" title="Выйти из войса">❌</button>
                <button class="btn-icon btn-send" onclick="send()">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
// ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
const socket = io();
let name = localStorage.getItem("name") || prompt("🔮 Твой ник:");
if (!name) name = "Explorer";
localStorage.setItem("name", name);

let currentRoom = "general";
let stream = null;
let peers = {};
let inVoice = false;
let audioContext = null;

// элементы
const messagesDiv = document.getElementById("messages");
const onlineSpan = document.getElementById("online");
const voiceOnlineSpan = document.getElementById("voiceOnline");
const roomUsersList = document.getElementById("roomUsersList");

// ==================== ОБЫЧНЫЙ ЧАТ ====================
function join(room) {
    currentRoom = room;
    messagesDiv.innerHTML = "";
    socket.emit("join", { name, room });
}

function send() {
    const input = document.getElementById("input");
    if (input.value.trim()) {
        socket.emit("chat", input.value);
        input.value = "";
    }
}

function addMessageToUI(msg) {
    const div = document.createElement("div");
    div.className = "message-bubble";
    if (msg.type === "text") {
        div.innerHTML = `
            <div class="message-name">${escapeHtml(msg.name)}</div>
            <div class="message-text">${escapeHtml(msg.text)}</div>
        `;
    } else if (msg.type === "voice") {
        div.innerHTML = `
            <div class="message-name">🎙️ ${escapeHtml(msg.name)}</div>
            <div class="voice-bubble">
                <audio controls src="${msg.audio}"></audio>
            </div>
        `;
    }
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

socket.on("history", (msgs) => {
    messagesDiv.innerHTML = "";
    msgs.forEach(addMessageToUI);
});

socket.on("chat", addMessageToUI);
socket.on("online", (n) => onlineSpan.innerText = n);
socket.on("voice-count", (n) => voiceOnlineSpan.innerText = n);
socket.on("room-users", (usersList) => {
    roomUsersList.innerText = "👥 " + usersList.join(", ");
});

// ==================== ГОЛОСОВЫЕ СООБЩЕНИЯ (УДЕРЖАНИЕ) ====================
let mediaRecorder = null;
let audioChunks = [];
let recordTimer = null;
let recordSeconds = 0;
const voiceBtn = document.getElementById("voiceMsgBtn");
const recTimeSpan = document.getElementById("recTime");

voiceBtn.addEventListener("mousedown", startVoiceRecord);
voiceBtn.addEventListener("mouseup", stopVoiceRecord);
voiceBtn.addEventListener("mouseleave", stopVoiceRecord);
voiceBtn.addEventListener("touchstart", startVoiceRecord);
voiceBtn.addEventListener("touchend", stopVoiceRecord);

async function startVoiceRecord(e) {
    e.preventDefault();
    if (mediaRecorder && mediaRecorder.state === "recording") return;
    try {
        const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(tempStream);
        audioChunks = [];
        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const blob = new Blob(audioChunks, { type: "audio/webm" });
            const fd = new FormData();
            fd.append("audio", blob);
            const res = await fetch("/upload", { method: "POST", body: fd });
            const data = await res.json();
            socket.emit("voice-msg", data.url);
            tempStream.getTracks().forEach(t => t.stop());
            recTimeSpan.innerText = "";
            voiceBtn.classList.remove("recording-btn");
        };
        mediaRecorder.start();
        recordSeconds = 0;
        recTimeSpan.innerText = "🔴 0s";
        voiceBtn.classList.add("recording-btn");
        recordTimer = setInterval(() => {
            recordSeconds++;
            recTimeSpan.innerText = `🔴 ${recordSeconds}s`;
            if (recordSeconds >= 20) stopVoiceRecord();
        }, 1000);
    } catch(e) { console.warn(e); }
}

function stopVoiceRecord() {
    if (recordTimer) clearInterval(recordTimer);
    if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        mediaRecorder = null;
    }
}

// ==================== ГОЛОСОВОЙ ЧАТ (WebRTC) ====================
async function joinVoiceChat() {
    if (inVoice) return;
    inVoice = true;
    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        setupSpeakingDetection(stream);
        socket.emit("voice-join", currentRoom);
    } catch(e) { inVoice = false; }
}

function setupSpeakingDetection(stream) {
    if (audioContext) audioContext.close();
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    function checkVolume() {
        if (!inVoice) return;
        analyser.getByteFrequencyData(dataArray);
        let avg = dataArray.reduce((a,b)=>a+b,0) / dataArray.length;
        if (avg > 18) document.body.classList.add("speaking");
        else document.body.classList.remove("speaking");
        requestAnimationFrame(checkVolume);
    }
    checkVolume();
}

socket.on("voice-user", (userId) => { if (stream) createPeer(userId, true); });
socket.on("user-joined", (userId) => { if (stream) createPeer(userId, false); });
socket.on("signal", ({ from, data }) => {
    if (!peers[from]) createPeer(from, false);
    if (peers[from]) peers[from].signal(data);
});

function createPeer(userId, initiator) {
    if (!stream) return;
    const peer = new SimplePeer({
        initiator: initiator,
        trickle: false,
        stream: stream,
        config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] }
    });
    peer.on("signal", (signalData) => {
        socket.emit("signal", { to: userId, data: signalData });
    });
    peer.on("stream", (remoteStream) => {
        const audioEl = new Audio();
        audioEl.srcObject = remoteStream;
        audioEl.autoplay = true;
        audioEl.volume = 0.7;
    });
    peer.on("close", () => delete peers[userId]);
    peer.on("error", () => delete peers[userId]);
    peers[userId] = peer;
}

function leaveVoiceChat() {
    inVoice = false;
    Object.values(peers).forEach(p => p.destroy());
    peers = {};
    if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
    }
    if (audioContext) audioContext.close();
    document.body.classList.remove("speaking");
    socket.emit("voice-leave", currentRoom);
}

function muteMic() {
    if (stream) {
        const enabled = stream.getAudioTracks()[0].enabled;
        stream.getAudioTracks().forEach(t => t.enabled = !enabled);
    }
}

// начальная загрузка
join("general");
</script>
</body>
</html>
