<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CHAT FIX</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #313338;
    color: white;
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #2b2d31;
    padding: 10px;
}

.room {
    padding: 8px;
    cursor: pointer;
    border-radius: 6px;
}

.room:hover {
    background: #404249;
}

/* CHAT */
.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 10px;
    background: #2b2d31;
}

.messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.msg img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

.msg-box {
    background: #2b2d31;
    padding: 8px;
    border-radius: 8px;
    max-width: 500px;
}

.input {
    display: flex;
    padding: 10px;
    background: #2b2d31;
}

.input input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
    border-radius: 6px;
    background: #404249;
    color: white;
}

.input button {
    margin-left: 10px;
    padding: 10px;
    background: #5865f2;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.media {
    max-width: 200px;
    border-radius: 8px;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h3>Rooms</h3>
    <div class="room" onclick="joinRoom('general')"># general</div>
    <div class="room" onclick="joinRoom('gaming')"># gaming</div>
    <div class="room" onclick="joinRoom('music')"># music</div>
</div>

<div class="chat">

    <div class="header">
        Room: <span id="roomName">general</span> |
        Online: <span id="online">0</span>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input">
        <input id="input" placeholder="message...">

        <input type="file" id="file" style="display:none">

        <button onclick="sendText()">Send</button>
        <button onclick="document.getElementById('file').click()">+</button>
    </div>

</div>

<script>
let socket;
let currentRoom = "general";
let currentUser = "user" + Math.floor(Math.random() * 1000);

function escapeHtml(t){
    return t
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;");
}

/* SOCKET INIT */
function init(){
    socket = io();

    socket.emit("auth", {
        username: currentUser,
        room: currentRoom
    });

    socket.on("history", (msgs)=>{
        document.getElementById("messages").innerHTML = "";
        msgs.forEach(render);
    });

    socket.on("chat", render);

    socket.on("online", (n)=>{
        document.getElementById("online").innerText = n;
    });
}

/* JOIN ROOM */
function joinRoom(room){
    currentRoom = room;
    document.getElementById("roomName").innerText = room;

    socket.emit("auth", {
        username: currentUser,
        room
    });
}

/* SEND TEXT */
function sendText(){
    let input = document.getElementById("input");
    if(!input.value.trim()) return;

    socket.emit("chat", input.value);
    input.value = "";
}

/* RENDER MESSAGE */
function render(msg){
    const box = document.getElementById("messages");

    const div = document.createElement("div");
    div.className = "msg";

    let content = "";

    if(msg.type === "image"){
        content = `<img class="media" src="${msg.text}">`;
    } else {
        content = escapeHtml(msg.text || "");
    }

    div.innerHTML = `
        <img src="https://ui-avatars.com/api/?name=${msg.author}">
        <div class="msg-box">
            <b>${msg.author}</b><br>
            ${content}
        </div>
    `;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

/* MEDIA */
document.getElementById("file").onchange = async (e)=>{
    const file = e.target.files[0];
    if(!file) return;

    let fd = new FormData();
    fd.append("file", file);

    const res = await fetch("/upload-media", {
        method:"POST",
        body: fd
    });

    const data = await res.json();

    socket.emit("media", data.url, data.fileType);
};

init();
</script>

</body>
</html>
