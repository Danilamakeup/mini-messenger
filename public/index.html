<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS — Чат</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #1e1f22; color: #dbdee1; height: 100vh; display: flex; }
        .sidebar {
            width: 240px;
            background: #2b2d31;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1e1f22;
        }
        .server-header { padding: 16px; font-weight: bold; border-bottom: 1px solid #1e1f22; }
        .rooms { padding: 8px; flex: 1; }
        .room {
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 8px;
            cursor: pointer;
            color: #949ba4;
        }
        .room:hover, .room.active { background: #3b3f48; color: white; }
        .user-panel {
            padding: 12px;
            background: #232428;
            border-top: 1px solid #1e1f22;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: #5865f2; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 12px 16px;
            font-weight: bold;
            border-bottom: 1px solid #1e1f22;
            background: #313338;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            position: relative;
        }
        .message:hover .msg-menu { display: flex; }
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; background: #5865f2; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .msg-content { flex: 1; }
        .msg-header { display: flex; gap: 8px; align-items: baseline; }
        .msg-author { font-weight: bold; }
        .role { font-size: 10px; background: #5865f2; padding: 2px 6px; border-radius: 12px; }
        .msg-time { font-size: 10px; color: #949ba4; }
        .msg-text { margin-top: 4px; }
        .voice-place { background: #2b2d31; padding: 8px 12px; border-radius: 20px; display: inline-block; }
        audio { border-radius: 20px; height: 32px; }
        .msg-menu {
            position: absolute;
            right: 0;
            top: 0;
            background: #2b2d31;
            border-radius: 8px;
            display: none;
            gap: 8px;
            padding: 4px 8px;
        }
        .menu-btn { background: none; border: none; color: white; cursor: pointer; }
        .input-area {
            padding: 16px;
            background: #2b2d31;
        }
        .input-row {
            display: flex;
            gap: 8px;
            background: #1e1f22;
            border-radius: 40px;
            padding: 8px 16px;
        }
        .input-row input { flex: 1; background: none; border: none; color: white; outline: none; }
        button { background: #5865f2; border: none; padding: 8px 12px; border-radius: 8px; color: white; cursor: pointer; }
        .members-panel {
            width: 240px;
            background: #2b2d31;
            border-left: 1px solid #1e1f22;
            display: flex;
            flex-direction: column;
        }
        .members-header { padding: 16px; font-weight: bold; border-bottom: 1px solid #1e1f22; }
        .members-list { padding: 8px; flex: 1; overflow-y: auto; }
        .member {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
        }
        .member:hover { background: #3b3f48; }
        .member-avatar { width: 32px; height: 32px; border-radius: 50%; background: #5865f2; display: flex; align-items: center; justify-content: center; }
        .voice-status { font-size: 11px; color: #23a55a; }
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-card {
            background: #2b2d31; border-radius: 16px; padding: 24px; width: 320px;
        }
        .modal-card input { width: 100%; padding: 8px; margin: 8px 0; border-radius: 8px; border: none; background: #1e1f22; color: white; }
        .edit-input { background: #1e1f22; border: none; color: white; padding: 4px; border-radius: 8px; width: 100%; }
        .rec-timer { font-size: 12px; text-align: center; margin-top: 4px; }
        .wave-container { display: inline-flex; gap: 3px; margin-left: 8px; }
        .wave { width: 3px; height: 12px; background: #e03a3a; border-radius: 2px; animation: waveAnim 0.5s infinite alternate; }
        @keyframes waveAnim { from { height: 6px; } to { height: 16px; } }
        .speaking { box-shadow: 0 0 0 2px #5865f2; }
    </style>
</head>
<body>

<div id="loginModal" class="modal">
    <div class="modal-card">
        <h2 id="formTitle">🔐 Вход</h2>
        <input type="text" id="loginUsername" placeholder="Никнейм">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button id="submitBtn">Войти</button>
        <div id="switchMode" style="margin-top:12px; text-align:center; cursor:pointer; color:#5865f2;">Нет аккаунта? Зарегистрироваться</div>
        <div id="loginError" style="color:#e03a3a; margin-top:8px;"></div>
    </div>
</div>

<div id="app" style="display:none; width:100%; height:100vh;">
    <div class="sidebar">
        <div class="server-header">✨ NEXUS</div>
        <div class="rooms" id="roomsList"></div>
        <div class="user-panel" id="userPanel">
            <div class="avatar" id="myAvatar">👤</div>
            <div>
                <div id="currentNick"></div>
                <div id="currentRole" style="font-size:11px;"></div>
            </div>
        </div>
    </div>

    <div class="chat">
        <div class="chat-header"># <span id="currentRoomName">general</span></div>
        <div id="messages" class="messages"></div>
        <div class="input-area">
            <div class="input-row">
                <input id="input" placeholder="Сообщение...">
                <label style="cursor:pointer;">📎<input type="file" id="fileInput" style="display:none;"></label>
                <button id="recordBtn">🎙️</button>
                <button id="joinVoiceBtn">🎤</button>
                <button id="sendBtn">➤</button>
            </div>
            <div id="recTimer" class="rec-timer"></div>
            <div id="waveVisual" class="wave-container" style="display:none; justify-content:center;"><div class="wave"></div><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>
        </div>
    </div>

    <div class="members-panel">
        <div class="members-header">👥 УЧАСТНИКИ — <span id="onlineCount">0</span></div>
        <div id="membersList" class="members-list"></div>
    </div>
</div>

<script>
    const OWNER = "bigheaven3569";
    let currentUser, currentRole;
    let currentRoom = "general", socket;
    let voiceStream, voicePeers = {}, inVoice = false;
    let allUsers = [];

    const saved = localStorage.getItem("nexus_session");
    if (saved) {
        const { username, password } = JSON.parse(saved);
        login(username, password);
    }

    async function login(username, password) {
        const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
            currentUser = username; currentRole = data.role;
            localStorage.setItem("nexus_session", JSON.stringify({ username, password }));
            document.getElementById("loginModal").style.display = "none";
            document.getElementById("app").style.display = "flex";
            document.getElementById("currentNick").innerText = currentUser;
            document.getElementById("currentRole").innerHTML = currentRole;
            if (currentRole === "владелец") document.getElementById("currentRole").style.animation = "rgbText 1.5s infinite linear";
            initSocket();
        } else alert(data.error);
    }

    let isLoginMode = true;
    document.getElementById("submitBtn").onclick = async () => {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value.trim();
        if (!username || !password) return;
        if (!isLoginMode) {
            const res = await fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                isLoginMode = true;
                document.getElementById("formTitle").innerText = "🔐 Вход";
                document.getElementById("switchMode").innerText = "Нет аккаунта? Зарегистрироваться";
                alert("Регистрация успешна! Войдите.");
            } else alert(data.error);
        } else login(username, password);
    };
    document.getElementById("switchMode").onclick = () => {
        isLoginMode = !isLoginMode;
        document.getElementById("formTitle").innerText = isLoginMode ? "🔐 Вход" : "📝 Регистрация";
        document.getElementById("switchMode").innerText = isLoginMode ? "Нет аккаунта? Зарегистрироваться" : "Уже есть аккаунт? Войти";
    };

    function initSocket() {
        socket = io();
        socket.on("connect", () => socket.emit("auth", { username: currentUser, room: currentRoom }));

        socket.on("history", (msgs) => {
            document.getElementById("messages").innerHTML = "";
            msgs.forEach(m => addMessage(m));
        });
        socket.on("chat", (msg) => { addMessage(msg); });
        socket.on("message-edited", ({ msgId, newText }) => {
            const el = document.querySelector(`.message[data-id="${msgId}"] .msg-text`);
            if (el) el.innerText = newText;
        });
        socket.on("message-deleted", ({ msgId }) => {
            document.querySelector(`.message[data-id="${msgId}"]`)?.remove();
        });
        socket.on("room-users", (users) => {
            document.getElementById("onlineCount").innerText = users.length;
        });
        socket.on("all-users", (users) => {
            allUsers = users;
            renderMembers();
        });
        socket.on("user-status-update", ({ username, status }) => {
            const u = allUsers.find(u => u.username === username);
            if (u) u.status = status;
            renderMembers();
        });
        socket.on("voice-users", (users) => {
            const inVoice = users.some(u => u.username === currentUser);
            document.getElementById("joinVoiceBtn").innerHTML = inVoice ? "🔇 Выйти" : "🎤 Войти";
        });
        socket.on("clear-chat", () => { document.getElementById("messages").innerHTML = ""; });
        socket.on("signal", ({ from, data }) => {
            if (!voicePeers[from]) createPeer(from, false);
            voicePeers[from]?.signal(data);
        });
    }

    function renderMembers() {
        const container = document.getElementById("membersList");
        const online = allUsers.filter(u => u.status === "online");
        const offline = allUsers.filter(u => u.status !== "online");
        const sorted = [...online, ...offline];
        container.innerHTML = sorted.map(u => `
            <div class="member">
                <div class="member-avatar">${u.username[0].toUpperCase()}</div>
                <div style="flex:1">
                    <div>${escapeHtml(u.username)}</div>
                    <div class="voice-status">${u.status === "online" ? "🟢 В сети" : "⚫ Не в сети"}</div>
                </div>
            </div>
        `).join("");
    }

    function addMessage(msg) {
        const container = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "message";
        div.setAttribute("data-id", msg.id);
        let content = "";
        if (msg.type === "voice") content = `<div class="voice-place"><audio controls src="${msg.audio}"></audio></div>`;
        else content = `<div class="msg-text">${escapeHtml(msg.text)}</div>`;
        div.innerHTML = `
            <div class="msg-avatar">${msg.author[0].toUpperCase()}</div>
            <div class="msg-content">
                <div class="msg-header">
                    <span class="msg-author">${escapeHtml(msg.author)}</span>
                    <span class="role">${msg.role}</span>
                    <span class="msg-time">${new Date(msg.time).toLocaleTimeString()}</span>
                </div>
                ${content}
            </div>
            <div class="msg-menu">
                ${msg.author === currentUser ? `<button class="menu-btn edit-btn">✏️</button><button class="menu-btn delete-btn">🗑️</button>` : ''}
            </div>
        `;
        container.appendChild(div);
        div.scrollIntoView({ behavior: "smooth" });
        if (msg.author === currentUser) {
            div.querySelector(".edit-btn")?.addEventListener("click", () => {
                const textDiv = div.querySelector(".msg-text");
                if (!textDiv) return;
                const old = textDiv.innerText;
                const inp = document.createElement("input");
                inp.value = old;
                inp.className = "edit-input";
                textDiv.innerHTML = "";
                textDiv.appendChild(inp);
                inp.focus();
                inp.onblur = () => {
                    const newText = inp.value.trim();
                    if (newText && newText !== old) socket.emit("edit-message", { room: currentRoom, msgId: msg.id, newText });
                    textDiv.innerText = newText || old;
                };
                inp.onkeydown = (e) => { if (e.key === "Enter") inp.blur(); };
            });
            div.querySelector(".delete-btn")?.addEventListener("click", () => {
                if (confirm("Удалить?")) socket.emit("delete-message", { room: currentRoom, msgId: msg.id });
            });
        }
    }

    // --- голосовые сообщения ---
    let isRecording = false, audioCtx, recorded = [], recordTimer;
    const recordBtn = document.getElementById("recordBtn");
    const cancelBtn = document.createElement("button");
    cancelBtn.textContent = "❌ Отменить";
    cancelBtn.style.display = "none";
    cancelBtn.style.background = "#e03a3a";
    document.querySelector(".input-row").appendChild(cancelBtn);

    async function startRec() {
        if (isRecording) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new AudioContext();
            const source = audioCtx.createMediaStreamSource(stream);
            const processor = audioCtx.createScriptProcessor(4096,1,1);
            recorded = [];
            processor.onaudioprocess = (e) => { if(isRecording) recorded.push(new Float32Array(e.inputBuffer.getChannelData(0))); };
            source.connect(processor);
            processor.connect(audioCtx.destination);
            isRecording = true;
            recordBtn.style.background = "#e03a3a";
            recordBtn.textContent = "⏹️";
            cancelBtn.style.display = "inline-block";
            document.getElementById("waveVisual").style.display = "flex";
            let sec = 0;
            recordTimer = setInterval(() => {
                sec++;
                document.getElementById("recTimer").innerText = `🔴 ${sec}s / 20s`;
                if (sec >= 20) stopAndSend();
            }, 1000);
        } catch(e) {}
    }

    function stopAndSend() {
        if (!isRecording) return;
        isRecording = false;
        clearInterval(recordTimer);
        if (audioCtx) audioCtx.close();
        const total = recorded.reduce((a,b)=>a+b.length,0);
        const combined = new Float32Array(total);
        let off = 0;
        for (let arr of recorded) { combined.set(arr, off); off += arr.length; }
        if (combined.length > 3000) {
            const int16 = new Int16Array(combined.length);
            for (let i=0;i<combined.length;i++) int16[i] = combined[i] * 0x7FFF;
            const encoder = new lamejs.Mp3Encoder(1,44100,128);
            let mp3 = [];
            for (let i=0;i<int16.length;i+=1152) {
                let chunk = int16.subarray(i,i+1152);
                let buf = encoder.encodeBuffer(chunk);
                if (buf.length) mp3.push(buf);
            }
            let end = encoder.flush();
            if (end.length) mp3.push(end);
            const blob = new Blob(mp3, {type:"audio/mp3"});
            const fd = new FormData();
            fd.append("audio", blob);
            const res = await fetch("/upload-audio", { method:"POST", body:fd });
            const data = await res.json();
            socket.emit("voice-msg", data.url);
        }
        recordBtn.style.background = "";
        recordBtn.textContent = "🎙️";
        cancelBtn.style.display = "none";
        document.getElementById("waveVisual").style.display = "none";
        document.getElementById("recTimer").innerText = "";
    }
    recordBtn.onmousedown = startRec;
    recordBtn.onmouseup = stopAndSend;
    recordBtn.onmouseleave = () => { if (isRecording) stopAndSend(); };
    cancelBtn.onclick = () => { if (isRecording) { clearInterval(recordTimer); isRecording = false; if(audioCtx) audioCtx.close(); recordBtn.style.background = ""; recordBtn.textContent = "🎙️"; cancelBtn.style.display = "none"; document.getElementById("waveVisual").style.display = "none"; document.getElementById("recTimer").innerText = ""; } };

    // --- голосовой чат ---
    async function joinVoice() {
        if (inVoice) {
            inVoice = false;
            socket.emit("leave-voice");
            if (voiceStream) voiceStream.getTracks().forEach(t => t.stop());
            voiceStream = null;
            Object.values(voicePeers).forEach(p => p.destroy());
            voicePeers = {};
            document.getElementById("joinVoiceBtn").innerHTML = "🎤 Войти";
            document.body.classList.remove("speaking");
            return;
        }
        try {
            voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            socket.emit("join-voice");
            inVoice = true;
            const ctx = new AudioContext();
            const src = ctx.createMediaStreamSource(voiceStream);
            const analyser = ctx.createAnalyser();
            src.connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);
            setInterval(() => {
                if (inVoice) {
                    analyser.getByteFrequencyData(data);
                    let vol = data.reduce((a,b)=>a+b,0)/data.length;
                    if (vol > 20) document.body.classList.add("speaking");
                    else document.body.classList.remove("speaking");
                }
            }, 100);
            socket.on("user-joined", (uid) => createPeer(uid, false));
        } catch(e) {}
    }
    function createPeer(id, init) {
        if (!voiceStream) return;
        let peer = new SimplePeer({
            initiator: init,
            trickle: false,
            stream: voiceStream,
            config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] }
        });
        peer.on("signal", data => socket.emit("signal", { to: id, data }));
        peer.on("stream", remote => { let a = new Audio(); a.srcObject = remote; a.autoplay = true; });
        voicePeers[id] = peer;
    }
    document.getElementById("joinVoiceBtn").onclick = joinVoice;

    function sendMessage(text) {
        if (!text.trim()) return;
        socket.emit("chat", text);
    }
    document.getElementById("sendBtn").onclick = () => {
        const inp = document.getElementById("input");
        sendMessage(inp.value);
        inp.value = "";
    };
    document.getElementById("input").onkeydown = (e) => { if (e.key === "Enter") document.getElementById("sendBtn").click(); };

    function switchRoom(room) {
        currentRoom = room;
        document.getElementById("currentRoomName").innerText = room;
        document.getElementById("messages").innerHTML = "";
        socket.emit("auth", { username: currentUser, room });
        document.querySelectorAll(".room").forEach(r => r.classList.remove("active"));
        document.querySelector(`.room[data-room="${room}"]`).classList.add("active");
    }
    window.switchRoom = switchRoom;

    document.getElementById("roomsList").innerHTML = `
        <div class="room active" data-room="general" onclick="switchRoom('general')"># general</div>
        <div class="room" data-room="gaming" onclick="switchRoom('gaming')">🎮 gaming</div>
        <div class="room" data-room="music" onclick="switchRoom('music')">🎵 music</div>
        <div class="room" data-room="other-fuckin-shit" onclick="switchRoom('other-fuckin-shit')">💩 other-fuckin-shit</div>
    `;
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
</script>
</body>
</html>
