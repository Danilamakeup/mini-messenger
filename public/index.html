<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus</title>

<style>
body{
    margin:0;
    background:#0f1115;
    color:white;
    font-family:Arial;
}

.app{display:flex;height:100vh;}

.sidebar{
    width:220px;
    background:#181c24;
    padding:10px;
}

.chat{
    flex:1;
    display:flex;
    flex-direction:column;
}

.messages{
    flex:1;
    overflow:auto;
    padding:15px;
}

.message{
    margin-bottom:10px;
}

.input{
    display:flex;
    padding:10px;
    background:#181c24;
}

input{
    flex:1;
    padding:10px;
}

button{
    margin-left:5px;
    padding:10px;
    cursor:pointer;
}

.recording{
    background:red;
}

/* voice bubble */
.voice{
    background:#2a2f3a;
    padding:10px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
    <div onclick="join('general')">general</div>
    <div onclick="join('gaming')">gaming</div>
    <div onclick="join('music')">music</div>

    <hr>
    Online: <span id="online">0</span><br>
    Voice: <span id="voiceOnline">0</span>
</div>

<div class="chat">

<div id="messages" class="messages"></div>

<div class="input">
    <input id="input" onkeydown="if(event.key==='Enter') send()">

    <button id="recordBtn">🎙️</button>
    <span id="time"></span>

    <button onclick="send()">➤</button>
</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let name = localStorage.getItem("name") || prompt("Nick");
localStorage.setItem("name", name);

let room="general";

// join
function join(r){
    room=r;
    messages.innerHTML="";
    socket.emit("join",{name,room});
}

// chat
function send(){
    if(input.value){
        socket.emit("chat",input.value);
        input.value="";
    }
}

// render
function add(m){
    const d=document.createElement("div");

    if(m.type==="text"){
        d.innerText=m.name+": "+m.text;
    }

    if(m.type==="voice"){
        d.innerHTML=`
            <div>${m.name}</div>
            <div class="voice">
                <audio controls src="${m.audio}"></audio>
            </div>
        `;
    }

    messages.appendChild(d);
}

socket.on("history",msgs=>{
    messages.innerHTML="";
    msgs.forEach(add);
});

socket.on("chat",add);

// 🎙 TELEGRAM VOICE
let rec;
let chunks=[];
let timer;
let seconds=0;

const btn=document.getElementById("recordBtn");
const time=document.getElementById("time");

btn.onmousedown=start;
btn.onmouseup=stop;
btn.ontouchstart=start;
btn.ontouchend=stop;

async function start(e){
    e.preventDefault();

    const s=await navigator.mediaDevices.getUserMedia({audio:true});
    rec=new MediaRecorder(s);

    chunks=[];

    rec.ondataavailable=e=>chunks.push(e.data);

    rec.onstop=async()=>{
        const blob=new Blob(chunks,{type:"audio/webm"});
        const fd=new FormData();
        fd.append("audio",blob);

        const res=await fetch("/upload",{method:"POST",body:fd});
        const data=await res.json();

        socket.emit("voice-msg",data.url);
    };

    rec.start();

    seconds=0;
    btn.classList.add("recording");

    timer=setInterval(()=>{
        seconds++;
        time.innerText=seconds+"s";
        if(seconds>=20) stop();
    },1000);
}

function stop(e){
    if(e) e.preventDefault();

    clearInterval(timer);
    btn.classList.remove("recording");
    time.innerText="";

    if(rec && rec.state==="recording"){
        rec.stop();
    }
}

// online
socket.on("online",n=>online.innerText=n);
socket.on("voice-count",n=>voiceOnline.innerText=n);

join("general");
</script>

</body>
</html>
