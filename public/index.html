<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS — ФИНАЛ</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1e1f22; font-family: 'Inter', system-ui, sans-serif; height: 100vh; overflow: hidden; color: #dbdee1; }
        
        /* Логин модалка */
        .login-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: #2b2d31; border-radius: 24px; padding: 32px; width: 320px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #1e1f22; border: none; border-radius: 12px; color: white; }
        .login-box button { background: #5865f2; border: none; padding: 10px 20px; border-radius: 12px; color: white; margin: 5px; cursor: pointer; }
        .switch-mode { margin-top: 15px; font-size: 13px; color: #5865f2; cursor: pointer; }
        
        /* Основной интерфейс */
        .app { display: flex; height: 100%; }
        .sidebar { width: 260px; background: #2b2d31; display: flex; flex-direction: column; transition: transform 0.2s; z-index: 10; }
        .server-header { padding: 16px; border-bottom: 1px solid #1e1f22; font-weight: 700; background: #313338; }
        .rooms-list { flex: 1; padding: 12px; }
        .room { padding: 8px 12px; margin: 2px 0; border-radius: 8px; cursor: pointer; color: #949ba4; display: flex; align-items: center; gap: 10px; transition: 0.1s; }
        .room:hover { background: #3b3f48; color: #dbdee1; }
        .room.active { background: #3b3f48; color: #fff; }
        .room.notification { border: 1px solid #5865f2; box-shadow: 0 0 8px #5865f2; background: rgba(88,101,242,0.2); }
        
        .user-section { padding: 16px; background: #232428; border-top: 1px solid #1e1f22; }
        .stats { background: #2b2d31; padding: 12px; border-radius: 10px; margin-bottom: 12px; }
        .current-user { display: flex; align-items: center; gap: 10px; background: #1e1f22; padding: 8px 12px; border-radius: 10px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #5865f2; }
        
        .chat { flex: 1; display: flex; flex-direction: column; background: #313338; }
        .chat-header { padding: 16px 20px; background: #2b2d31; border-bottom: 1px solid #1e1f22; font-weight: 600; }
        .messages { flex: 1; overflow-y: auto; padding: 16px 0; }
        
        .message-group { padding: 8px 20px; display: flex; gap: 16px; transition: background 0.1s; position: relative; }
        .message-group:hover { background: #2b2d31; }
        .message-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #5865f2; flex-shrink: 0; }
        .message-content { flex: 1; }
        .message-header { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
        .message-author { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 6px; }
        .message-time { font-size: 11px; color: #949ba4; }
        .message-text { font-size: 15px; line-height: 1.4; word-break: break-word; }
        .media-preview { max-width: 300px; max-height: 200px; border-radius: 12px; margin-top: 5px; cursor: pointer; }
        .voice-bubble { background: #2b2d31; padding: 8px 16px; border-radius: 20px; display: inline-block; margin-top: 4px; }
        audio { border-radius: 30px; height: 34px; background: #1e1f22; }
        
        .reactions { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
        .reaction { background: #2b2d31; border-radius: 20px; padding: 2px 8px; font-size: 13px; cursor: pointer; }
        .message-menu { position: absolute; right: 20px; top: 8px; background: #1e1f22; border-radius: 8px; padding: 4px; display: none; gap: 4px; }
        .message-group:hover .message-menu { display: flex; }
        .menu-btn { background: none; border: none; color: white; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
        .menu-btn:hover { background: #e03a3a; }
        
        .input-panel { padding: 16px 20px 24px; background: #2b2d31; }
        .input-wrapper { display: flex; gap: 10px; background: #383a40; border-radius: 30px; padding: 6px 6px 6px 18px; flex-wrap: wrap; }
        .input-wrapper input { flex: 1; background: transparent; border: none; padding: 12px 0; color: white; outline: none; }
        .btn-icon { background: #4e5058; border: none; color: white; font-size: 18px; width: 40px; height: 40px; border-radius: 30px; cursor: pointer; }
        .btn-send { background: #5865f2; }
        .recording-active { background: #e03a3a; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        .speaking { box-shadow: 0 0 0 2px #5865f2; }
        .wave-container { display: inline-flex; align-items: center; gap: 3px; margin-left: 8px; }
        .wave { width: 3px; height: 12px; background: #ff6666; border-radius: 2px; animation: waveAnim 0.5s infinite alternate; }
        @keyframes waveAnim { from { transform: scaleY(0.5); } to { transform: scaleY(1.5); } }
        @keyframes rgbText { 0% { color: #ff0000; } 33% { color: #00ff00; } 66% { color: #0088ff; } 100% { color: #ff0000; } }
        .rgb-role { animation: rgbText 1.5s infinite linear; font-weight: bold; }
        
        @media (max-width: 700px) {
            .sidebar { position: fixed; left: -260px; top: 0; bottom: 0; z-index: 100; }
            .sidebar.open { left: 0; }
            .menu-toggle { display: flex; position: fixed; bottom: 20px; left: 20px; z-index: 101; background: #5865f2; border: none; width: 48px; height: 48px; border-radius: 30px; align-items: center; justify-content: center; font-size: 24px; }
            .message-menu { display: flex; position: static; margin-top: 6px; background: none; }
        }
        @media (min-width: 701px) { .menu-toggle { display: none; } }
    </style>
</head>
<body>

<div id="loginModal" class="login-modal">
    <div class="login-box">
        <h2 id="formTitle">🔐 Вход</h2>
        <input type="text" id="loginUsername" placeholder="Никнейм">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button id="submitBtn">Войти</button>
        <div class="switch-mode" id="switchMode">Нет аккаунта? Зарегистрироваться</div>
        <div id="loginError" style="color: #e03a3a; margin-top: 10px; font-size: 13px;"></div>
    </div>
</div>

<div class="app" style="display: none;" id="app">
    <div class="sidebar" id="sidebar">
        <div class="server-header">✨ NEXUS</div>
        <div class="rooms-list" id="roomsList">
            <div class="room" data-room="general" onclick="joinRoom('general')">#️⃣ general</div>
            <div class="room" data-room="gaming" onclick="joinRoom('gaming')">🎮 gaming</div>
            <div class="room" data-room="music" onclick="joinRoom('music')">🎵 music</div>
            <div class="room" data-room="other-fuckin-shit" onclick="joinRoom('other-fuckin-shit')">💩 other-fuckin-shit</div>
        </div>
        <div class="user-section">
            <div class="stats">
                <div>🌐 Online: <span id="online">0</span></div>
                <div>🎙️ Voice: <span id="voiceOnline">0</span></div>
                <div id="roomUsersList" style="font-size:11px;"></div>
            </div>
            <div class="current-user">
                <img class="avatar" id="myAvatar" src="">
                <div>
                    <div id="currentNickDisplay" style="font-weight:600;"></div>
                    <div id="currentRoleDisplay" style="font-size:10px;"></div>
                </div>
                <label style="margin-left:auto; background:#4e5058; width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer;">📷<input type="file" id="avatarInput" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none;"></label>
                <button class="settings-btn" onclick="openSettings()" style="background:#4e5058; border:none; width:28px; height:28px; border-radius:8px;">⚙️</button>
            </div>
        </div>
    </div>

    <div class="chat">
        <div class="chat-header"># <span id="currentRoomName">general</span></div>
        <div id="messages" class="messages"></div>
        <div class="input-panel">
            <div class="input-wrapper">
                <input id="input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendText()">
                <label class="btn-icon" style="display:inline-flex; align-items:center; justify-content:center; cursor:pointer;">📎<input type="file" id="mediaInput" accept="image/*,video/*,audio/*" style="display:none;"></label>
                <div class="voice-controls">
                    <button class="btn-icon" id="recordBtn">🎙️</button>
                    <button class="btn-icon" id="cancelVoiceBtn" style="display:none; background:#e03a3a;">❌</button>
                    <span id="recTimer"></span>
                    <div id="waveVisual" class="wave-container" style="display:none;"><div class="wave"></div><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>
                </div>
                <button class="btn-icon" onclick="joinVoiceChat()">🔊</button>
                <button class="btn-icon" onclick="muteMic()">🎧</button>
                <button class="btn-icon" onclick="leaveVoiceChat()">❌</button>
                <button class="btn-icon btn-send" onclick="sendText()">➤</button>
            </div>
        </div>
    </div>
</div>

<button class="menu-toggle" onclick="toggleSidebar()">☰</button>

<div id="settingsModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:1000;">
    <div style="background:#2b2d31; border-radius:16px; padding:24px; width:300px; text-align:center;">
        <h3>⚙️ Сменить ник</h3>
        <input type="text" id="newNickInput" style="width:100%; padding:12px; margin:16px 0; background:#1e1f22; border:none; border-radius:8px; color:white;">
        <input type="password" id="passwordForNick" placeholder="Ваш пароль" style="width:100%; padding:12px; margin:16px 0; background:#1e1f22; border:none; border-radius:8px; color:white;">
        <button onclick="changeNickname()" style="background:#5865f2; border:none; padding:8px 20px; border-radius:8px; color:white;">Сохранить</button>
        <button onclick="closeSettings()" style="background:#4e5058; border:none; padding:8px 20px; border-radius:8px; color:white;">Отмена</button>
    </div>
</div>

<script>
    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let currentUser = null;
    let currentRole = null;
    let currentAvatar = null;
    let currentRoom = "general";
    let socket = null;
    let roomNotifications = {};
    
    // Элементы
    const loginModal = document.getElementById("loginModal");
    const appDiv = document.getElementById("app");
    const loginError = document.getElementById("loginError");
    
    // ========== АВТОЛОГИН ==========
    const savedSession = localStorage.getItem("nexus_session");
    if (savedSession) {
        try {
            const { username, password } = JSON.parse(savedSession);
            fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            }).then(res => res.json()).then(data => {
                if (data.success) {
                    currentUser = username;
                    currentRole = data.role;
                    currentAvatar = data.avatar;
                    loginModal.style.display = "none";
                    appDiv.style.display = "flex";
                    initSocket();
                    document.getElementById("currentNickDisplay").innerText = currentUser;
                    updateRoleUI(currentRole);
                    if (currentAvatar) document.getElementById("myAvatar").src = currentAvatar;
                    else document.getElementById("myAvatar").src = `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser)}&background=5865f2&color=fff&size=32`;
                } else {
                    localStorage.removeItem("nexus_session");
                }
            });
        } catch(e) { localStorage.removeItem("nexus_session"); }
    }
    
    function saveSession(username, password) {
        localStorage.setItem("nexus_session", JSON.stringify({ username, password }));
    }
    
    // ========== ЛОГИН/РЕГИСТРАЦИЯ ==========
    let isLoginMode = true;
    const formTitle = document.getElementById("formTitle");
    const submitBtn = document.getElementById("submitBtn");
    const switchMode = document.getElementById("switchMode");
    
    switchMode.onclick = () => {
        isLoginMode = !isLoginMode;
        formTitle.innerText = isLoginMode ? "🔐 Вход" : "📝 Регистрация";
        switchMode.innerText = isLoginMode ? "Нет аккаунта? Зарегистрироваться" : "Уже есть аккаунт? Войти";
        loginError.innerText = "";
    };
    
    submitBtn.onclick = async () => {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value.trim();
        if (!username || !password) {
            loginError.innerText = "Заполните все поля";
            return;
        }
        
        const endpoint = isLoginMode ? "/login" : "/register";
        const res = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
            currentUser = username;
            currentRole = data.role;
            currentAvatar = data.avatar || null;
            saveSession(username, password);
            loginModal.style.display = "none";
            appDiv.style.display = "flex";
            initSocket();
            document.getElementById("currentNickDisplay").innerText = currentUser;
            updateRoleUI(currentRole);
            if (currentAvatar) document.getElementById("myAvatar").src = currentAvatar;
            else document.getElementById("myAvatar").src = `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser)}&background=5865f2&color=fff&size=32`;
        } else {
            loginError.innerText = data.error;
        }
    };
    
    // ========== ЗАГРУЗКА АВАТАРКИ ==========
    document.getElementById("avatarInput").onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.match(/image\/(jpeg|png|gif|webp)/)) {
            alert("Можно только PNG, JPG, GIF, WEBP!");
            return;
        }
        const fd = new FormData();
        fd.append("avatar", file);
        fd.append("username", currentUser);
        const res = await fetch("/upload-avatar", { method: "POST", body: fd });
        const data = await res.json();
        if (data.url) {
            currentAvatar = data.url;
            document.getElementById("myAvatar").src = currentAvatar;
        }
    };
    
    // ========== ОТПРАВКА МЕДИА ==========
    document.getElementById("mediaInput").onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 15 * 1024 * 1024) {
            alert("❌ Файл больше 15 МБ!");
            return;
        }
        const fd = new FormData();
        fd.append("file", file);
        const res = await fetch("/upload-media", { method: "POST", body: fd });
        const data = await res.json();
        if (data.url) socket.emit("media", data.url, data.fileType);
        else alert("Ошибка загрузки");
    };
    
    // ========== SOCKET ==========
    function initSocket() {
        socket = io();
        
        socket.on("connect", () => {
            socket.emit("auth", { username: currentUser, room: currentRoom });
        });
        
        socket.on("auth-error", (msg) => { alert(msg); });
        socket.on("kick", (msg) => { alert(msg); location.reload(); });
        socket.on("ban", (msg) => { alert(msg); localStorage.removeItem("nexus_session"); location.reload(); });
        socket.on("mute", (msg) => { alert(msg); });
        
        socket.on("user-data", ({ username, role, avatar }) => {
            document.getElementById("currentNickDisplay").innerText = username;
            updateRoleUI(role);
            if (avatar) document.getElementById("myAvatar").src = avatar;
        });
        
        socket.on("history", (msgs) => {
            document.getElementById("messages").innerHTML = "";
            msgs.forEach(msg => addMessageToUI(msg));
        });
        
        socket.on("chat", (msg) => {
            addMessageToUI(msg);
            if (msg.author !== currentUser && msg.room !== currentRoom) {
                const roomEl = document.querySelector(`.room[data-room="${msg.room}"]`);
                if (roomEl) roomEl.classList.add("notification");
                roomNotifications[msg.room] = true;
            }
        });
        
        socket.on("message-deleted", ({ msgId }) => {
            document.querySelector(`.message-group[data-msg-id="${msgId}"]`)?.remove();
        });
        
        socket.on("reaction-updated", ({ msgId, reactions }) => {
            const msgDiv = document.querySelector(`.message-group[data-msg-id="${msgId}"]`);
            if (msgDiv) {
                let reactionsDiv = msgDiv.querySelector('.reactions');
                if (reactionsDiv) {
                    let html = '';
                    for (let [emoji, users] of Object.entries(reactions)) {
                        html += `<div class="reaction" onclick="addReaction('${msgId}','${emoji}')">${emoji} <span class="reaction-count">${users.length}</span></div>`;
                    }
                    reactionsDiv.innerHTML = html;
                }
            }
        });
        
        socket.on("online", n => document.getElementById("online").innerText = n);
        socket.on("voice-count", n => document.getElementById("voiceOnline").innerText = n);
        socket.on("room-users", list => document.getElementById("roomUsersList").innerHTML = "👥 " + (list ? list.join(", ") : ""));
        socket.on("clear-chat", () => { document.getElementById("messages").innerHTML = ""; });
        
        // Динамические комнаты
        socket.on("new-room", (roomName) => {
            const roomsList = document.getElementById("roomsList");
            const newRoom = document.createElement("div");
            newRoom.className = "room";
            newRoom.setAttribute("data-room", roomName);
            newRoom.setAttribute("onclick", `joinRoom('${roomName}')`);
            newRoom.innerHTML = `#️⃣ ${roomName}`;
            roomsList.appendChild(newRoom);
        });
        
        socket.on("delete-room", (roomName) => {
            const roomEl = document.querySelector(`.room[data-room="${roomName}"]`);
            if (roomEl) roomEl.remove();
            if (currentRoom === roomName) joinRoom("general");
        });
        
        // Голосовой чат
        socket.on("voice-user", id => { if (voiceStream) createPeer(id, true); });
        socket.on("user-joined", id => { if (voiceStream) createPeer(id, false); });
        socket.on("signal", ({ from, data }) => {
            if (!voicePeers[from]) createPeer(from, false);
            voicePeers[from]?.signal(data);
        });
    }
    
    function joinRoom(room) {
        currentRoom = room;
        document.getElementById("currentRoomName").innerText = room;
        document.querySelectorAll(".room").forEach(r => r.classList.remove("active", "notification"));
        document.querySelector(`.room[data-room="${room}"]`).classList.add("active");
        roomNotifications[room] = false;
        document.getElementById("messages").innerHTML = "";
        socket.emit("auth", { username: currentUser, room });
        if (window.innerWidth <= 700) toggleSidebar();
    }
    
    function sendText() {
        let input = document.getElementById("input");
        if (input.value.trim()) {
            socket.emit("chat", input.value);
            input.value = "";
        }
    }
    
    function deleteMessage(msgId, author) {
        let canDelete = currentRole === "владелец" || currentRole === "админ" || currentRole === "модер" || author === currentUser;
        if (canDelete) socket.emit("delete-message", { room: currentRoom, msgId });
    }
    
    function addReaction(msgId, emoji) { socket.emit("add-reaction", { room: currentRoom, msgId, emoji }); }
    
    function addMessageToUI(msg) {
        const container = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "message-group";
        div.setAttribute("data-msg-id", msg.id);
        
        const avatarUrl = msg.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(msg.author)}&background=5865f2&color=fff&size=40`;
        const roleTag = `<span class="role-tag" style="${msg.role === 'владелец' ? 'animation: rgbText 1.5s infinite linear;' : ''}">${msg.role}</span>`;
        
        let contentHtml = '';
        if (msg.type === 'text') contentHtml = `<div class="message-text">${escapeHtml(msg.text)}</div>`;
        else if (msg.type === 'voice') contentHtml = `<div class="voice-bubble"><audio controls src="${msg.audio}"></audio></div>`;
        else if (msg.type === 'media') {
            if (msg.mediaType === 'video') contentHtml = `<video controls class="media-preview" src="${msg.mediaUrl}"></video>`;
            else if (msg.mediaType === 'audio') contentHtml = `<audio controls src="${msg.mediaUrl}"></audio>`;
            else contentHtml = `<img class="media-preview" src="${msg.mediaUrl}" onclick="window.open('${msg.mediaUrl}')">`;
        }
        
        let reactionsHtml = '';
        if (msg.reactions) {
            for (let [emoji, users] of Object.entries(msg.reactions)) {
                reactionsHtml += `<div class="reaction" onclick="addReaction('${msg.id}','${emoji}')">${emoji} <span class="reaction-count">${users.length}</span></div>`;
            }
        }
        
        div.innerHTML = `
            <img class="message-avatar" src="${avatarUrl}">
            <div class="message-content">
                <div class="message-header">
                    <div class="message-author">${escapeHtml(msg.author)} ${roleTag}</div>
                    <div class="message-time">${new Date(msg.time).toLocaleTimeString()}</div>
                </div>
                ${contentHtml}
                <div class="reactions">${reactionsHtml}</div>
            </div>
            <div class="message-menu"><button class="menu-btn" onclick="deleteMessage('${msg.id}','${msg.author}')">🗑️</button></div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    
    function updateRoleUI(role) {
        currentRole = role;
        const roleSpan = document.getElementById("currentRoleDisplay");
        roleSpan.innerHTML = role;
        if (role === "владелец") roleSpan.classList.add("rgb-role");
        else roleSpan.classList.remove("rgb-role");
    }
    
    // ========== ЗАПИСЬ ГОЛОСА ==========
    let mediaRec = null, isRecording = false, audioCtx = null, recordedSamples = [], recordTimer = null, recordedBlob = null;
    const recordBtn = document.getElementById("recordBtn"), cancelBtn = document.getElementById("cancelVoiceBtn"), recTimerSpan = document.getElementById("recTimer"), waveVisual = document.getElementById("waveVisual");
    
    async function startRecording() {
        if (isRecording) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new AudioContext();
            const source = audioCtx.createMediaStreamSource(stream);
            const processor = audioCtx.createScriptProcessor(4096, 1, 1);
            recordedSamples = [];
            processor.onaudioprocess = (e) => { if (isRecording) recordedSamples.push(new Float32Array(e.inputBuffer.getChannelData(0))); };
            source.connect(processor); processor.connect(audioCtx.destination);
            isRecording = true;
            recordBtn.classList.add("recording-active"); recordBtn.innerText = "⏹️";
            cancelBtn.style.display = "inline-flex"; waveVisual.style.display = "inline-flex";
            let seconds = 0;
            recordTimer = setInterval(() => {
                seconds++;
                recTimerSpan.innerText = `🔴 ${seconds}s / 20s`;
                if (seconds >= 20) stopAndSend();
            }, 1000);
        } catch(e) { recTimerSpan.innerText = "❌"; }
    }
    
    function stopAndSend() {
        if (!isRecording) return;
        isRecording = false;
        clearInterval(recordTimer);
        if (audioCtx) audioCtx.close();
        const total = recordedSamples.reduce((a,b)=>a+b.length,0);
        const combined = new Float32Array(total);
        let off = 0;
        for (let arr of recordedSamples) { combined.set(arr, off); off += arr.length; }
        if (combined.length > 3000) {
            const int16 = new Int16Array(combined.length);
            for (let i = 0; i < combined.length; i++) int16[i] = combined[i] * 0x7FFF;
            const mp3encoder = new lamejs.Mp3Encoder(1, 44100, 128);
            let mp3Data = [];
            for (let i = 0; i < int16.length; i += 1152) {
                let chunk = int16.subarray(i, i + 1152);
                let buf = mp3encoder.encodeBuffer(chunk);
                if (buf.length) mp3Data.push(buf);
            }
            let end = mp3encoder.flush();
            if (end.length) mp3Data.push(end);
            const blob = new Blob(mp3Data, { type: "audio/mp3" });
            const fd = new FormData(); fd.append("audio", blob);
            fetch("/upload-audio", { method: "POST", body: fd }).then(res=>res.json()).then(data=> socket.emit("voice-msg", data.url));
        }
        recordBtn.classList.remove("recording-active"); recordBtn.innerText = "🎙️";
        cancelBtn.style.display = "none"; waveVisual.style.display = "none";
        recTimerSpan.innerText = "";
    }
    
    function cancelRecording() {
        if (isRecording) {
            isRecording = false;
            clearInterval(recordTimer);
            if (audioCtx) audioCtx.close();
            recordBtn.classList.remove("recording-active"); recordBtn.innerText = "🎙️";
            cancelBtn.style.display = "none"; waveVisual.style.display = "none";
            recTimerSpan.innerText = "🗑 Отменено";
            setTimeout(() => recTimerSpan.innerText = "", 1000);
        }
    }
    
    recordBtn.onclick = () => { if (isRecording) stopAndSend(); else startRecording(); };
    cancelBtn.onclick = cancelRecording;
    
    // ========== ГОЛОСОВОЙ ЧАТ ==========
    let voiceStream = null, voicePeers = {}, inVoice = false;
    async function joinVoiceChat() {
        if (inVoice) return;
        inVoice = true;
        voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        let ctx = new AudioContext(), src = ctx.createMediaStreamSource(voiceStream), analyser = ctx.createAnalyser();
        src.connect(analyser);
        let data = new Uint8Array(analyser.frequencyBinCount);
        setInterval(() => {
            if (inVoice) { analyser.getByteFrequencyData(data); let vol = data.reduce((a,b)=>a+b,0)/data.length; if (vol > 20) document.body.classList.add("speaking"); else document.body.classList.remove("speaking"); }
        }, 100);
        socket.emit("voice-join", "test");
    }
    
    function createPeer(id, init) {
        let peer = new SimplePeer({ initiator: init, trickle: false, stream: voiceStream, config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] } });
        peer.on("signal", data => socket.emit("signal", { to: id, data }));
        peer.on("stream", remote => { let a = new Audio(); a.srcObject = remote; a.autoplay = true; });
        peer.on("close", () => delete voicePeers[id]);
        voicePeers[id] = peer;
    }
    
    function leaveVoiceChat() { inVoice = false; Object.values(voicePeers).forEach(p=>p.destroy()); voicePeers = {}; if(voiceStream) voiceStream.getTracks().forEach(t=>t.stop()); voiceStream = null; document.body.classList.remove("speaking"); socket.emit("voice-leave", "test"); }
    function muteMic() { if(voiceStream) voiceStream.getAudioTracks().forEach(t=>t.enabled=!t.enabled); }
    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("open"); }
    function openSettings() { document.getElementById("settingsModal").style.display = "flex"; document.getElementById("newNickInput").value = currentUser; document.getElementById("passwordForNick").value = ""; }
    function closeSettings() { document.getElementById("settingsModal").style.display = "none"; }
    async function changeNickname() {
        let newNick = document.getElementById("newNickInput").value.trim();
        let password = document.getElementById("passwordForNick").value;
        if (!newNick || !password) { alert("Введите ник и пароль"); return; }
        const res = await fetch("/change-nick", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ oldUsername: currentUser, newUsername: newNick, password })
        });
        const data = await res.json();
        if (data.success) {
            currentUser = newNick;
            document.getElementById("currentNickDisplay").innerText = currentUser;
            const saved = JSON.parse(localStorage.getItem("nexus_session"));
            saveSession(newNick, saved.password);
            socket.emit("auth", { username: currentUser, room: currentRoom });
            closeSettings();
        } else {
            alert(data.error);
        }
    }
</script>
