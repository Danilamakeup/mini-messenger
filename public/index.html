<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat V2</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #313338;
    color: white;
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 220px;
    background: #2b2d31;
    padding: 10px;
}

.room {
    padding: 8px;
    cursor: pointer;
    border-radius: 6px;
}

.room:hover {
    background: #404249;
}

.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 10px;
    background: #2b2d31;
}

.messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.message-group {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.message-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

.message-content {
    background: #2b2d31;
    padding: 8px;
    border-radius: 8px;
    max-width: 500px;
}

.message-header {
    font-size: 12px;
    opacity: 0.8;
    margin-bottom: 3px;
}

.input {
    display: flex;
    padding: 10px;
    background: #2b2d31;
}

.input input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
    border-radius: 6px;
    background: #404249;
    color: white;
}

.input button {
    margin-left: 10px;
    padding: 10px;
    background: #5865f2;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.media-preview {
    max-width: 200px;
    border-radius: 8px;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h3>Rooms</h3>
    <div class="room" onclick="joinRoom('general')"># general</div>
    <div class="room" onclick="joinRoom('gaming')"># gaming</div>
    <div class="room" onclick="joinRoom('music')"># music</div>
</div>

<div class="chat">

    <div class="header">
        Room: <span id="currentRoomName">general</span> |
        Online: <span id="online">0</span>
    </div>

    <div class="messages" id="messages"></div>

    <div id="typing" style="padding:5px 10px; opacity:0.7;"></div>

    <div class="input">
        <input id="input" placeholder="message...">
        <input type="file" id="file" style="display:none">
        <button onclick="sendText()">Send</button>
        <button onclick="document.getElementById('file').click()">+</button>
    </div>

</div>

<script>
let socket;
let currentRoom = "general";
let currentUser = "user" + Math.floor(Math.random() * 1000);

/* ================= SAFE ================= */
function escapeHtml(text) {
    return (text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
}

/* ================= SOCKET ================= */
function initSocket() {
    socket = io();

    socket.emit("auth", {
        username: currentUser,
        room: currentRoom
    });

    socket.on("history", (msgs) => {
        const box = document.getElementById("messages");
        box.innerHTML = "";
        msgs.forEach(renderMessage);
    });

    socket.on("chat", renderMessage);

    socket.on("online", (n) => {
        document.getElementById("online").innerText = n;
    });

    socket.on("typing", (user) => {
        document.getElementById("typing").innerText = user + " печатает...";
    });

    socket.on("stop-typing", () => {
        document.getElementById("typing").innerText = "";
    });
}

/* ================= CHAT ================= */
function sendText() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    socket.emit("chat", text);
    socket.emit("stop-typing");

    input.value = "";
}

/* ================= ROOMS ================= */
function joinRoom(room) {
    currentRoom = room;

    document.getElementById("currentRoomName").innerText = room;

    socket.emit("auth", {
        username: currentUser,
        room
    });
}

/* ================= RENDER ================= */
function renderMessage(msg) {
    const box = document.getElementById("messages");

    const div = document.createElement("div");
    div.className = "message-group";

    let content = "";

    if (msg.type === "image") {
        content = `<img class="media-preview" src="${msg.text}">`;
    } else if (msg.type === "video") {
        content = `<video class="media-preview" controls src="${msg.text}"></video>`;
    } else if (msg.type === "audio") {
        content = `<audio controls src="${msg.text}"></audio>`;
    } else {
        content = escapeHtml(msg.text || "");
    }

    div.innerHTML = `
        <img class="message-avatar"
            src="${msg.avatar || 'https://ui-avatars.com/api/?name=' + msg.author}">

        <div class="message-content">
            <div class="message-header">
                <b>${escapeHtml(msg.author)}</b>
                <span>${new Date(msg.time).toLocaleTimeString()}</span>
            </div>
            <div>${content}</div>
        </div>
    `;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

/* ================= MEDIA ================= */
document.getElementById("file").onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const fd = new FormData();
    fd.append("file", file);

    const res = await fetch("/upload-media", {
        method: "POST",
        body: fd
    });

    const data = await res.json();

    socket.emit("media", data.url, data.fileType);
};

/* ================= TYPING ================= */
const input = document.getElementById("input");

input.addEventListener("input", () => {
    socket.emit("typing", currentUser);

    clearTimeout(window.typingTimer);
    window.typingTimer = setTimeout(() => {
        socket.emit("stop-typing");
    }, 800);
});

/* ================= START ================= */
initSocket();
</script>

</body>
</html>
