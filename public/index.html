<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Discord V4</title>
<script src="/socket.io/socket.io.js"></script>

<style>
/* ===== DISCORD LAYOUT ===== */
body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: Arial;
    background: #313338;
    color: white;
}

/* LEFT SERVERS */
.servers {
    width: 70px;
    background: #1e1f22;
}

/* CHANNELS */
.channels {
    width: 240px;
    background: #2b2d31;
    padding: 10px;
}

.channel {
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
}
.channel:hover {
    background: #404249;
}

/* CHAT */
.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.topbar {
    background: #2b2d31;
    padding: 10px;
}

.messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

/* MESSAGE */
.msg {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.msg img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

.bubble {
    background: #2b2d31;
    padding: 8px;
    border-radius: 8px;
    max-width: 600px;
}

/* INPUT */
.input {
    display: flex;
    padding: 10px;
    background: #2b2d31;
}

.input input {
    flex: 1;
    padding: 10px;
    background: #404249;
    border: none;
    color: white;
    border-radius: 6px;
}

.input button {
    margin-left: 10px;
    background: #5865f2;
    border: none;
    color: white;
    padding: 10px;
    border-radius: 6px;
}
</style>
</head>

<body>

<!-- SERVERS -->
<div class="servers"></div>

<!-- CHANNELS -->
<div class="channels">
    <h3>Channels</h3>
    <div class="channel" onclick="join('general')"># general</div>
    <div class="channel" onclick="join('gaming')"># gaming</div>
    <div class="channel" onclick="join('music')"># music</div>
</div>

<!-- CHAT -->
<div class="chat">

<div class="topbar">
Room: <span id="room">general</span> |
Online: <span id="online">0</span>
</div>

<div class="messages" id="messages"></div>

<div class="input">
<input id="inp" placeholder="message">
<button onclick="send()">Send</button>
</div>

</div>

<script>
let socket = io();
let room = "general";
let user = "user" + Math.floor(Math.random()*999);

/* ================= FIX: ONLY JOIN ONCE ================= */
socket.emit("join", { username: user, room });

socket.on("history", (msgs) => {
    const box = document.getElementById("messages");
    box.innerHTML = ""; // 🔥 FIX DUBLES
    msgs.forEach(render);
});

socket.on("message", render);

socket.on("online", (n) => {
    document.getElementById("online").innerText = n;
});

/* SEND */
function send() {
    let i = document.getElementById("inp");
    if (!i.value.trim()) return;

    socket.emit("message", i.value);
    i.value = "";
}

/* JOIN ROOM */
function join(r) {
    room = r;
    document.getElementById("room").innerText = r;

    socket.emit("join", { username: user, room: r });
}

/* RENDER */
function render(m) {
    const box = document.getElementById("messages");

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
        <img src="https://ui-avatars.com/api/?name=${m.author}">
        <div class="bubble">
            <b>${m.author}</b><br>
            ${m.text}
        </div>
    `;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
