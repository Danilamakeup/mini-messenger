<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEXUS — КОСМИЧЕСКИЙ ЧАТ</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

@keyframes galaxy {
    0% { background-position: 0% 0%; }
    50% { background-position: 100% 100%; }
    100% { background-position: 0% 0%; }
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-5px); }
    100% { transform: translateY(0px); }
}

@keyframes messageGlow {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
}

@keyframes neonPulse {
    0% { box-shadow: 0 0 5px #5865f2, 0 0 10px #5865f2; }
    100% { box-shadow: 0 0 15px #5865f2, 0 0 25px #8f9eff; }
}

body {
    background: radial-gradient(ellipse at 20% 30%, #0a0c1a, #020308);
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    color: #ffffff;
    position: relative;
}

/* звездный фон */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 60px 90px, #fff, rgba(0,0,0,0)),
        radial-gradient(3px 3px at 120px 40px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 200px 150px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 300px 80px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 450px 200px, #fff, rgba(0,0,0,0));
    background-size: 500px 500px;
    background-repeat: no-repeat;
    opacity: 0.3;
    pointer-events: none;
    animation: galaxy 20s ease infinite;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
::-webkit-scrollbar-thumb { background: #5865f2; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #8f9eff; }

.app { display: flex; height: 100vh; backdrop-filter: blur(2px); position: relative; z-index: 1; }

.sidebar {
    width: 280px;
    background: rgba(10, 14, 23, 0.75);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(88, 101, 242, 0.3);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 28px;
}

.logo-area {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(88, 101, 242, 0.3);
}

.logo {
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(135deg, #ffffff, #8f9eff, #5865f2);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: float 3s ease-in-out infinite;
}

.settings-btn {
    background: rgba(88, 101, 242, 0.2);
    border: 1px solid rgba(88, 101, 242, 0.5);
    color: white;
    font-size: 20px;
    width: 38px;
    height: 38px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.settings-btn:hover {
    background: #5865f2;
    transform: rotate(90deg);
    box-shadow: 0 0 15px #5865f2;
}

.room {
    padding: 12px 16px;
    margin: 6px 0;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    background: rgba(255,255,255,0.02);
    border: 1px solid transparent;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
}

.room:hover {
    background: rgba(88, 101, 242, 0.25);
    border-color: rgba(88, 101, 242, 0.6);
    transform: translateX(6px);
    box-shadow: 0 0 12px rgba(88, 101, 242, 0.3);
}

.stats {
    margin-top: auto;
    background: rgba(0, 0, 0, 0.4);
    border-radius: 20px;
    padding: 16px;
    font-size: 13px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(88, 101, 242, 0.2);
}

.stat-value {
    color: #8f9eff;
    font-weight: bold;
}

.current-nick {
    margin-top: 10px;
    font-size: 11px;
    color: #8f9eff;
    word-break: break-all;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.1);
}

.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: rgba(8, 10, 18, 0.3);
}

.messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.message-bubble {
    max-width: 80%;
    animation: messageGlow 0.3s ease;
}

.message-name {
    font-size: 12px;
    font-weight: 600;
    color: #a6a9c2;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.message-text {
    background: linear-gradient(135deg, rgba(46, 51, 64, 0.8), rgba(30, 34, 48, 0.8));
    backdrop-filter: blur(12px);
    padding: 12px 20px;
    border-radius: 24px;
    border-top-left-radius: 6px;
    font-size: 14px;
    line-height: 1.5;
    width: fit-content;
    border: 0.5px solid rgba(88, 101, 242, 0.3);
    transition: 0.2s;
}

.message-text:hover {
    border-color: #5865f2;
    box-shadow: 0 0 8px rgba(88, 101, 242, 0.3);
}

.voice-bubble {
    background: linear-gradient(135deg, rgba(46, 51, 64, 0.7), rgba(30, 34, 48, 0.7));
    backdrop-filter: blur(12px);
    padding: 12px 24px;
    border-radius: 34px;
    display: flex;
    align-items: center;
    gap: 16px;
    width: fit-content;
    border: 0.5px solid rgba(88, 101, 242, 0.3);
}

audio {
    border-radius: 40px;
    height: 38px;
    background: #10121c;
    min-width: 250px;
}

audio::-webkit-media-controls-panel {
    background: #1a1d2e;
}

.input-panel { 
    padding: 20px 28px 28px; 
    background: linear-gradient(to top, rgba(0,0,0,0.6), transparent); 
}

.input-wrapper {
    display: flex;
    gap: 12px;
    background: rgba(30, 34, 46, 0.9);
    backdrop-filter: blur(16px);
    border-radius: 60px;
    padding: 6px 6px 6px 22px;
    border: 1px solid rgba(88, 101, 242, 0.4);
    transition: 0.3s;
    flex-wrap: wrap;
}

.input-wrapper:focus-within {
    border-color: #5865f2;
    box-shadow: 0 0 20px rgba(88, 101, 242, 0.3);
}

.input-wrapper input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 14px 0;
    color: white;
    font-size: 15px;
    outline: none;
    min-width: 140px;
}

.btn-icon {
    background: rgba(88, 101, 242, 0.15);
    border: 1px solid rgba(88, 101, 242, 0.3);
    color: white;
    font-size: 18px;
    width: 44px;
    height: 44px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-icon:hover {
    background: #5865f2;
    transform: scale(1.05) translateY(-2px);
    box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
}

.btn-send { 
    background: #5865f2;
    border: none;
}

.btn-send:hover {
    background: #4752c4;
    transform: scale(1.05);
}

.recording-active { 
    background: #e03a3a;
    border-color: #ff6666;
    animation: neonPulse 0.8s infinite;
}

.voice-controls {
    display: flex;
    gap: 8px;
    align-items: center;
}

#recStatus {
    font-size: 11px;
    background: rgba(0,0,0,0.6);
    padding: 6px 12px;
    border-radius: 40px;
    color: #ffaa88;
    font-weight: 500;
}

.speaking { 
    box-shadow: 0 0 0 3px #5865f2, 0 0 0 8px rgba(88, 101, 242, 0.2);
    transition: 0.06s linear;
}

.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(12px);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.modal-content {
    background: linear-gradient(135deg, #1a1d2e, #0f111c);
    border-radius: 32px;
    padding: 32px;
    width: 340px;
    text-align: center;
    border: 1px solid rgba(88, 101, 242, 0.5);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.modal-content h3 {
    margin-bottom: 20px;
    background: linear-gradient(135deg, #fff, #8f9eff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.modal-content input {
    width: 100%;
    padding: 14px;
    margin: 16px 0;
    background: #0f1118;
    border: 1px solid #2c2f3a;
    border-radius: 40px;
    color: white;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
}

.modal-content input:focus {
    border-color: #5865f2;
    box-shadow: 0 0 10px rgba(88, 101, 242, 0.3);
}

.modal-content button {
    background: #5865f2;
    border: none;
    padding: 10px 24px;
    border-radius: 40px;
    color: white;
    cursor: pointer;
    margin: 5px;
    transition: 0.2s;
}

.modal-content button:hover {
    background: #4752c4;
    transform: scale(1.02);
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="logo-area">
            <div class="logo">✨ NEXUS</div>
            <button class="settings-btn" onclick="openSettings()">⚙️</button>
        </div>
        <div>
            <div class="room" onclick="join('general')"> <span>#️⃣</span> general</div>
            <div class="room" onclick="join('gaming')"> <span>🎮</span> gaming</div>
            <div class="room" onclick="join('music')"> <span>🎵</span> music</div>
        </div>
        <div class="stats">
            <div>🌐 Online: <span class="stat-value" id="online">0</span></div>
            <div>🎙️ Voice: <span class="stat-value" id="voiceOnline">0</span></div>
            <div id="roomUsersList" style="font-size:11px; margin-top:10px;"></div>
            <div class="current-nick" id="currentNickDisplay"></div>
        </div>
    </div>
    <div class="chat">
        <div id="messages" class="messages"></div>
        <div class="input-panel">
            <div class="input-wrapper">
                <input id="input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') send()">
                <div class="voice-controls">
                    <button class="btn-icon" id="startRecordBtn" style="background:#2a2f3a;">🎙️</button>
                    <button class="btn-icon" id="sendVoiceBtn" disabled style="background:#3a3f4a;">📤</button>
                    <span id="recStatus"></span>
                </div>
                <button class="btn-icon" onclick="joinVoiceChat()">🔊</button>
                <button class="btn-icon" onclick="muteMic()">🎧</button>
                <button class="btn-icon" onclick="leaveVoiceChat()">❌</button>
                <button class="btn-icon btn-send" onclick="send()">➤</button>
            </div>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>⚙️ НАСТРОЙКИ</h3>
        <input type="text" id="newNickInput" placeholder="Новый никнейм">
        <button onclick="changeNickname()">Сохранить</button>
        <button onclick="closeSettings()">Отмена</button>
    </div>
</div>

<script>
const socket = io();
let name = localStorage.getItem("name") || prompt("🔮 Твой ник:");
if (!name) name = "Explorer";
localStorage.setItem("name", name);

let currentRoom = "general";
let stream = null;
let peers = {};
let inVoice = false;

// Элементы голосовых сообщений
const startRecordBtn = document.getElementById("startRecordBtn");
const sendVoiceBtn = document.getElementById("sendVoiceBtn");
const recStatus = document.getElementById("recStatus");

let mediaRecorder = null;
let audioChunks = [];
let recordingStream = null;
let isRecording = false;
let recordedBlob = null;
let recordTimerInterval = null;
let seconds = 0;

// Функция начала записи (ФИКС: собираем данные каждую секунду)
async function startRecording() {
    if (isRecording) return;
    
    try {
        recStatus.innerText = "🎤 Запрос микрофона...";
        recordingStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // Выбираем поддерживаемый MIME-тип
        let mimeType = 'audio/webm';
        if (!MediaRecorder.isTypeSupported('audio/webm')) {
            if (MediaRecorder.isTypeSupported('audio/mp4')) mimeType = 'audio/mp4';
            else if (MediaRecorder.isTypeSupported('audio/ogg')) mimeType = 'audio/ogg';
        }
        
        mediaRecorder = new MediaRecorder(recordingStream, { mimeType: mimeType });
        audioChunks = [];
        
        // КЛЮЧЕВОЙ ФИКС: собираем данные каждую секунду, а не только в конце
        mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) {
                audioChunks.push(event.data);
                console.log(`Собрано ${audioChunks.length} чанков, общий размер: ${Math.round(event.data.size / 1024)}KB`);
            }
        };
        
        mediaRecorder.onstop = () => {
            if (audioChunks.length > 0) {
                recordedBlob = new Blob(audioChunks, { type: mimeType || 'audio/webm' });
                sendVoiceBtn.disabled = false;
                const sizeKB = Math.round(recordedBlob.size / 1024);
                recStatus.innerText = `✅ ${sizeKB} KB`;
                startRecordBtn.style.background = "#2a2f3a";
                startRecordBtn.style.animation = "none";
                console.log(`Запись завершена, размер: ${sizeKB}KB, чанков: ${audioChunks.length}`);
            } else {
                recStatus.innerText = "❌ Пусто";
                sendVoiceBtn.disabled = true;
            }
            isRecording = false;
            if (recordTimerInterval) clearInterval(recordTimerInterval);
        };
        
        // Запускаем запись с сбором данных каждую секунду (важно!)
        mediaRecorder.start(1000); // <-- ЭТО ГЛАВНЫЙ ФИКС: каждые 1000мс собираем данные
        isRecording = true;
        recordedBlob = null;
        sendVoiceBtn.disabled = true;
        startRecordBtn.style.background = "#e03a3a";
        startRecordBtn.style.animation = "neonPulse 0.8s infinite";
        
        seconds = 0;
        recStatus.innerText = `🔴 ЗАПИСЬ ${seconds}с / 20с`;
        
        // Таймер для отображения и авто-остановки через 20 секунд
        recordTimerInterval = setInterval(() => {
            if (isRecording) {
                seconds++;
                recStatus.innerText = `🔴 ЗАПИСЬ ${seconds}с / 20с`;
                if (seconds >= 20) {
                    stopRecording();
                }
            } else {
                if (recordTimerInterval) clearInterval(recordTimerInterval);
            }
        }, 1000);
        
    } catch (err) {
        console.error("Ошибка микрофона:", err);
        recStatus.innerText = "❌ Нет доступа";
    }
}

// Функция остановки записи
function stopRecording() {
    if (recordTimerInterval) {
        clearInterval(recordTimerInterval);
        recordTimerInterval = null;
    }
    if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
    }
    if (recordingStream) {
        recordingStream.getTracks().forEach(track => track.stop());
        recordingStream = null;
    }
}

// Отправка голосового сообщения
async function sendVoiceMessage() {
    if (!recordedBlob) return;
    
    recStatus.innerText = "📤 Отправка...";
    const formData = new FormData();
    formData.append("audio", recordedBlob, "voice.webm");
    
    try {
        const response = await fetch("/upload", { method: "POST", body: formData });
        const data = await response.json();
        socket.emit("voice-msg", data.url);
        recStatus.innerText = "✅ Отправлено!";
        recordedBlob = null;
        sendVoiceBtn.disabled = true;
        setTimeout(() => {
            if (recStatus.innerText === "✅ Отправлено!") recStatus.innerText = "";
        }, 2000);
    } catch (err) {
        console.error("Ошибка отправки:", err);
        recStatus.innerText = "❌ Ошибка";
    }
}

// Обработчики кнопок
startRecordBtn.onclick = () => {
    if (isRecording) {
        stopRecording();
    } else {
        startRecording();
    }
};
sendVoiceBtn.onclick = sendVoiceMessage;

// Основной чат
function join(room) {
    currentRoom = room;
    messagesDiv.innerHTML = "";
    socket.emit("join", { name, room });
}

function send() {
    const input = document.getElementById("input");
    if (input.value.trim()) {
        socket.emit("chat", input.value);
        input.value = "";
    }
}

const messagesDiv = document.getElementById("messages");
const onlineSpan = document.getElementById("online");
const voiceOnlineSpan = document.getElementById("voiceOnline");
const roomUsersList = document.getElementById("roomUsersList");
const currentNickDisplay = document.getElementById("currentNickDisplay");

function updateNickDisplay() {
    currentNickDisplay.innerText = `👤 ${name}`;
}
updateNickDisplay();

function addMessage(msg) {
    const div = document.createElement("div");
    div.className = "message-bubble";
    if (msg.type === "text") {
        div.innerHTML = `<div class="message-name"><span>${escapeHtml(msg.name)}</span></div><div class="message-text">${escapeHtml(msg.text)}</div>`;
    } else if (msg.type === "voice") {
        const audioUrl = msg.audio;
        div.innerHTML = `<div class="message-name"><span>🎙️ ${escapeHtml(msg.name)}</span></div><div class="voice-bubble"><audio controls preload="auto" src="${audioUrl}"></audio></div>`;
        // Принудительно загружаем аудио
        setTimeout(() => {
            const audio = div.querySelector('audio');
            if (audio) audio.load();
        }, 50);
    }
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function escapeHtml(str) { 
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); 
}

socket.on("history", msgs => { messagesDiv.innerHTML = ""; msgs.forEach(addMessage); });
socket.on("chat", addMessage);
socket.on("online", n => onlineSpan.innerText = n);
socket.on("voice-count", n => voiceOnlineSpan.innerText = n);
socket.on("room-users", list => { 
    if (list && list.length) roomUsersList.innerText = "👥 " + list.join(", ");
    else roomUsersList.innerText = "";
});

// Настройки
function openSettings() {
    document.getElementById("settingsModal").style.display = "flex";
    document.getElementById("newNickInput").value = name;
}
function closeSettings() {
    document.getElementById("settingsModal").style.display = "none";
}
function changeNickname() {
    const newNick = document.getElementById("newNickInput").value.trim();
    if (newNick && newNick !== name) {
        name = newNick;
        localStorage.setItem("name", name);
        updateNickDisplay();
        socket.emit("join", { name, room: currentRoom });
        closeSettings();
    }
}

// Голосовой чат
async function joinVoiceChat() {
    if (inVoice) return;
    inVoice = true;
    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const ctx = new AudioContext();
        const src = ctx.createMediaStreamSource(stream);
        const analyser = ctx.createAnalyser();
        src.connect(analyser);
        const data = new Uint8Array(analyser.frequencyBinCount);
        function checkVolume() {
            if (!inVoice) return;
            analyser.getByteFrequencyData(data);
            const vol = data.reduce((a,b)=>a+b,0)/data.length;
            if (vol > 20) document.body.classList.add("speaking");
            else document.body.classList.remove("speaking");
            requestAnimationFrame(checkVolume);
        }
        checkVolume();
        socket.emit("voice-join", currentRoom);
    } catch(e) { inVoice = false; }
}

socket.on("voice-user", id => { if (stream) createPeer(id, true); });
socket.on("user-joined", id => { if (stream) createPeer(id, false); });
socket.on("signal", ({ from, data }) => {
    if (!peers[from]) createPeer(from, false);
    peers[from]?.signal(data);
});

function createPeer(id, init) {
    const peer = new SimplePeer({ 
        initiator: init, 
        trickle: false, 
        stream, 
        config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] } 
    });
    peer.on("signal", data => socket.emit("signal", { to: id, data }));
    peer.on("stream", remote => { const a = new Audio(); a.srcObject = remote; a.autoplay = true; });
    peer.on("close", () => delete peers[id]);
    peers[id] = peer;
}

function leaveVoiceChat() {
    inVoice = false;
    Object.values(peers).forEach(p => p.destroy());
    peers = {};
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = null;
    document.body.classList.remove("speaking");
    socket.emit("voice-leave", currentRoom);
}

function muteMic() { 
    if (stream) stream.getAudioTracks().forEach(t => t.enabled = !t.enabled); 
}

join("general");
</script>
</body>
</html>
