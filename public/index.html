<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Discord MAX</title>

<style>
body{
    margin:0;
    background:#313338;
    color:white;
    font-family:Arial;
}

.app{display:flex;height:100vh;}

.sidebar{
    width:200px;
    background:#2b2d31;
    padding:10px;
}

.room{
    padding:10px;
    cursor:pointer;
}

.chat{
    flex:1;
    display:flex;
    flex-direction:column;
}

.messages{
    flex:1;
    overflow:auto;
    padding:10px;
}

.input{
    display:flex;
    padding:10px;
    background:#2b2d31;
}

input{
    flex:1;
    padding:10px;
}

button{
    margin-left:5px;
    padding:10px;
}

.speaking{
    box-shadow:0 0 20px lime;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
    <div onclick="join('general')">general</div>
    <div onclick="join('gaming')">gaming</div>
    <div onclick="join('music')">music</div>

    <hr>
    Online: <span id="online">0</span><br>
    Voice online: <span id="voiceOnline">0</span>
</div>

<div class="chat">

<div id="messages" class="messages"></div>

<div class="input">
    <input id="input" onkeydown="if(event.key==='Enter') send()">

    <button onclick="send()">➤</button>
    <button onclick="voiceMsg()">🔊</button>
    <button onclick="joinVoice()">🎤</button>
    <button onclick="mute()">🎧</button>
    <button onclick="leaveVoice()">❌</button>
</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-peer/simplepeer.min.js"></script>

<script>
const socket = io();

let name = localStorage.getItem("name") || prompt("Nick");
localStorage.setItem("name", name);

let room="general";
let stream=null;
let peers={};
let inVoice=false;

// JOIN
function join(r){
    room=r;
    messages.innerHTML="";
    socket.emit("join",{name,room});
}

// CHAT
function send(){
    if(input.value){
        socket.emit("chat",input.value);
        input.value="";
    }
}

// RENDER
function add(m){
    const d=document.createElement("div");

    if(m.type==="text"){
        d.innerText=m.name+": "+m.text;
    }

    if(m.type==="voice"){
        const a=document.createElement("audio");
        a.src=m.audio;
        a.controls=true;
        d.innerText=m.name+": ";
        d.appendChild(a);
    }

    messages.appendChild(d);
}

socket.on("history",msgs=>{
    messages.innerHTML="";
    msgs.forEach(add);
});

socket.on("chat",add);

// 🔊 VOICE MSG (15 СЕКУНД)
async function voiceMsg(){

    const s=await navigator.mediaDevices.getUserMedia({audio:true});
    const rec=new MediaRecorder(s);

    let chunks=[];

    rec.ondataavailable=e=>chunks.push(e.data);

    rec.onstop=async()=>{
        const blob=new Blob(chunks,{type:"audio/webm"});
        const fd=new FormData();
        fd.append("audio",blob);

        const res=await fetch("/upload",{method:"POST",body:fd});
        const data=await res.json();

        socket.emit("voice-msg",data.url);
    };

    rec.start();

    // 🔥 ВОТ ФИКС
    setTimeout(()=>rec.stop(),15000);
}

// 🎤 VOICE CHAT
async function joinVoice(){

    if(inVoice) return;
    inVoice=true;

    stream=await navigator.mediaDevices.getUserMedia({audio:true});

    setupSpeaking(stream);

    socket.emit("voice-join",room);
}

socket.on("voice-user",id=>{
    createPeer(id,true);
});

socket.on("user-joined",id=>{
    createPeer(id,false);
});

socket.on("signal",({from,data})=>{
    if(!peers[from]) createPeer(from,false);
    peers[from].signal(data);
});

function createPeer(id,initiator){

    const peer=new SimplePeer({
        initiator,
        trickle:false,
        stream,
        config:{
            iceServers:[{urls:"stun:stun.l.google.com:19302"}]
        }
    });

    peer.on("signal",data=>{
        socket.emit("signal",{to:id,data});
    });

    peer.on("stream",remote=>{
        const a=new Audio();
        a.srcObject=remote;
        a.autoplay=true;
        a.play().catch(()=>{});
    });

    peer.on("close",()=>delete peers[id]);
    peer.on("error",()=>delete peers[id]);

    peers[id]=peer;
}

// LEAVE
function leaveVoice(){
    inVoice=false;

    Object.values(peers).forEach(p=>p.destroy());
    peers={};

    if(stream){
        stream.getTracks().forEach(t=>t.stop());
        stream=null;
    }
}

// MUTE
function mute(){
    if(stream){
        stream.getAudioTracks().forEach(t=>t.enabled=!t.enabled);
    }
}

// SPEAKING
function setupSpeaking(stream){
    const ctx=new AudioContext();
    const src=ctx.createMediaStreamSource(stream);
    const analyser=ctx.createAnalyser();

    src.connect(analyser);

    const data=new Uint8Array(analyser.frequencyBinCount);

    setInterval(()=>{
        analyser.getByteFrequencyData(data);

        const vol=data.reduce((a,b)=>a+b)/data.length;

        if(vol>20){
            document.body.classList.add("speaking");
        }else{
            document.body.classList.remove("speaking");
        }

    },100);
}

// ONLINE
socket.on("online",n=>online.innerText=n);
socket.on("voice-count",n=>voiceOnline.innerText=n);

join("general");
</script>

</body>
</html>
