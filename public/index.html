<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — MP3 Voice</title>
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: radial-gradient(circle at 20% 30%, #0a0c14, #020308);
    font-family: 'Inter', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    color: #fff;
}

/* остальной CSS такой же как в прошлый раз, но я сокращу для читаемости */
.app { display: flex; height: 100vh; }
.sidebar {
    width: 260px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(16px);
    padding: 20px;
    border-right: 1px solid rgba(255,255,255,0.1);
}
.room {
    padding: 12px;
    margin: 8px 0;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
}
.room:hover { background: #5865f2; transform: translateX(5px); }
.chat { flex: 1; display: flex; flex-direction: column; }
.messages { flex: 1; overflow-y: auto; padding: 20px; }
.input-panel { padding: 20px; background: rgba(0,0,0,0.5); }
.input-wrapper {
    display: flex;
    gap: 10px;
    background: #1e1f28;
    border-radius: 40px;
    padding: 5px 15px;
}
.input-wrapper input {
    flex: 1;
    background: none;
    border: none;
    color: white;
    padding: 12px;
    outline: none;
}
button {
    background: #5865f2;
    border: none;
    color: white;
    padding: 10px 16px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 16px;
}
button:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-icon {
    background: #2c2f3a;
    width: 42px;
    padding: 8px;
}
.recording-active { background: #e03a3a; animation: pulse 1s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
.message { margin-bottom: 16px; }
.message-name { font-size: 12px; color: #aaa; margin-bottom: 4px; }
.message-text {
    background: #2c2f3a;
    padding: 8px 14px;
    border-radius: 18px;
    display: inline-block;
}
.voice-bubble {
    background: #2c2f3a;
    padding: 12px 20px;
    border-radius: 28px;
    display: inline-block;
}
audio { border-radius: 30px; height: 36px; }
.speaking { box-shadow: 0 0 0 3px #5865f2; transition: 0.05s; }
</style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <h3>✨ NEXUS</h3>
        <div class="room" onclick="join('general')"># general</div>
        <div class="room" onclick="join('gaming')">🎮 gaming</div>
        <div class="room" onclick="join('music')">🎵 music</div>
        <hr style="margin: 20px 0; border-color:#333;">
        <div>🌐 Online: <span id="online">0</span></div>
        <div>🎙️ Voice: <span id="voiceOnline">0</span></div>
        <div id="roomUsersList" style="font-size:12px; margin-top:10px;"></div>
        <div style="margin-top:20px;">👤 <span id="currentNickDisplay"></span></div>
        <button onclick="openSettings()" style="margin-top:20px; background:#444;">⚙️ Сменить ник</button>
    </div>
    <div class="chat">
        <div id="messages" class="messages"></div>
        <div class="input-panel">
            <div class="input-wrapper">
                <input id="input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') send()">
                <button id="recordBtn" class="btn-icon">🎙️</button>
                <span id="recTimer" style="color:#ff8888; font-size:13px;"></span>
                <button onclick="sendVoiceNow()" id="sendVoiceBtn" disabled>📤</button>
                <button onclick="joinVoiceChat()">🔊</button>
                <button onclick="muteMic()">🎧</button>
                <button onclick="leaveVoiceChat()">❌</button>
                <button onclick="send()" style="background:#5865f2;">➤</button>
            </div>
        </div>
    </div>
</div>

<div id="settingsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1000;">
    <div style="background:#1e1f28; padding:30px; border-radius:24px; width:300px; text-align:center;">
        <h3>Сменить ник</h3>
        <input type="text" id="newNickInput" style="width:100%; margin:15px 0; padding:10px; border-radius:20px; border:none;">
        <button onclick="changeNickname()">Сохранить</button>
        <button onclick="closeSettings()">Отмена</button>
    </div>
</div>

<script>
// ==================== НАСТРОЙКИ ====================
let name = localStorage.getItem("name") || prompt("Твой ник:");
if (!name) name = "User";
localStorage.setItem("name", name);
document.getElementById("currentNickDisplay").innerText = name;

let currentRoom = "general";
const socket = io();

// ==================== MP3 ЗАПИСЬ ====================
let mediaStream = null;
let isRecording = false;
let audioContext = null;
let sourceNode = null;
let processorNode = null;
let recordedSamples = [];
let recordStartTime = 0;
let recordTimerInterval = null;
let recordedBlob = null;

const recordBtn = document.getElementById("recordBtn");
const sendVoiceBtn = document.getElementById("sendVoiceBtn");
const recTimer = document.getElementById("recTimer");

// Конвертация Float32 в Int16 для MP3
function floatToInt16(buffer) {
    let l = buffer.length;
    let buf = new Int16Array(l);
    for (let i = 0; i < l; i++) {
        let s = Math.max(-1, Math.min(1, buffer[i]));
        buf[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    return buf;
}

// Кодирование в MP3 через lamejs
function encodeToMP3(samples, sampleRate = 44100) {
    let int16Samples = floatToInt16(samples);
    let mp3Data = [];
    let mp3encoder = new lamejs.Mp3Encoder(1, sampleRate, 128);
    let remaining = int16Samples.length;
    let maxSamples = 1152;
    for (let i = 0; i < int16Samples.length; i += maxSamples) {
        let chunk = int16Samples.subarray(i, i + maxSamples);
        let mp3buf = mp3encoder.encodeBuffer(chunk);
        if (mp3buf.length > 0) mp3Data.push(mp3buf);
    }
    let endBuf = mp3encoder.flush();
    if (endBuf.length > 0) mp3Data.push(endBuf);
    return new Blob(mp3Data, { type: "audio/mp3" });
}

// Старт записи
async function startRecording() {
    if (isRecording) return;
    try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        sourceNode = audioContext.createMediaStreamSource(mediaStream);
        processorNode = audioContext.createScriptProcessor(4096, 1, 1);
        
        recordedSamples = [];
        processorNode.onaudioprocess = (event) => {
            if (!isRecording) return;
            let inputData = event.inputBuffer.getChannelData(0);
            let copy = new Float32Array(inputData.length);
            copy.set(inputData);
            recordedSamples.push(copy);
        };
        
        sourceNode.connect(processorNode);
        processorNode.connect(audioContext.destination);
        
        isRecording = true;
        recordStartTime = Date.now();
        recordBtn.classList.add("recording-active");
        recordBtn.innerText = "⏹️";
        
        let seconds = 0;
        recordTimerInterval = setInterval(() => {
            if (isRecording) {
                seconds = Math.floor((Date.now() - recordStartTime) / 1000);
                recTimer.innerText = `🔴 ${seconds}с / 20с`;
                if (seconds >= 20) stopRecording();
            }
        }, 1000);
        
    } catch(e) {
        console.error("Микрофон не доступен", e);
        recTimer.innerText = "❌ Ошибка микрофона";
    }
}

// Стоп записи
function stopRecording() {
    if (!isRecording) return;
    isRecording = false;
    if (recordTimerInterval) clearInterval(recordTimerInterval);
    
    if (processorNode) processorNode.disconnect();
    if (sourceNode) sourceNode.disconnect();
    if (audioContext) audioContext.close();
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    
    // Объединяем все сэмплы в один массив
    let totalLength = recordedSamples.reduce((acc, arr) => acc + arr.length, 0);
    let combined = new Float32Array(totalLength);
    let offset = 0;
    for (let arr of recordedSamples) {
        combined.set(arr, offset);
        offset += arr.length;
    }
    
    if (combined.length > 1000) {
        let mp3Blob = encodeToMP3(combined, audioContext ? audioContext.sampleRate : 44100);
        recordedBlob = mp3Blob;
        sendVoiceBtn.disabled = false;
        recTimer.innerText = `✅ ${Math.round(mp3Blob.size / 1024)}KB`;
    } else {
        recTimer.innerText = "❌ Слишком коротко";
        sendVoiceBtn.disabled = true;
    }
    
    recordBtn.classList.remove("recording-active");
    recordBtn.innerText = "🎙️";
}

// Отправка MP3
async function sendVoiceNow() {
    if (!recordedBlob) return;
    recTimer.innerText = "📤 Отправка...";
    const fd = new FormData();
    fd.append("audio", recordedBlob, "voice.mp3");
    try {
        let res = await fetch("/upload", { method: "POST", body: fd });
        let data = await res.json();
        socket.emit("voice-msg", data.url);
        recTimer.innerText = "✅ Отправлено!";
        sendVoiceBtn.disabled = true;
        recordedBlob = null;
        setTimeout(() => { if (recTimer.innerText === "✅ Отправлено!") recTimer.innerText = ""; }, 2000);
    } catch(e) {
        recTimer.innerText = "❌ Ошибка";
    }
}

recordBtn.onclick = () => {
    if (isRecording) stopRecording();
    else startRecording();
};

// ==================== ОБЫЧНЫЙ ЧАТ ====================
function join(room) {
    currentRoom = room;
    document.getElementById("messages").innerHTML = "";
    socket.emit("join", { name, room });
}

function send() {
    let input = document.getElementById("input");
    if (input.value.trim()) {
        socket.emit("chat", input.value);
        input.value = "";
    }
}

function addMessage(msg) {
    let div = document.createElement("div");
    div.className = "message";
    if (msg.type === "text") {
        div.innerHTML = `<div class="message-name">${escapeHtml(msg.name)}</div><div class="message-text">${escapeHtml(msg.text)}</div>`;
    } else if (msg.type === "voice") {
        div.innerHTML = `<div class="message-name">🎙️ ${escapeHtml(msg.name)}</div><div class="voice-bubble"><audio controls src="${msg.audio}"></audio></div>`;
    }
    document.getElementById("messages").appendChild(div);
    div.scrollIntoView();
}

function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

socket.on("history", msgs => { document.getElementById("messages").innerHTML = ""; msgs.forEach(addMessage); });
socket.on("chat", addMessage);
socket.on("online", n => document.getElementById("online").innerText = n);
socket.on("voice-count", n => document.getElementById("voiceOnline").innerText = n);
socket.on("room-users", list => document.getElementById("roomUsersList").innerText = "👥 " + (list ? list.join(", ") : ""));

// ==================== НИКНЕЙМ ====================
function openSettings() { document.getElementById("settingsModal").style.display = "flex"; }
function closeSettings() { document.getElementById("settingsModal").style.display = "none"; }
function changeNickname() {
    let newNick = document.getElementById("newNickInput").value.trim();
    if (newNick && newNick !== name) {
        name = newNick;
        localStorage.setItem("name", name);
        document.getElementById("currentNickDisplay").innerText = name;
        socket.emit("join", { name, room: currentRoom });
        closeSettings();
    }
}

// ==================== ГОЛОСОВОЙ ЧАТ ====================
let voiceStream = null;
let voicePeers = {};
let inVoice = false;

async function joinVoiceChat() {
    if (inVoice) return;
    inVoice = true;
    voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    let ctx = new AudioContext();
    let src = ctx.createMediaStreamSource(voiceStream);
    let analyser = ctx.createAnalyser();
    src.connect(analyser);
    let data = new Uint8Array(analyser.frequencyBinCount);
    setInterval(() => {
        if (!inVoice) return;
        analyser.getByteFrequencyData(data);
        let vol = data.reduce((a,b)=>a+b,0)/data.length;
        if (vol > 20) document.body.classList.add("speaking");
        else document.body.classList.remove("speaking");
    }, 100);
    socket.emit("voice-join", currentRoom);
}

socket.on("voice-user", id => { if (voiceStream) createPeer(id, true); });
socket.on("user-joined", id => { if (voiceStream) createPeer(id, false); });
socket.on("signal", ({ from, data }) => {
    if (!voicePeers[from]) createPeer(from, false);
    voicePeers[from]?.signal(data);
});

function createPeer(id, init) {
    let peer = new SimplePeer({ initiator: init, trickle: false, stream: voiceStream, config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] } });
    peer.on("signal", data => socket.emit("signal", { to: id, data }));
    peer.on("stream", remote => { let a = new Audio(); a.srcObject = remote; a.autoplay = true; });
    peer.on("close", () => delete voicePeers[id]);
    voicePeers[id] = peer;
}

function leaveVoiceChat() {
    inVoice = false;
    Object.values(voicePeers).forEach(p => p.destroy());
    voicePeers = {};
    if (voiceStream) voiceStream.getTracks().forEach(t => t.stop());
    voiceStream = null;
    document.body.classList.remove("speaking");
    socket.emit("voice-leave", currentRoom);
}

function muteMic() { if (voiceStream) voiceStream.getAudioTracks().forEach(t => t.enabled = !t.enabled); }

join("general");
</script>
</body>
</html>
