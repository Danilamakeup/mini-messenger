<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>V3 Chat</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body {
    margin:0;
    display:flex;
    height:100vh;
    font-family:Arial;
    background:#1e1f22;
    color:white;
}

/* SIDEBAR */
.sidebar {
    width:240px;
    background:#2b2d31;
    padding:10px;
}

.room {
    padding:8px;
    cursor:pointer;
    border-radius:6px;
}
.room:hover { background:#404249; }

/* CHAT */
.chat {
    flex:1;
    display:flex;
    flex-direction:column;
}

.header {
    padding:10px;
    background:#2b2d31;
}

.messages {
    flex:1;
    overflow:auto;
    padding:10px;
}

/* MESSAGE */
.msg {
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.msg img {
    width:40px;
    height:40px;
    border-radius:50%;
}

.bubble {
    background:#2b2d31;
    padding:8px;
    border-radius:8px;
    max-width:500px;
}

.meta {
    font-size:12px;
    opacity:.7;
}

.actions span {
    margin-right:8px;
    cursor:pointer;
    opacity:.7;
}
.actions span:hover { opacity:1; }

/* INPUT */
.input {
    display:flex;
    padding:10px;
    background:#2b2d31;
}

.input input {
    flex:1;
    padding:10px;
    background:#404249;
    border:none;
    color:white;
    border-radius:6px;
}

.input button {
    margin-left:10px;
    background:#5865f2;
    border:none;
    color:white;
    padding:10px;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h3>Channels</h3>
    <div class="room" onclick="join('general')"># general</div>
    <div class="room" onclick="join('gaming')"># gaming</div>
    <div class="room" onclick="join('music')"># music</div>
</div>

<div class="chat">

<div class="header">
Room: <span id="room">general</span> |
Online: <span id="online">0</span>
</div>

<div class="messages" id="messages"></div>

<div id="typing"></div>

<div class="input">
<input id="inp" placeholder="message">
<button onclick="send()">Send</button>
</div>

</div>

<script>
let socket = io();
let room = "general";
let user = "user"+Math.floor(Math.random()*999);

socket.emit("auth",{username:user,room});

/* ===== LOAD ===== */
socket.on("history",m=>{
    m.forEach(render);
});

socket.on("chat",render);

socket.on("online",n=>{
    document.getElementById("online").innerText=n;
});

/* UPDATE */
socket.on("update",msg=>{
    document.querySelector(`[data-id="${msg.id}"] .text`).innerText = msg.text;
});

socket.on("delete",id=>{
    document.querySelector(`[data-id="${id}"]`).remove();
});

socket.on("reaction",data=>{
    let el = document.querySelector(`[data-id="${data.id}"] .reactions`);
    if(el) el.innerText = JSON.stringify(data.reactions);
});

/* TYPING */
socket.on("typing",u=>{
    document.getElementById("typing").innerText = u+" печатает...";
});
socket.on("stop-typing",()=>{
    document.getElementById("typing").innerText = "";
});

/* SEND */
function send(){
    let i=document.getElementById("inp");
    socket.emit("chat",i.value);
    i.value="";
}

/* ROOM */
function join(r){
    room=r;
    document.getElementById("room").innerText=r;
    socket.emit("auth",{username:user,room:r});
}

/* RENDER */
function render(m){
    let div=document.createElement("div");
    div.className="msg";
    div.dataset.id=m.id;

    div.innerHTML=`
        <img src="https://ui-avatars.com/api/?name=${m.author}">
        <div class="bubble">
            <div class="meta">${m.author}</div>
            <div class="text">${m.text}</div>
            <div class="actions">
                <span onclick="socket.emit('react',{id:'${m.id}',emoji:'🔥'})">🔥</span>
                <span onclick="socket.emit('delete','${m.id}')">🗑</span>
                <span onclick="edit('${m.id}')">✏</span>
            </div>
            <div class="reactions"></div>
        </div>
    `;
    document.getElementById("messages").appendChild(div);
}

/* EDIT */
function edit(id){
    let newText = prompt("edit:");
    socket.emit("edit",{id,newText});
}

/* TYPING */
let inp=document.getElementById("inp");
inp.oninput=()=>{
    socket.emit("typing");
    clearTimeout(window.t);
    window.t=setTimeout(()=>socket.emit("stop-typing"),800);
}
</script>

</body>
</html>
