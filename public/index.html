<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEXUS — МЕССЕНДЖЕР</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* ========== ТЕМЫ ========== */
        body.dark {
            --bg-primary: #1e1f22;
            --bg-secondary: #2b2d31;
            --bg-tertiary: #313338;
            --bg-hover: #3b3f48;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --success: #23a55a;
            --danger: #f23f42;
            --warning: #f0b232;
            --border: #1e1f22;
        }
        body.light {
            --bg-primary: #f2f3f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f6f6f7;
            --bg-hover: #e3e5e8;
            --text-normal: #2c2f33;
            --text-muted: #4f545c;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --success: #23a55a;
            --danger: #f23f42;
            --warning: #f0b232;
            --border: #e3e5e8;
        }
        body.midnight {
            --bg-primary: #0a0a14;
            --bg-secondary: #12121c;
            --bg-tertiary: #18182a;
            --bg-hover: #20203a;
            --text-normal: #e0e0ff;
            --text-muted: #a0a0c0;
            --accent: #7c3aed;
            --accent-hover: #8b5cf6;
            --border: #1a1a2e;
        }
        body.forest {
            --bg-primary: #0a1f0a;
            --bg-secondary: #0d2b0d;
            --bg-tertiary: #123a12;
            --bg-hover: #1a4a1a;
            --text-normal: #d0ffd0;
            --text-muted: #90c090;
            --accent: #10b981;
            --accent-hover: #34d399;
            --border: #1a3a1a;
        }
        body.ocean {
            --bg-primary: #0a1a2a;
            --bg-secondary: #0d2a3a;
            --bg-tertiary: #123a4a;
            --bg-hover: #1a4a5a;
            --text-normal: #c0f0ff;
            --text-muted: #80c0d0;
            --accent: #00b4d8;
            --accent-hover: #48cae4;
            --border: #1a3a4a;
        }
        body.custom {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2a2a2a;
            --bg-tertiary: #353535;
            --bg-hover: #454545;
            --text-normal: #ffffff;
            --text-muted: #aaaaaa;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --border: #333333;
        }
        
        body {
            background: var(--bg-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            color: var(--text-normal);
            transition: background 0.2s, color 0.2s;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        
        /* Логин */
        .login-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .login-box {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 32px;
            width: 340px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .login-box h2 { margin-bottom: 20px; color: var(--accent); }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: var(--bg-primary);
            color: var(--text-normal);
            outline: none;
        }
        .login-box button {
            background: var(--accent);
            border: none;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .login-box button:hover { background: var(--accent-hover); }
        .switch-mode { margin-top: 16px; font-size: 13px; color: var(--accent); cursor: pointer; }
        .login-error { color: var(--danger); margin-top: 12px; font-size: 13px; }
        
        /* Основной интерфейс */
        .app { display: flex; height: 100vh; }
        
        /* Левый сайдбар */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
            z-index: 10;
            border-right: 1px solid var(--border);
        }
        .server-header {
            padding: 18px 16px;
            font-weight: 700;
            font-size: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .server-header:hover { background: var(--bg-hover); }
        .servers-list {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .server-item {
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            margin: 4px 0;
        }
        .server-item:hover { background: var(--bg-hover); }
        .server-item.active { background: var(--accent); color: white; }
        .create-server-btn {
            background: var(--accent);
            border: none;
            border-radius: 10px;
            padding: 8px;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        
        .rooms-list { flex: 1; padding: 12px; overflow-y: auto; }
        .room {
            padding: 10px 12px;
            margin: 4px 0;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
        }
        .room:hover { background: var(--bg-hover); color: var(--text-normal); }
        .room.active { background: var(--bg-hover); color: var(--text-normal); }
        .room.notification { border-left: 3px solid var(--accent); }
        
        .voice-channel {
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }
        .voice-channel-title {
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 8px;
            padding-left: 8px;
            color: var(--text-muted);
        }
        .voice-users-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
        }
        .voice-user {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 8px;
            cursor: pointer;
        }
        .voice-user:hover { background: var(--bg-hover); }
        .voice-user-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        
        /* Список диалогов (ЛС) */
        .dialogs-section {
            border-top: 1px solid var(--border);
            padding: 12px;
        }
        .dialogs-title {
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: var(--text-muted);
        }
        .dialog-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 4px;
        }
        .dialog-item:hover { background: var(--bg-hover); }
        .dialog-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .dialog-name { font-size: 13px; font-weight: 500; flex: 1; }
        
        /* Панель пользователя */
        .user-section {
            padding: 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
        }
        .stats {
            background: var(--bg-primary);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: 12px;
        }
        .stat-value { color: var(--accent); font-weight: bold; }
        .current-user {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-primary);
            padding: 8px 12px;
            border-radius: 12px;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            position: relative;
        }
        .status-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid var(--bg-secondary);
        }
        .status-online { background: #23a55a; }
        .status-idle { background: #f0b232; }
        .status-dnd { background: #f23f42; }
        .status-loading { background: #f09b42; }
        .status-offline { background: #80848e; }
        
        .profile-controls { display: flex; gap: 8px; margin-top: 12px; }
        .profile-btn {
            flex: 1;
            background: var(--bg-primary);
            border: none;
            padding: 6px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            color: var(--text-normal);
        }
        .profile-btn.mic-off { background: var(--danger); color: white; }
        .profile-btn.speaker-off { background: var(--danger); color: white; }
        
        .status-select {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 12px 0;
        }
        .status-option {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .status-option.selected { border-color: var(--accent); }
        .status-online-bg { background: #23a55a; }
        .status-idle-bg { background: #f0b232; }
        .status-dnd-bg { background: #f23f42; }
        .status-loading-bg { background: #f09b42; }
        .status-offline-bg { background: #80848e; }
        
        /* Правый сайдбар (онлайн пользователи) */
        .right-sidebar {
            width: 260px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
        }
        .right-sidebar-title {
            font-size: 11px;
            text-transform: uppercase;
            padding: 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
        }
        .online-users-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .online-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.1s;
            margin-bottom: 4px;
        }
        .online-user:hover { background: var(--bg-hover); }
        .online-user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            position: relative;
        }
        .online-user-name { font-size: 13px; font-weight: 500; flex: 1; }
        .online-user-status { font-size: 10px; }
        
        /* Центральный чат */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }
        .chat-header {
            padding: 16px 20px;
            font-weight: 600;
            font-size: 16px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-tertiary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-btn {
            background: var(--bg-hover);
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            cursor: pointer;
            color: var(--text-normal);
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }
        .message-group {
            padding: 10px 20px;
            display: flex;
            gap: 16px;
            transition: background 0.1s;
            position: relative;
        }
        .message-group:hover { background: var(--bg-tertiary); }
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .message-content { flex: 1; }
        .message-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }
        .message-author { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .message-time { font-size: 11px; color: var(--text-muted); }
        .message-text { font-size: 14px; line-height: 1.4; word-break: break-word; }
        .media-preview { max-width: 300px; max-height: 200px; border-radius: 12px; margin-top: 6px; cursor: pointer; }
        .voice-bubble {
            background: var(--bg-tertiary);
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 4px;
        }
        audio { border-radius: 30px; height: 34px; max-width: 100%; }
        
        .reactions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .reaction {
            background: var(--bg-tertiary);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 13px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .reaction:hover { background: var(--bg-hover); }
        
        .message-menu {
            position: absolute;
            right: 20px;
            top: 8px;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 4px;
            display: none;
            gap: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .message-group:hover .message-menu { display: flex; }
        .menu-btn {
            background: none;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-normal);
        }
        .menu-btn:hover { background: var(--danger); color: white; }
        
        .input-panel {
            padding: 16px 20px 24px;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border);
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            background: var(--bg-primary);
            border-radius: 30px;
            padding: 6px 6px 6px 18px;
            border: 1px solid var(--border);
        }
        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            color: var(--text-normal);
            outline: none;
            font-size: 14px;
        }
        .btn-icon {
            background: var(--bg-hover);
            border: none;
            font-size: 18px;
            width: 42px;
            height: 42px;
            border-radius: 30px;
            cursor: pointer;
            color: var(--text-normal);
        }
        .btn-icon:hover { background: var(--accent); color: white; }
        .btn-send { background: var(--accent); color: white; }
        
        .recording-active { background: var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .wave-container { display: inline-flex; align-items: center; gap: 3px; margin-left: 8px; }
        .wave { width: 3px; height: 12px; background: var(--danger); border-radius: 2px; animation: waveAnim 0.5s infinite alternate; }
        @keyframes waveAnim { from { transform: scaleY(0.5); } to { transform: scaleY(1.5); } }
        
        .speaking { box-shadow: 0 0 0 2px var(--accent); }
        
        @keyframes rgbText { 0% { color: #ff0000; } 33% { color: #00ff00; } 66% { color: #0088ff; } 100% { color: #ff0000; } }
        .rgb-role { animation: rgbText 1.5s infinite linear; font-weight: bold; }
        
        .emoji-picker {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid var(--border);
            display: none;
            flex-wrap: wrap;
            gap: 8px;
            width: 280px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
        }
        .emoji-item { font-size: 28px; cursor: pointer; padding: 5px; border-radius: 8px; }
        .emoji-item:hover { background: var(--bg-hover); transform: scale(1.1); }
        
        .settings-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .settings-box {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 28px;
            width: 340px;
            text-align: center;
        }
        .settings-box input, .settings-box select {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 10px;
            border: none;
            background: var(--bg-primary);
            color: var(--text-normal);
            outline: none;
        }
        .settings-box button {
            background: var(--accent);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            margin: 5px;
            cursor: pointer;
        }
        .settings-divider { margin: 15px 0; border-top: 1px solid var(--border); }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 22px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg-hover);
            transition: 0.2s;
            border-radius: 22px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.2s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(24px); }
        
        .menu-toggle { display: none; }
        @media (max-width: 900px) { .right-sidebar { display: none; } }
        @media (max-width: 700px) {
            .sidebar { position: fixed; left: -280px; top: 0; bottom: 0; z-index: 100; }
            .sidebar.open { left: 0; }
            .menu-toggle { display: flex; position: fixed; bottom: 20px; left: 20px; z-index: 101; background: var(--accent); border: none; width: 48px; height: 48px; border-radius: 30px; align-items: center; justify-content: center; font-size: 24px; color: white; cursor: pointer; }
            .message-menu { display: flex; position: static; margin-top: 6px; background: none; gap: 8px; padding: 0; box-shadow: none; }
        }
    </style>
</head>
<body class="dark">

<div id="loginModal" class="login-modal">
    <div class="login-box">
        <h2 id="formTitle">🔐 Вход</h2>
        <input type="text" id="loginUsername" placeholder="Никнейм">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button id="submitBtn">Войти</button>
        <div class="switch-mode" id="switchMode">Нет аккаунта? Зарегистрироваться</div>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<div class="app" style="display: none;" id="app">
    <div class="sidebar" id="sidebar">
        <div class="server-header" onclick="toggleServerMenu()">
            <span id="currentServerName">✨ NEXUS</span>
            <span>▼</span>
        </div>
        <div class="servers-list" id="serversList"></div>
        
        <div class="rooms-list" id="roomsList"></div>
        
        <div class="dialogs-section" id="dialogsSection">
            <div class="dialogs-title">💬 ЛИЧНЫЕ СООБЩЕНИЯ</div>
            <div id="dialogsList"></div>
        </div>
        
        <div class="user-section">
            <div class="stats">
                <div>🌐 Online: <span class="stat-value" id="online">0</span></div>
                <div>🎙️ Voice: <span class="stat-value" id="voiceOnline">0</span></div>
                <div>💰 Монет: <span class="stat-value" id="userCoins">0</span></div>
            </div>
            <div class="current-user">
                <div style="position: relative;">
                    <img class="avatar" id="myAvatar" src="">
                    <div class="status-dot" id="myStatusDot"></div>
                </div>
                <div style="flex:1">
                    <div id="currentNickDisplay" style="font-weight:600;"></div>
                    <div id="currentRoleDisplay" style="font-size:11px;"></div>
                </div>
                <button onclick="openSettings()" style="background:var(--bg-primary); border:none; width:32px; height:32px; border-radius:50%; cursor:pointer;">⚙️</button>
            </div>
            <div class="profile-controls">
                <button id="profileMicBtn" class="profile-btn" onclick="toggleMic()">🎤 Микрофон</button>
                <button id="profileSpeakerBtn" class="profile-btn" onclick="toggleSpeaker()">🔊 Звук</button>
            </div>
            <div class="status-select" id="statusSelect">
                <div class="status-option status-online-bg" data-status="online" title="В сети"></div>
                <div class="status-option status-idle-bg" data-status="idle" title="Отошёл"></div>
                <div class="status-option status-dnd-bg" data-status="dnd" title="Не беспокоить"></div>
                <div class="status-option status-loading-bg" data-status="loading" title="Загружаюсь"></div>
                <div class="status-option status-offline-bg" data-status="offline" title="Не в сети"></div>
            </div>
        </div>
    </div>

    <div class="chat">
        <div class="chat-header">
            <span># <span id="currentRoomName">general</span></span>
            <button class="chat-btn" onclick="toggleEmojiPicker()">😊</button>
        </div>
        <div id="emojiPicker" class="emoji-picker"></div>
        <div id="messages" class="messages"></div>
        <div class="input-panel">
            <div class="input-wrapper">
                <input id="input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendText()">
                <label class="btn-icon" style="display:inline-flex; align-items:center; justify-content:center; cursor:pointer;">📎<input type="file" id="mediaInput" accept="image/*,video/*,audio/*" style="display:none;"></label>
                <div class="voice-controls">
                    <button class="btn-icon" id="recordBtn">🎙️</button>
                    <button class="btn-icon" id="cancelVoiceBtn" style="display:none; background:var(--danger);">❌</button>
                    <span id="recTimer"></span>
                    <div id="waveVisual" class="wave-container" style="display:none;"><div class="wave"></div><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>
                </div>
                <button class="btn-icon btn-send" onclick="sendText()">➤</button>
            </div>
        </div>
    </div>

    <div class="right-sidebar" id="rightSidebar">
        <div class="right-sidebar-title">👥 ПОЛЬЗОВАТЕЛИ ОНЛАЙН — <span id="onlineCount">0</span></div>
        <div class="online-users-list" id="onlineUsersList"></div>
    </div>
</div>

<button class="menu-toggle" onclick="toggleSidebar()">☰</button>

<div id="settingsModal" class="settings-modal">
    <div class="settings-box">
        <h3>⚙️ НАСТРОЙКИ</h3>
        <input type="text" id="newNickInput" placeholder="Новый никнейм">
        <button onclick="changeNickname()" style="width:100%;">Сменить ник</button>
        <div class="settings-divider"></div>
        <div style="margin: 10px 0;">
            <label>📷 Сменить аватарку</label>
            <input type="file" id="settingsAvatarInput" accept="image/jpeg,image/png,image/gif,image/webp">
        </div>
        <div class="settings-divider"></div>
        
        <!-- NEXUS NITRO (БЕСПЛАТНО) -->
        <div style="margin: 10px 0;">
            <label style="background: linear-gradient(135deg, #ff00ff, #00ffff); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: bold;">✨ NEXUS NITRO (БЕСПЛАТНО) ✨</label>
            <select id="themeSelect" style="width:100%; padding:8px; margin-top:8px;">
                <option value="dark">🌙 Тёмная (по умолчанию)</option>
                <option value="light">☀️ Светлая</option>
                <option value="midnight">🌌 Полночная</option>
                <option value="forest">🌲 Лесная</option>
                <option value="ocean">🌊 Океанская</option>
                <option value="custom">🎨 Своя (выбери цвет)</option>
            </select>
            <input type="color" id="customColor" value="#5865f2" style="margin-top:8px; width:100%; display:none;">
            <button onclick="applyCustomTheme()" style="margin-top:8px; width:100%;">Применить тему</button>
        </div>
        
        <button onclick="closeSettings()" style="background:var(--bg-hover); width:100%;">Закрыть</button>
    </div>
</div>

<script>
    const PROTECTED_NAME = "bigheaven3569";
    
    let currentUser = null, currentRole = null, currentAvatar = null;
    let currentServerId = "main", currentRoom = "general";
    let currentPrivateChat = null;
    let socket = null;
    let voiceStream = null, voicePeers = {}, inVoiceChannel = false;
    let isMicMuted = false, isSpeakerMuted = false;
    let currentStatus = "online";
    let userCoins = 0;
    let friendsList = [];
    let allUsers = [];
    let dialogs = []; // список пользователей с кем есть ЛС
    
    const loginModal = document.getElementById("loginModal");
    const appDiv = document.getElementById("app");
    const loginError = document.getElementById("loginError");
    
    // Эмодзи
    const emojis = ['😀','😂','🥹','😍','🥰','😎','😭','😡','👍','👎','🔥','💀','❤️','💩','🐱','🐶','🎮','🎵'];
    function toggleEmojiPicker() {
        const picker = document.getElementById("emojiPicker");
        if (picker.innerHTML === "") {
            emojis.forEach(emoji => {
                const div = document.createElement("div");
                div.className = "emoji-item";
                div.textContent = emoji;
                div.onclick = () => sendEmoji(emoji);
                picker.appendChild(div);
            });
        }
        picker.style.display = picker.style.display === "flex" ? "none" : "flex";
    }
    function sendEmoji(emoji) {
        if (currentPrivateChat) {
            socket.emit("private-chat", { to: currentPrivateChat, text: emoji });
        } else {
            socket.emit("chat", emoji);
        }
        document.getElementById("emojiPicker").style.display = "none";
    }
    
    // Звуки
    const audioCtxSounds = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(frequency = 800, duration = 0.1, volume = 0.15) {
        try {
            const oscillator = audioCtxSounds.createOscillator();
            const gainNode = audioCtxSounds.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtxSounds.destination);
            oscillator.frequency.value = frequency;
            gainNode.gain.value = volume;
            oscillator.type = "sine";
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtxSounds.currentTime + duration);
            oscillator.stop(audioCtxSounds.currentTime + duration);
        } catch(e) {}
    }
    function playMessageSound() { playBeep(600, 0.08, 0.1); }
    function playRecordStartSound() { playBeep(880, 0.1, 0.2); }
    function playRecordEndSound() { playBeep(440, 0.2, 0.2); }
    
    // Тема
    let currentTheme = localStorage.getItem("theme") || "dark";
    function applyTheme(theme) {
        const body = document.body;
        body.className = theme;
        if (theme === "custom") {
            const customColor = localStorage.getItem("customColor") || "#5865f2";
            body.style.setProperty('--accent', customColor);
            body.style.setProperty('--accent-hover', customColor);
        } else {
            body.style.removeProperty('--accent');
            body.style.removeProperty('--accent-hover');
        }
        localStorage.setItem("theme", theme);
        const themeSelect = document.getElementById("themeSelect");
        if (themeSelect) themeSelect.value = theme;
    }
    
    function applyCustomTheme() {
        const themeSelect = document.getElementById("themeSelect");
        const customColor = document.getElementById("customColor").value;
        if (themeSelect.value === "custom") {
            localStorage.setItem("customColor", customColor);
            applyTheme("custom");
        } else {
            applyTheme(themeSelect.value);
        }
    }
    
    if(document.getElementById("themeSelect")) {
        document.getElementById("themeSelect").addEventListener("change", (e) => {
            if (e.target.value === "custom") {
                document.getElementById("customColor").style.display = "block";
            } else {
                document.getElementById("customColor").style.display = "none";
                applyTheme(e.target.value);
            }
        });
    }
    applyTheme(currentTheme);
    
    // Автологин
    const savedSession = localStorage.getItem("nexus_session");
    if (savedSession) {
        try {
            const { username, password } = JSON.parse(savedSession);
            fetch("/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username, password }) })
                .then(res => res.json()).then(data => {
                    if (data.success) {
                        currentUser = username; currentRole = data.role; currentAvatar = data.avatar;
                        loginModal.style.display = "none"; appDiv.style.display = "flex";
                        initSocket();
                        document.getElementById("currentNickDisplay").innerText = currentUser;
                        updateRoleUI(currentRole);
                        updateAvatar();
                        updateStatusDot("online");
                    } else { localStorage.removeItem("nexus_session"); }
                });
        } catch(e) { localStorage.removeItem("nexus_session"); }
    }
    
    function saveSession(username, password) { localStorage.setItem("nexus_session", JSON.stringify({ username, password })); }
    function updateAvatar() {
        const avatarUrl = currentAvatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser)}&background=5865f2&color=fff&size=36`;
        document.getElementById("myAvatar").src = avatarUrl;
    }
    function updateStatusDot(status) {
        const dot = document.getElementById("myStatusDot");
        dot.className = "status-dot";
        if (status === "online") dot.classList.add("status-online");
        else if (status === "idle") dot.classList.add("status-idle");
        else if (status === "dnd") dot.classList.add("status-dnd");
        else if (status === "loading") dot.classList.add("status-loading");
        else dot.classList.add("status-offline");
    }
    
    let isLoginMode = true;
    const formTitle = document.getElementById("formTitle");
    const submitBtn = document.getElementById("submitBtn");
    const switchMode = document.getElementById("switchMode");
    
    switchMode.onclick = () => {
        isLoginMode = !isLoginMode;
        formTitle.innerText = isLoginMode ? "🔐 Вход" : "📝 Регистрация";
        switchMode.innerText = isLoginMode ? "Нет аккаунта? Зарегистрироваться" : "Уже есть аккаунт? Войти";
        loginError.innerText = "";
    };
    
    submitBtn.onclick = async () => {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value.trim();
        if (!username || !password) { loginError.innerText = "Заполните все поля"; return; }
        
        if (!isLoginMode && username.toLowerCase() === PROTECTED_NAME.toLowerCase()) {
            loginError.innerText = "НИК ЗАНЯТ ИДИ НАХУЙ!!";
            return;
        }
        
        const endpoint = isLoginMode ? "/login" : "/register";
        const res = await fetch(endpoint, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (res.ok) {
            currentUser = username; currentRole = data.role; currentAvatar = data.avatar || null;
            saveSession(username, password);
            loginModal.style.display = "none"; appDiv.style.display = "flex";
            initSocket();
            document.getElementById("currentNickDisplay").innerText = currentUser;
            updateRoleUI(currentRole);
            updateAvatar();
            updateStatusDot("online");
        } else { loginError.innerText = data.error; }
    };
    
    document.getElementById("settingsAvatarInput").onchange = async (e) => {
        const file = e.target.files[0];
        if (!file || !file.type.match(/image\/(jpeg|png|gif|webp)/)) { alert("Можно только PNG, JPG, GIF, WEBP!"); return; }
        const fd = new FormData(); fd.append("avatar", file); fd.append("username", currentUser);
        const res = await fetch("/upload-avatar", { method: "POST", body: fd });
        const data = await res.json();
        if (data.url) { currentAvatar = data.url; updateAvatar(); }
    };
    
    document.getElementById("mediaInput").onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 15 * 1024 * 1024) { alert("❌ Файл больше 15 МБ!"); return; }
        const fd = new FormData(); fd.append("file", file);
        const res = await fetch("/upload-media", { method: "POST", body: fd });
        const data = await res.json();
        if (data.url) socket.emit("media", data.url, data.fileType);
        else alert("Ошибка загрузки");
    };
    
    function toggleMic() {
        if (!voiceStream) { alert("Сначала зайдите в голосовой канал"); return; }
        isMicMuted = !isMicMuted;
        voiceStream.getAudioTracks().forEach(track => track.enabled = !isMicMuted);
        const micBtn = document.getElementById("profileMicBtn");
        if (micBtn) {
            micBtn.innerHTML = isMicMuted ? "🎤🔇 Микрофон" : "🎤🎙️ Микрофон";
            micBtn.classList.toggle("mic-off", isMicMuted);
        }
    }
    
    function toggleSpeaker() {
        isSpeakerMuted = !isSpeakerMuted;
        const speakerBtn = document.getElementById("profileSpeakerBtn");
        if (speakerBtn) {
            speakerBtn.innerHTML = isSpeakerMuted ? "🔊🔇 Звук" : "🔊🔈 Звук";
            speakerBtn.classList.toggle("speaker-off", isSpeakerMuted);
        }
        document.querySelectorAll("audio").forEach(audio => audio.volume = isSpeakerMuted ? 0 : 0.8);
    }
    
    function setupStatusSelect() {
        document.querySelectorAll(".status-option").forEach(opt => {
            opt.addEventListener("click", () => {
                const status = opt.getAttribute("data-status");
                currentStatus = status;
                updateStatusDot(status);
                socket.emit("set-status", { status });
                document.querySelectorAll(".status-option").forEach(o => o.classList.remove("selected"));
                opt.classList.add("selected");
            });
        });
    }
    
    function renderOnlineUsers(users) {
        const container = document.getElementById("onlineUsersList");
        if (!container) return;
        const onlineUsers = users.filter(u => u.username !== currentUser && u.status === "online");
        document.getElementById("onlineCount").innerText = onlineUsers.length;
        container.innerHTML = onlineUsers.map(user => `
            <div class="online-user" onclick="openPrivateChat('${user.username}')">
                <div style="position: relative;">
                    <img class="online-user-avatar" src="${user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.username)}&background=5865f2&color=fff&size=32`}">
                    <div class="status-dot ${user.status === 'online' ? 'status-online' : user.status === 'idle' ? 'status-idle' : user.status === 'dnd' ? 'status-dnd' : user.status === 'loading' ? 'status-loading' : 'status-offline'}" style="width: 8px; height: 8px;"></div>
                </div>
                <div class="online-user-name">${escapeHtml(user.username)}</div>
                <div class="online-user-status">${user.status === 'online' ? '🟢' : user.status === 'idle' ? '🟡' : user.status === 'dnd' ? '🔴' : '⚫'}</div>
            </div>
        `).join("");
    }
    
    function renderDialogs() {
        const container = document.getElementById("dialogsList");
        if (!container) return;
        container.innerHTML = dialogs.map(dialog => `
            <div class="dialog-item" onclick="openPrivateChat('${dialog}')">
                <img class="dialog-avatar" src="https://ui-avatars.com/api/?name=${encodeURIComponent(dialog)}&background=5865f2&color=fff&size=32">
                <span class="dialog-name">${escapeHtml(dialog)}</span>
            </div>
        `).join("");
    }
    
    async function sendFriendRequest(to) {
        const res = await fetch("/send-friend-request", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ from: currentUser, to })
        });
        const data = await res.json();
        if (data.success) alert("Заявка отправлена!");
    }
    
    function openPrivateChat(username) {
        currentPrivateChat = username;
        currentRoom = null;
        document.getElementById("currentRoomName").innerHTML = `💬 ${username}`;
        document.getElementById("messages").innerHTML = "";
        socket.emit("get-private-messages", { withUser: username });
        if (!dialogs.includes(username)) {
            dialogs.push(username);
            renderDialogs();
        }
    }
    
    // Запись голоса
    let mediaRec = null, isRecording = false, audioCtx = null, recordedSamples = [], recordTimer = null;
    const recordBtn = document.getElementById("recordBtn"), cancelBtn = document.getElementById("cancelVoiceBtn"), recTimerSpan = document.getElementById("recTimer"), waveVisual = document.getElementById("waveVisual");
    
    async function startRecording() {
        if (isRecording) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new AudioContext();
            const source = audioCtx.createMediaStreamSource(stream);
            const processor = audioCtx.createScriptProcessor(4096, 1, 1);
            recordedSamples = [];
            processor.onaudioprocess = (e) => { if (isRecording) recordedSamples.push(new Float32Array(e.inputBuffer.getChannelData(0))); };
            source.connect(processor); processor.connect(audioCtx.destination);
            isRecording = true;
            recordBtn.classList.add("recording-active"); recordBtn.innerText = "⏹️";
            cancelBtn.style.display = "inline-flex"; waveVisual.style.display = "inline-flex";
            playRecordStartSound();
            let seconds = 0;
            recordTimer = setInterval(() => {
                seconds++;
                if (recTimerSpan) recTimerSpan.innerText = `🔴 ${seconds}s / 20s`;
                if (seconds >= 20) stopAndSend();
            }, 1000);
        } catch(e) { if(recTimerSpan) recTimerSpan.innerText = "❌"; }
    }
    
    function stopAndSend() {
        if (!isRecording) return;
        isRecording = false;
        clearInterval(recordTimer);
        if (audioCtx) audioCtx.close();
        const total = recordedSamples.reduce((a,b)=>a+b.length,0);
        const combined = new Float32Array(total);
        let off = 0;
        for (let arr of recordedSamples) { combined.set(arr, off); off += arr.length; }
        if (combined.length > 3000) {
            const int16 = new Int16Array(combined.length);
            for (let i = 0; i < combined.length; i++) int16[i] = combined[i] * 0x7FFF;
            const mp3encoder = new lamejs.Mp3Encoder(1, 44100, 128);
            let mp3Data = [];
            for (let i = 0; i < int16.length; i += 1152) {
                let chunk = int16.subarray(i, i + 1152);
                let buf = mp3encoder.encodeBuffer(chunk);
                if (buf.length) mp3Data.push(buf);
            }
            let end = mp3encoder.flush();
            if (end.length) mp3Data.push(end);
            const blob = new Blob(mp3Data, { type: "audio/mp3" });
            const fd = new FormData(); fd.append("audio", blob);
            fetch("/upload-audio", { method: "POST", body: fd }).then(res=>res.json()).then(data=> socket.emit("voice-msg", data.url));
            playRecordEndSound();
        }
        recordBtn.classList.remove("recording-active"); recordBtn.innerText = "🎙️";
        cancelBtn.style.display = "none"; waveVisual.style.display = "none";
        if(recTimerSpan) recTimerSpan.innerText = "";
    }
    
    function cancelRecording() {
        if (isRecording) {
            isRecording = false;
            clearInterval(recordTimer);
            if (audioCtx) audioCtx.close();
            recordBtn.classList.remove("recording-active"); recordBtn.innerText = "🎙️";
            cancelBtn.style.display = "none"; waveVisual.style.display = "none";
            if(recTimerSpan) recTimerSpan.innerText = "🗑 Отменено";
            setTimeout(() => { if(recTimerSpan) recTimerSpan.innerText = ""; }, 1000);
        }
    }
    
    if(recordBtn) recordBtn.onclick = () => { if (isRecording) stopAndSend(); else startRecording(); };
    if(cancelBtn) cancelBtn.onclick = cancelRecording;
    
    // Сокеты
    function initSocket() {
        socket = io();
        socket.on("connect", () => socket.emit("auth", { username: currentUser, serverId: currentServerId, room: currentRoom || "general" }));
        socket.on("auth-error", (msg) => alert(msg));
        
        socket.on("user-data", ({ username, role, avatar, status, coins, friends }) => {
            currentUser = username; currentRole = role; if (avatar) currentAvatar = avatar;
            userCoins = coins || 0; friendsList = friends || [];
            document.getElementById("currentNickDisplay").innerText = username;
            document.getElementById("userCoins").innerText = userCoins;
            updateRoleUI(role); updateAvatar(); if (status) updateStatusDot(status);
        });
        
        socket.on("servers-list", (servers) => {
            const container = document.getElementById("serversList");
            container.innerHTML = servers.map(s => `
                <div class="server-item ${s.id === currentServerId ? 'active' : ''}" onclick="switchServer('${s.id}', '${escapeHtml(s.name)}')">
                    ${escapeHtml(s.name)} (${s.memberCount})
                </div>
            `).join("");
            if (currentRole === "владелец" || currentRole === "админ" || currentRole === "модер") {
                container.innerHTML += `<button class="create-server-btn" onclick="createNewServer()">➕ Создать сервер</button>`;
            }
        });
        
        socket.on("all-users", (users) => { allUsers = users; renderOnlineUsers(users); });
        socket.on("private-message", ({ from, msg }) => { 
            playMessageSound(); 
            if (currentPrivateChat === from) addPrivateMessageToUI(msg, from);
            if (!dialogs.includes(from)) {
                dialogs.push(from);
                renderDialogs();
            }
        });
        socket.on("private-messages-history", ({ withUser, messages }) => {
            if (currentPrivateChat === withUser) {
                const container = document.getElementById("messages");
                container.innerHTML = "";
                messages.forEach(m => addPrivateMessageToUI(m, withUser));
            }
        });
        
        socket.on("history", (msgs) => { document.getElementById("messages").innerHTML = ""; msgs.forEach(msg => addMessageToUI(msg)); });
        socket.on("chat", (msg) => { 
            addMessageToUI(msg); 
            if (msg.author !== currentUser && msg.author !== "🛡️ СИСТЕМА") playMessageSound(); 
        });
        socket.on("message-deleted", ({ msgId }) => document.querySelector(`.message-group[data-msg-id="${msgId}"]`)?.remove());
        socket.on("reaction-updated", ({ msgId, reactions }) => {
            const msgDiv = document.querySelector(`.message-group[data-msg-id="${msgId}"]`);
            if (msgDiv) {
                const reactionsDiv = msgDiv.querySelector('.reactions');
                if (reactionsDiv) {
                    let html = '';
                    for (let [emoji, users] of Object.entries(reactions)) {
                        html += `<div class="reaction" onclick="addReaction('${msgId}','${emoji}')">${emoji} <span class="reaction-count">${users.length}</span></div>`;
                    }
                    reactionsDiv.innerHTML = html;
                }
            }
        });
        socket.on("online", n => document.getElementById("online").innerText = n);
        socket.on("voice-users-update", (users) => {
            const container = document.getElementById("voiceUsersList");
            if (container) {
                container.innerHTML = users.map(user => `
                    <div class="voice-user">
                        <img class="voice-user-avatar" src="${user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.username)}&background=5865f2&color=fff&size=28`}">
                        <span class="voice-user-name">${escapeHtml(user.username)}</span>
                    </div>
                `).join("");
            }
            document.getElementById("voiceOnline").innerText = users.length;
        });
        
        socket.on("voice-user", (userId) => { if (voiceStream) createVoicePeer(userId, true); });
        socket.on("user-joined", (userId) => { if (voiceStream) createVoicePeer(userId, false); });
        socket.on("signal", ({ from, data }) => { if (!voicePeers[from]) createVoicePeer(from, false); voicePeers[from]?.signal(data); });
    }
    
    function addPrivateMessageToUI(msg, withUser) {
        const container = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "message-group";
        div.innerHTML = `
            <div class="message-content">
                <div class="message-header">
                    <div class="message-author">${escapeHtml(msg.author)}</div>
                    <div class="message-time">${new Date(msg.time).toLocaleTimeString()}</div>
                </div>
                <div class="message-text">${escapeHtml(msg.text)}</div>
            </div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    
    function sendText() {
        let input = document.getElementById("input");
        if (!input.value.trim()) return;
        if (currentPrivateChat) {
            socket.emit("private-chat", { to: currentPrivateChat, text: input.value });
        } else {
            socket.emit("chat", input.value);
        }
        input.value = "";
        document.getElementById("emojiPicker").style.display = "none";
    }
    
    function addMessageToUI(msg) {
        const container = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "message-group";
        div.setAttribute("data-msg-id", msg.id);
        
        const avatarUrl = msg.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(msg.author)}&background=5865f2&color=fff&size=40`;
        const roleTag = `<span class="role-tag" style="${msg.role === 'владелец' ? 'animation: rgbText 1.5s infinite linear;' : ''}">${msg.role}</span>`;
        
        let contentHtml = '';
        if (msg.type === 'text') contentHtml = `<div class="message-text">${escapeHtml(msg.text)}</div>`;
        else if (msg.type === 'voice') contentHtml = `<div class="voice-bubble"><audio controls src="${msg.audio}"></audio></div>`;
        else if (msg.type === 'media') {
            if (msg.mediaType === 'video') contentHtml = `<video controls class="media-preview" src="${msg.mediaUrl}"></video>`;
            else if (msg.mediaType === 'audio') contentHtml = `<audio controls src="${msg.mediaUrl}"></audio>`;
            else contentHtml = `<img class="media-preview" src="${msg.mediaUrl}" onclick="window.open('${msg.mediaUrl}')">`;
        }
        
        let reactionsHtml = '';
        if (msg.reactions) {
            for (let [emoji, users] of Object.entries(msg.reactions)) {
                reactionsHtml += `<div class="reaction" onclick="addReaction('${msg.id}','${emoji}')">${emoji} <span class="reaction-count">${users.length}</span></div>`;
            }
        }
        
        div.innerHTML = `
            <img class="message-avatar" src="${avatarUrl}">
            <div class="message-content">
                <div class="message-header">
                    <div class="message-author">${escapeHtml(msg.author)} ${roleTag}</div>
                    <div class="message-time">${new Date(msg.time).toLocaleTimeString()}</div>
                </div>
                ${contentHtml}
                <div class="reactions">${reactionsHtml}</div>
            </div>
            <div class="message-menu"><button class="menu-btn" onclick="deleteMessage('${msg.id}','${msg.author}')">🗑️</button></div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    
    function deleteMessage(msgId, author) {
        let canDelete = currentRole === "владелец" || currentRole === "админ" || currentRole === "модер" || author === currentUser;
        if (canDelete) socket.emit("delete-message", { serverId: currentServerId, room: currentRoom, msgId });
    }
    
    function addReaction(msgId, emoji) { socket.emit("add-reaction", { serverId: currentServerId, room: currentRoom, msgId, emoji }); }
    
    function switchServer(serverId, serverName) {
        currentServerId = serverId;
        currentRoom = "general";
        currentPrivateChat = null;
        document.getElementById("currentServerName").innerHTML = serverName;
        document.getElementById("currentRoomName").innerHTML = "general";
        document.getElementById("messages").innerHTML = "";
        socket.emit("auth", { username: currentUser, serverId, room: "general" });
        document.getElementById("serversList").style.display = "none";
    }
    
    function toggleServerMenu() {
        const menu = document.getElementById("serversList");
        menu.style.display = menu.style.display === "none" ? "block" : "none";
    }
    
    async function createNewServer() {
        const name = prompt("Название сервера:");
        if (!name) return;
        const res = await fetch("/create-server", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: currentUser, serverName: name })
        });
        const data = await res.json();
        if (data.success) alert(`Сервер "${name}" создан!`);
        else alert(data.error);
        location.reload();
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function updateRoleUI(role) { 
        currentRole = role; 
        const span = document.getElementById("currentRoleDisplay"); 
        if (span) span.innerHTML = role; 
        if (role === "владелец" && span) span.classList.add("rgb-role"); 
        else if (span) span.classList.remove("rgb-role");
    }
    
    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("open"); }
    function openSettings() { document.getElementById("settingsModal").style.display = "flex"; document.getElementById("newNickInput").value = currentUser; }
    function closeSettings() { document.getElementById("settingsModal").style.display = "none"; }
    
    async function changeNickname() {
        let newNick = document.getElementById("newNickInput").value.trim();
        if (!newNick || newNick === currentUser) { closeSettings(); return; }
        if (newNick.toLowerCase() === PROTECTED_NAME.toLowerCase() && currentUser !== PROTECTED_NAME) {
            alert("❌ ЭТОТ НИК ПРИНАДЛЕЖИТ ВЛАДЕЛЬЦУ, НЕ ЛЕЗЬ!");
            return;
        }
        currentUser = newNick;
        document.getElementById("currentNickDisplay").innerText = currentUser;
        socket.emit("auth", { username: currentUser, serverId: currentServerId, room: currentRoom || "general" });
        const saved = JSON.parse(localStorage.getItem("nexus_session"));
        if (saved) saveSession(newNick, saved.password);
        closeSettings();
        alert(`Ник изменён на ${newNick}`);
    }
    
    setTimeout(() => setupStatusSelect(), 100);
    document.addEventListener("click", (e) => {
        if (!e.target.closest(".chat-btn") && !e.target.closest("#emojiPicker")) {
            document.getElementById("emojiPicker").style.display = "none";
        }
    });
</script>
</body>
</html>
