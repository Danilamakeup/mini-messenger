<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>
body {
    margin: 0;
    font-family: Inter, Arial;
    background: #1e1f22;
    color: #ddd;
}

.app {
    display: flex;
    height: 100vh;
}

/* sidebar */
.sidebar {
    width: 220px;
    background: #2b2d31;
    padding: 10px;
}

/* chat */
.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

/* message */
.msg {
    margin-bottom: 12px;
}

.name {
    font-weight: 600;
    font-size: 14px;
    color: #fff;
}

.text {
    margin-top: 2px;
}

/* input */
.input {
    display: flex;
    padding: 10px;
    background: #2b2d31;
    gap: 6px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #1e1f22;
    color: white;
}

/* buttons */
.btn {
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #3a3c42;
    color: white;
    cursor: pointer;
}

.btn:hover {
    background: #4a4d55;
}

/* push to talk */
#ptt {
    background: #5865f2;
}

#ptt.recording {
    background: #ed4245;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
    <div onclick="joinRoom('general')"># general</div>
    <div onclick="joinRoom('gaming')"># gaming</div>
</div>

<div class="chat">

<div id="messages" class="messages"></div>

<div class="input">
    <input id="input" placeholder="Сообщение...">
    <button class="btn" onclick="send()">➤</button>
    <button id="ptt" class="btn">🎤 Hold</button>
    <span id="timer">0s</span>
</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let name = localStorage.getItem("name");
if(!name){
    name = prompt("Ник");
    localStorage.setItem("name", name);
}

let room = "general";
joinRoom(room);

/* комнаты */
function joinRoom(r){
    room = r;
    document.getElementById("messages").innerHTML="";
    socket.emit("join",{name, room});
}

/* текст */
function send(){
    const input = document.getElementById("input");
    if(input.value){
        socket.emit("chat", input.value);
        input.value="";
    }
}

/* ENTER */
input.addEventListener("keydown", e=>{
    if(e.key==="Enter") send();
});

/* сообщения */
function add(msg){
    const div = document.createElement("div");
    div.className="msg";

    if(msg.type==="text"){
        div.innerHTML = `<div class="name">${msg.name}</div>
        <div class="text">${msg.text}</div>`;
    }

    if(msg.type==="voice"){
        div.innerHTML = `<div class="name">${msg.name}</div>
        <audio controls src="${msg.audio}"></audio>`;
    }

    messages.appendChild(div);
}

socket.on("chat", add);

socket.on("room history", data=>{
    messages.innerHTML="";
    data.forEach(add);
});

/* 🎤 PUSH TO TALK */
let recorder;
let chunks=[];
let startTime;
let timerInt;

const btn = document.getElementById("ptt");

btn.onmousedown = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    recorder = new MediaRecorder(stream);

    chunks=[];
    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.start();

    startTime = Date.now();
    btn.classList.add("recording");

    timerInt = setInterval(()=>{
        const sec = Math.floor((Date.now()-startTime)/1000);
        document.getElementById("timer").innerText = sec + "s";
    },200);
};

btn.onmouseup = async () => {
    recorder.stop();
    clearInterval(timerInt);
    btn.classList.remove("recording");
    document.getElementById("timer").innerText = "0s";

    recorder.onstop = async () => {
        const blob = new Blob(chunks, {type:"audio/webm"});

        const formData = new FormData();
        formData.append("audio", blob);

        const res = await fetch("/upload", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        socket.emit("voice-file", data.url);
    };
};
</script>

</body>
</html>
