<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Discord PRO</title>

<style>

/* THEMES */
:root{
    --bg:#313338;
    --panel:#2b2d31;
    --text:white;
}

.light{
    --bg:#f2f3f5;
    --panel:#ffffff;
    --text:black;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Arial;
}

.app{display:flex;height:100vh;}

.sidebar{
    width:240px;
    background:var(--panel);
    padding:10px;
}

.room{
    padding:8px;
    cursor:pointer;
}

.chat{
    flex:1;
    display:flex;
    flex-direction:column;
}

.messages{
    flex:1;
    padding:10px;
    overflow:auto;
}

.msg{margin-bottom:8px;}

.input{
    display:flex;
    padding:10px;
    background:var(--panel);
}

input{
    flex:1;
    padding:10px;
}

button{
    margin-left:5px;
}

/* theme button */
.themeBtn{
    position:absolute;
    top:10px;
    right:10px;
}
</style>
</head>

<body>

<button class="themeBtn" onclick="toggleTheme()">🌓</button>

<div class="app">

<div class="sidebar">
    <div onclick="join('general')" class="room"># general</div>
    <div onclick="join('gaming')" class="room"># gaming</div>
    <div onclick="join('music')" class="room"># music</div>

    <hr>
    Online: <span id="online">0</span>
</div>

<div class="chat">

<div id="messages" class="messages"></div>

<div class="input">
    <input id="input">
    <button onclick="send()">➤</button>
    <button onclick="voiceMsg()">🎤</button>
    <button onclick="joinVoice(room)">🎧</button>
</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-peer/simplepeer.min.js"></script>

<script>
const socket = io();

let name = localStorage.getItem("name") || prompt("Nick");
localStorage.setItem("name", name);

let room="general";
let stream;
let peers={};

// ---------------- THEME FIX ----------------
function toggleTheme(){
    document.body.classList.toggle("light");
}

// ---------------- JOIN ----------------
function join(r){
    room=r;
    messages.innerHTML="";
    socket.emit("join",{name,room});
}

// ---------------- CHAT ----------------
function send(){
    if(input.value){
        socket.emit("chat",input.value);
        input.value="";
    }
}

// ---------------- RENDER (FIXED) ----------------
function add(m){
    const d=document.createElement("div");
    d.className="msg";

    if(m.type==="text"){
        d.innerText=`${m.name}: ${m.text}`;
    }

    if(m.type==="voice"){
        const a=new Audio(m.audio);
        a.controls=true;
        d.innerText=m.name+": ";
        d.appendChild(a);
    }

    messages.appendChild(d);
}

// ---------------- HISTORY FIX (MAIN BUG FIX) ----------------
socket.on("history",(msgs)=>{
    messages.innerHTML="";
    msgs.forEach(add);
});

socket.on("chat",add);

// ---------------- ONLINE ----------------
socket.on("online",n=>{
    online.innerText=n;
});

// ---------------- VOICE MSG ----------------
async function voiceMsg(){
    const s=await navigator.mediaDevices.getUserMedia({audio:true});

    const r=new MediaRecorder(s);
    let chunks=[];

    r.ondataavailable=e=>chunks.push(e.data);

    r.onstop=async()=>{
        const blob=new Blob(chunks,{type:"audio/webm"});

        const fd=new FormData();
        fd.append("audio",blob);

        const res=await fetch("/upload",{method:"POST",body:fd});
        const data=await res.json();

        socket.emit("voice-msg",data.url);
    };

    r.start();
    setTimeout(()=>r.stop(),4000);
}

// ---------------- WEBRTC ----------------
async function joinVoice(room){

    if(!stream){
        stream=await navigator.mediaDevices.getUserMedia({audio:true});
    }

    socket.emit("voice-join",room);
}

// GLOBAL FIX (IMPORTANT)
socket.on("user-joined",id=>{
    createPeer(id,true);
});

socket.on("signal",({from,data})=>{
    if(!peers[from]) createPeer(from,false);
    peers[from].signal(data);
});

// PEER
function createPeer(id,initiator){

    const peer=new SimplePeer({
        initiator,
        trickle:false,
        stream,
        config:{
            iceServers:[
                {urls:"stun:stun.l.google.com:19302"}
            ]
        }
    });

    peer.on("signal",data=>{
        socket.emit("signal",{to:id,data});
    });

    peer.on("stream",remote=>{
        const a=new Audio();
        a.srcObject=remote;
        a.autoplay=true;
        a.play();
    });

    peers[id]=peer;
}

join("general");
</script>

</body>
</html>
