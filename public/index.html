<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS — Discord style</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body {
            background: #1e1f22;
            color: #dbdee1;
            height: 100vh;
            overflow: hidden;
        }
        /* DISCORD ЦВЕТА (тёмная тема) */
        :root {
            --bg-primary: #1e1f22;
            --bg-secondary: #2b2d31;
            --bg-tertiary: #313338;
            --bg-hover: #3b3f48;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --danger: #e03a3a;
            --border: #1e1f22;
        }
        .app { display: flex; height: 100%; }

        /* ЛЕВАЯ ПАНЕЛЬ СЕРВЕРОВ */
        .servers-bar {
            width: 72px;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px 0;
            overflow-y: auto;
            border-right: 1px solid var(--border);
        }
        .server-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            transition: 0.2s;
            position: relative;
        }
        .server-icon.active, .server-icon:hover { border-radius: 16px; background: var(--accent); }
        .server-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .add-server-btn { background: var(--bg-tertiary); }
        .separator { width: 32px; height: 2px; background: var(--bg-secondary); margin: 8px 0; }

        /* САЙДБАР КАНАЛОВ */
        .sidebar {
            width: 240px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
        }
        .server-name-header {
            padding: 16px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .rooms-list {
            flex: 1;
            padding: 8px;
            overflow-y: auto;
        }
        .room {
            padding: 6px 8px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .room:hover, .room.active { background: var(--bg-hover); color: var(--text-normal); }
        .voice-channel {
            margin-top: 16px;
            border-top: 1px solid var(--border);
            padding-top: 8px;
        }
        .voice-channel-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .voice-users-list {
            margin-top: 8px;
            padding-left: 8px;
            font-size: 13px;
        }
        .voice-user {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }

        /* НИЖНЯЯ ПАНЕЛЬ ПОЛЬЗОВАТЕЛЯ */
        .user-section {
            padding: 12px;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border);
        }
        .current-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
        }
        .current-user:hover { background: var(--bg-hover); }
        .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .profile-controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .profile-btn {
            background: var(--bg-hover);
            border: none;
            border-radius: 8px;
            padding: 6px;
            color: var(--text-normal);
            cursor: pointer;
            font-size: 11px;
            flex: 1;
        }
        .mic-off, .speaker-off { background: var(--danger); color: white; }

        /* ОСНОВНОЙ ЧАТ */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }
        .chat-header {
            padding: 12px 16px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .message-group {
            display: flex;
            gap: 16px;
            padding: 8px 16px;
            position: relative;
            margin-bottom: 4px;
        }
        .message-group:hover { background: var(--bg-tertiary); }
        .message-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .message-header {
            display: flex;
            gap: 8px;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .message-author { font-weight: 600; }
        .role-tag {
            font-size: 10px;
            background: var(--accent);
            padding: 2px 6px;
            border-radius: 12px;
            color: white;
        }
        .message-time { font-size: 11px; color: var(--text-muted); }
        .message-text { margin-top: 4px; word-break: break-word; }
        .voice-bubble {
            background: var(--bg-tertiary);
            padding: 8px 12px;
            border-radius: 20px;
            display: inline-block;
        }
        .media-preview {
            max-width: 300px;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 6px;
            cursor: pointer;
        }
        .message-menu {
            position: absolute;
            right: 16px;
            top: 8px;
            background: var(--bg-secondary);
            border-radius: 8px;
            display: none;
            gap: 8px;
            padding: 4px 8px;
        }
        .message-group:hover .message-menu { display: flex; }
        .menu-btn {
            background: none;
            border: none;
            color: var(--text-normal);
            cursor: pointer;
            font-size: 14px;
        }
        .menu-btn:hover { color: var(--accent); }

        /* ПАНЕЛЬ ВВОДА */
        .input-panel {
            padding: 16px;
            background: var(--bg-secondary);
        }
        .input-wrapper {
            display: flex;
            gap: 8px;
            background: var(--bg-primary);
            border-radius: 40px;
            padding: 8px 16px;
            align-items: center;
        }
        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-normal);
            outline: none;
        }
        button {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            cursor: pointer;
        }
        button:hover { background: var(--accent-hover); }

        /* ПРАВАЯ ПАНЕЛЬ (УЧАСТНИКИ СЕРВЕРА) */
        .members-sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .members-header {
            padding: 16px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }
        .members-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
        }
        .member-item:hover { background: var(--bg-hover); }
        .member-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .member-info { flex: 1; }
        .member-name { font-size: 14px; font-weight: 500; }
        .member-status {
            font-size: 11px;
            color: #23a55a;
        }
        .member-status.offline { color: var(--text-muted); }
        .friend-request-btn { font-size: 11px; padding: 4px 8px; }

        /* МОДАЛКИ */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            width: 400px;
            max-width: 90%;
            padding: 24px;
        }
        .modal-card input, .modal-card textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            background: var(--bg-primary);
            color: var(--text-normal);
        }
        .edit-input {
            background: var(--bg-primary);
            border: none;
            color: var(--text-normal);
            padding: 4px;
            border-radius: 8px;
            width: 100%;
        }
        .recording-active { background: var(--danger); }
        .wave-container { display: inline-flex; gap: 3px; margin-left: 8px; }
        .wave { width: 3px; height: 12px; background: var(--danger); border-radius: 2px; animation: waveAnim 0.5s infinite alternate; }
        @keyframes waveAnim { from { height: 6px; } to { height: 16px; } }
        .speaking { box-shadow: 0 0 0 2px var(--accent); }
        @keyframes rgbText { 0% { color: #ff0000; } 33% { color: #00ff00; } 66% { color: #0088ff; } 100% { color: #ff0000; } }
        .rgb-role { animation: rgbText 1.5s infinite linear; font-weight: bold; }
        #recTimer { font-size: 12px; text-align: center; margin-top: 4px; }
    </style>
</head>
<body>

<div id="loginModal" class="modal">
    <div class="modal-card">
        <h2 id="formTitle">🔐 Вход</h2>
        <input type="text" id="loginUsername" placeholder="Никнейм">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <textarea id="loginBio" placeholder="О себе (bio)"></textarea>
        <button id="submitBtn" style="width:100%">Войти</button>
        <div id="switchMode" style="text-align:center; margin-top:12px; cursor:pointer; color:var(--accent);">Нет аккаунта? Зарегистрироваться</div>
        <div id="loginError" style="color:#e03a3a; margin-top:8px;"></div>
    </div>
</div>

<div id="app" style="display:none; height:100vh;">
    <div class="servers-bar" id="serversBar"></div>
    <div class="sidebar">
        <div class="server-name-header" id="currentServerName">NEXUS</div>
        <div class="rooms-list" id="roomsList"></div>
        <div class="user-section">
            <div class="current-user" id="profileBtn">
                <img class="avatar" id="myAvatar" src="">
                <div>
                    <div id="currentNickDisplay"></div>
                    <div id="currentRoleDisplay" style="font-size:11px;"></div>
                </div>
            </div>
            <div class="profile-controls">
                <button id="micToggleBtn" class="profile-btn">🎤 Микрофон</button>
                <button id="speakerToggleBtn" class="profile-btn">🔊 Звук</button>
            </div>
            <button id="friendsBtn" style="margin-top:8px; width:100%; background:var(--bg-hover);">👥 Друзья / ЛС</button>
        </div>
    </div>
    <div class="chat">
        <div class="chat-header">
            <span id="chatHeaderTitle"># general</span>
            <button id="settingsBtn">⚙️</button>
        </div>
        <div id="messages" class="messages"></div>
        <div class="input-panel">
            <div class="input-wrapper">
                <input id="input" placeholder="Сообщение...">
                <label style="cursor:pointer;">📎<input type="file" id="mediaInput" style="display:none;" accept="image/*,video/*,audio/*"></label>
                <button id="voiceMsgBtn">🎙️</button>
                <button id="sendBtn">➤</button>
            </div>
            <div id="recTimer" style="font-size:12px; margin-top:4px; text-align:center;"></div>
            <div id="waveVisual" class="wave-container" style="display:none; justify-content:center;"><div class="wave"></div><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>
        </div>
    </div>
    <div class="members-sidebar" id="membersSidebar">
        <div class="members-header">👥 УЧАСТНИКИ — <span id="onlineCount">0</span></div>
        <div class="members-list" id="membersList"></div>
    </div>
</div>

<script>
    const OWNER_NAME = "bigheaven3569";
    let currentUser, currentRole, currentAvatar;
    let currentServerId = "main", currentRoom = "general", currentPrivateChat = null;
    let socket, voiceStream, voicePeers = {}, inVoice = false;
    let isMicMuted = false, isSpeakerMuted = false;
    let friendsList = [], allUsers = [], serversList = [];
    let membersList = []; // участники текущего сервера

    // --- голосовые сообщения ---
    let isRecording = false, audioCtx, recordedSamples = [], recordTimer;
    const recordBtn = document.getElementById("voiceMsgBtn");
    const cancelBtn = document.createElement("button");
    cancelBtn.textContent = "❌ Отменить";
    cancelBtn.style.display = "none";
    cancelBtn.style.background = "#e03a3a";
    cancelBtn.style.padding = "4px 8px";
    cancelBtn.style.borderRadius = "20px";
    document.querySelector(".input-wrapper").appendChild(cancelBtn);

    function playBeep(freq=600, dur=0.08, vol=0.1) {
        try {
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = freq;
            gain.gain.value = vol;
            osc.type = "sine";
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + dur);
            osc.stop(ctx.currentTime + dur);
            setTimeout(() => ctx.close(), 500);
        } catch(e) {}
    }
    function playMessageSound() { playBeep(600,0.08,0.1); }
    function playRecordStart() { playBeep(880,0.1,0.2); }
    function playRecordEnd() { playBeep(440,0.2,0.2); }

    async function startRecording() {
        if (isRecording) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new AudioContext();
            const source = audioCtx.createMediaStreamSource(stream);
            const processor = audioCtx.createScriptProcessor(4096,1,1);
            recordedSamples = [];
            processor.onaudioprocess = (e) => { if(isRecording) recordedSamples.push(new Float32Array(e.inputBuffer.getChannelData(0))); };
            source.connect(processor);
            processor.connect(audioCtx.destination);
            isRecording = true;
            recordBtn.style.background = "#e03a3a";
            recordBtn.textContent = "⏹️";
            cancelBtn.style.display = "inline-block";
            document.getElementById("waveVisual").style.display = "flex";
            playRecordStart();
            let sec = 0;
            recordTimer = setInterval(() => {
                sec++;
                document.getElementById("recTimer").innerText = `🔴 ${sec}s / 20s`;
                if(sec >= 20) stopAndSend();
            }, 1000);
        } catch(e) { console.log(e); }
    }

    function stopAndSend() {
        if(!isRecording) return;
        isRecording = false;
        clearInterval(recordTimer);
        if(audioCtx) audioCtx.close();
        const total = recordedSamples.reduce((a,b)=>a+b.length,0);
        const combined = new Float32Array(total);
        let off = 0;
        for(let arr of recordedSamples) { combined.set(arr, off); off += arr.length; }
        if(combined.length > 3000) {
            const int16 = new Int16Array(combined.length);
            for(let i=0;i<combined.length;i++) int16[i] = combined[i] * 0x7FFF;
            const encoder = new lamejs.Mp3Encoder(1,44100,128);
            let mp3 = [];
            for(let i=0;i<int16.length;i+=1152) {
                let chunk = int16.subarray(i,i+1152);
                let buf = encoder.encodeBuffer(chunk);
                if(buf.length) mp3.push(buf);
            }
            let end = encoder.flush();
            if(end.length) mp3.push(end);
            const blob = new Blob(mp3, {type:"audio/mp3"});
            const fd = new FormData();
            fd.append("audio", blob);
            fetch("/upload-audio", {method:"POST", body:fd}).then(res=>res.json()).then(data=> {
                if(currentPrivateChat) socket.emit("private-voice", { to: currentPrivateChat, url: data.url });
                else socket.emit("voice-msg", data.url);
            });
            playRecordEnd();
        }
        recordBtn.style.background = "";
        recordBtn.textContent = "🎙️";
        cancelBtn.style.display = "none";
        document.getElementById("waveVisual").style.display = "none";
        document.getElementById("recTimer").innerText = "";
    }

    function cancelRecording() {
        if(isRecording) {
            isRecording = false;
            clearInterval(recordTimer);
            if(audioCtx) audioCtx.close();
            recordBtn.style.background = "";
            recordBtn.textContent = "🎙️";
            cancelBtn.style.display = "none";
            document.getElementById("waveVisual").style.display = "none";
            document.getElementById("recTimer").innerText = "";
        }
    }
    recordBtn.onmousedown = startRecording;
    recordBtn.onmouseup = stopAndSend;
    recordBtn.onmouseleave = cancelRecording;
    cancelBtn.onclick = cancelRecording;

    // --- голосовой чат ---
    async function joinVoiceChannel() {
        if(inVoice) {
            leaveVoiceChannel();
            return;
        }
        try {
            voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            socket.emit("join-voice-channel", { serverId: currentServerId, channelName: "voice-chat" });
            inVoice = true;
            const ctx = new AudioContext();
            const src = ctx.createMediaStreamSource(voiceStream);
            const analyser = ctx.createAnalyser();
            src.connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);
            setInterval(() => {
                if(inVoice) {
                    analyser.getByteFrequencyData(data);
                    let vol = data.reduce((a,b)=>a+b,0)/data.length;
                    if(vol>20) document.body.classList.add("speaking");
                    else document.body.classList.remove("speaking");
                }
            },100);
            socket.on("voice-user", (uid) => createPeer(uid,true));
            socket.on("user-joined", (uid) => createPeer(uid,false));
        } catch(e) { console.log(e); }
    }
    function leaveVoiceChannel() {
        inVoice = false;
        if(voiceStream) voiceStream.getTracks().forEach(t => t.stop());
        voiceStream = null;
        socket.emit("leave-voice-channel", { serverId: currentServerId });
        document.body.classList.remove("speaking");
        // очищаем список участников голосового канала
        const voiceContainer = document.getElementById("voiceUsersList");
        if(voiceContainer) voiceContainer.innerHTML = "";
    }
    function createPeer(id, init) {
        if(!voiceStream) return;
        let peer = new SimplePeer({ initiator:init, trickle:false, stream:voiceStream, config:{ iceServers:[{urls:"stun:stun.l.google.com:19302"}] } });
        peer.on("signal", data => socket.emit("signal", { to:id, data }));
        peer.on("stream", remote => { let a = new Audio(); a.srcObject = remote; a.autoplay = true; if(isSpeakerMuted) a.volume=0; });
        voicePeers[id] = peer;
    }
    function toggleMic() {
        if(!voiceStream) return;
        isMicMuted = !isMicMuted;
        voiceStream.getAudioTracks().forEach(t => t.enabled = !isMicMuted);
        const btn = document.getElementById("micToggleBtn");
        btn.innerHTML = isMicMuted ? "🎤🔇 Микрофон" : "🎤🎙️ Микрофон";
        btn.classList.toggle("mic-off", isMicMuted);
    }
    function toggleSpeaker() {
        isSpeakerMuted = !isSpeakerMuted;
        const btn = document.getElementById("speakerToggleBtn");
        btn.innerHTML = isSpeakerMuted ? "🔊🔇 Звук" : "🔊🔈 Звук";
        btn.classList.toggle("speaker-off", isSpeakerMuted);
        document.querySelectorAll("audio").forEach(a => a.volume = isSpeakerMuted ? 0 : 0.8);
    }
    document.getElementById("micToggleBtn").onclick = toggleMic;
    document.getElementById("speakerToggleBtn").onclick = toggleSpeaker;

    // --- автологин ---
    const saved = localStorage.getItem("nexus_session");
    if(saved) {
        const { username, password } = JSON.parse(saved);
        login(username, password);
    }

    async function login(username, password) {
        const res = await fetch("/login", { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ username, password }) });
        const data = await res.json();
        if(data.success) {
            currentUser = username; currentRole = data.role; currentAvatar = data.avatar;
            localStorage.setItem("nexus_session", JSON.stringify({ username, password }));
            document.getElementById("loginModal").style.display = "none";
            document.getElementById("app").style.display = "flex";
            document.getElementById("currentNickDisplay").innerText = currentUser;
            document.getElementById("currentRoleDisplay").innerHTML = currentRole;
            if(currentRole === "владелец") document.getElementById("currentRoleDisplay").classList.add("rgb-role");
            document.getElementById("myAvatar").src = currentAvatar || `https://ui-avatars.com/api/?name=${currentUser}&background=5865f2&color=fff`;
            initSocket();
        } else alert(data.error);
    }

    let isLoginMode = true;
    document.getElementById("submitBtn").onclick = async () => {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value.trim();
        const bio = document.getElementById("loginBio").value.trim();
        if(!username || !password) return;
        if(!isLoginMode) {
            const res = await fetch("/register", { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ username, password, bio }) });
            const data = await res.json();
            if(data.success) {
                isLoginMode = true;
                document.getElementById("formTitle").innerText = "🔐 Вход";
                document.getElementById("switchMode").innerText = "Нет аккаунта? Зарегистрироваться";
                alert("Регистрация успешна! Войдите.");
            } else alert(data.error);
        } else login(username, password);
    };
    document.getElementById("switchMode").onclick = () => {
        isLoginMode = !isLoginMode;
        document.getElementById("formTitle").innerText = isLoginMode ? "🔐 Вход" : "📝 Регистрация";
        document.getElementById("switchMode").innerText = isLoginMode ? "Нет аккаунта? Зарегистрироваться" : "Уже есть аккаунт? Войти";
    };

    // --- отрисовка участников сервера ---
    function renderMembers() {
        const container = document.getElementById("membersList");
        if(!container) return;
        const onlineUsers = allUsers.filter(u => u.status === "online");
        const offlineUsers = allUsers.filter(u => u.status !== "online");
        const sorted = [...onlineUsers, ...offlineUsers];
        document.getElementById("onlineCount").innerText = onlineUsers.length;
        container.innerHTML = sorted.map(u => {
            const isOnline = u.status === "online";
            return `
                <div class="member-item" onclick="openPrivateChat('${u.username}')">
                    <img class="member-avatar" src="${u.avatar || `https://ui-avatars.com/api/?name=${u.username}&background=5865f2&color=fff`}">
                    <div class="member-info">
                        <div class="member-name">${escapeHtml(u.username)}</div>
                        <div class="member-status ${isOnline ? '' : 'offline'}">${isOnline ? '🟢 В сети' : '⚫ Не в сети'}</div>
                    </div>
                    ${u.username !== currentUser ? `<button class="friend-request-btn" onclick="event.stopPropagation(); sendFriendReq('${u.username}')">➕</button>` : ''}
                </div>
            `;
        }).join("");
    }

    async function sendFriendReq(to) {
        const res = await fetch("/send-friend-request", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ from: currentUser, to })
        });
        const data = await res.json();
        alert(data.success ? "Заявка отправлена" : data.error);
    }

    // --- открытие модалки друзей/ЛС ---
    function openFriendsModal() {
        const modal = document.createElement("div");
        modal.className = "modal";
        const friends = friendsList.filter(f => !f.startsWith("req_"));
        const requests = friendsList.filter(f => f.startsWith("req_")).map(f => f.replace("req_", ""));
        modal.innerHTML = `
            <div class="modal-card">
                <h3>👥 Друзья и личные сообщения</h3>
                <div style="display: flex; gap: 16px; margin-bottom: 16px;">
                    <span id="friendsModalTab" style="cursor:pointer; color:var(--accent);">Друзья (${friends.length})</span>
                    <span id="requestsModalTab" style="cursor:pointer;">Заявки (${requests.length})</span>
                </div>
                <div id="friendsModalContent">
                    ${friends.map(f => `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;"><span onclick="openPrivateChat('${f}')" style="cursor:pointer;">👤 ${f}</span><button onclick="openPrivateChat('${f}')">💬</button></div>`).join('')}
                </div>
                <div id="requestsModalContent" style="display: none;">
                    ${requests.map(r => `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">📨 ${r}<div><button onclick="acceptFriend('${r}')">✅</button><button onclick="rejectFriend('${r}')" style="background:var(--danger);">❌</button></div></div>`).join('')}
                </div>
                <button id="closeFriendsModal" style="margin-top:16px; width:100%;">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById("friendsModalTab").onclick = () => {
            document.getElementById("friendsModalContent").style.display = "block";
            document.getElementById("requestsModalContent").style.display = "none";
            document.getElementById("friendsModalTab").style.color = "var(--accent)";
            document.getElementById("requestsModalTab").style.color = "";
        };
        document.getElementById("requestsModalTab").onclick = () => {
            document.getElementById("friendsModalContent").style.display = "none";
            document.getElementById("requestsModalContent").style.display = "block";
            document.getElementById("requestsModalTab").style.color = "var(--accent)";
            document.getElementById("friendsModalTab").style.color = "";
        };
        document.getElementById("closeFriendsModal").onclick = () => modal.remove();
    }
    document.getElementById("friendsBtn").onclick = openFriendsModal;

    async function acceptFriend(f) {
        await fetch("/accept-friend", { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ username: currentUser, friend: f }) });
        alert(`Ты принял заявку от ${f}`);
        location.reload();
    }
    async function rejectFriend(f) {
        await fetch("/reject-friend", { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ username: currentUser, friend: f }) });
        alert(`Заявка от ${f} отклонена`);
        location.reload();
    }

    window.openPrivateChat = (user) => {
        currentPrivateChat = user;
        currentRoom = null;
        document.getElementById("chatHeaderTitle").innerHTML = `💬 ${user}`;
        document.getElementById("messages").innerHTML = "";
        socket.emit("get-private-messages", { withUser: user });
        // закрываем модалку, если открыта
        const modal = document.querySelector(".modal");
        if(modal) modal.remove();
    };

    function addMessageToUI(msg, isTemp = false) {
        const container = document.getElementById("messages");
        if(!container) return;
        const existing = document.querySelector(`.message-group[data-id="${msg.id}"]`);
        if(existing && !isTemp) return;
        const div = document.createElement("div");
        div.className = "message-group";
        div.setAttribute("data-id", msg.id);
        let content = "";
        if(msg.text) content = `<div class="message-text">${escapeHtml(msg.text)}</div>`;
        else if(msg.audio) content = `<div class="voice-bubble"><audio controls src="${msg.audio}"></audio></div>`;
        else if(msg.mediaUrl) {
            if(msg.mediaType === "image") content = `<img class="media-preview" src="${msg.mediaUrl}" onclick="window.open('${msg.mediaUrl}')">`;
            else if(msg.mediaType === "video") content = `<video class="media-preview" src="${msg.mediaUrl}" controls></video>`;
            else content = `<audio controls src="${msg.mediaUrl}"></audio>`;
        }
        div.innerHTML = `
            <img class="message-avatar" src="${msg.avatar || `https://ui-avatars.com/api/?name=${msg.author}&background=5865f2&color=fff`}">
            <div style="flex:1">
                <div class="message-header">
                    <span class="message-author">${escapeHtml(msg.author)}</span>
                    <span class="role-tag">${msg.role || "новичок"}</span>
                    <span class="message-time">${new Date(msg.time).toLocaleTimeString()}</span>
                </div>
                ${content}
            </div>
            <div class="message-menu">
                ${!isTemp && msg.author === currentUser ? `<button class="menu-btn edit-btn">✏️</button>` : ''}
                ${!isTemp ? `<button class="menu-btn delete-btn">🗑️</button>` : ''}
            </div>
        `;
        if(isTemp) {
            const existingTemp = document.querySelector(`.message-group[data-id*="_temp_"]`);
            if(existingTemp) existingTemp.remove();
        }
        container.appendChild(div);
        div.scrollIntoView({ behavior: "smooth" });
        if(!isTemp) {
            div.querySelector(".edit-btn")?.addEventListener("click", () => {
                const textDiv = div.querySelector(".message-text");
                if(!textDiv) return;
                const old = textDiv.innerText;
                const inp = document.createElement("input");
                inp.value = old;
                inp.className = "edit-input";
                textDiv.innerHTML = "";
                textDiv.appendChild(inp);
                inp.focus();
                inp.onblur = () => {
                    const newText = inp.value.trim();
                    if(newText && newText !== old) {
                        if(currentPrivateChat) socket.emit("private-edit", { to: currentPrivateChat, msgId: msg.id, newText });
                        else socket.emit("edit-message", { serverId: currentServerId, room: currentRoom, msgId: msg.id, newText });
                    }
                    textDiv.innerText = newText || old;
                };
                inp.onkeydown = (e) => { if(e.key === "Enter") inp.blur(); };
            });
            div.querySelector(".delete-btn")?.addEventListener("click", () => {
                if(confirm("Удалить сообщение?")) {
                    if(currentPrivateChat) socket.emit("private-delete", { to: currentPrivateChat, msgId: msg.id });
                    else socket.emit("delete-message", { serverId: currentServerId, room: currentRoom, msgId: msg.id });
                }
            });
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    function sendMessage(text) {
        if(!text.trim()) return;
        const tempId = Date.now() + "_temp_" + Math.random();
        const tempMsg = {
            id: tempId, type: "text", author: currentUser, role: currentRole,
            avatar: currentAvatar, text: text, time: Date.now(), isTemp: true
        };
        addMessageToUI(tempMsg, true);
        if(currentPrivateChat) socket.emit("private-chat", { to: currentPrivateChat, text });
        else socket.emit("chat", text);
    }

    function initSocket() {
        socket = io();
        socket.on("connect", () => socket.emit("auth", { username: currentUser, serverId: currentServerId, room: currentRoom }));

        socket.on("user-data", ({ username, role, avatar, friends }) => {
            currentUser = username; currentRole = role; currentAvatar = avatar;
            friendsList = friends || [];
            document.getElementById("currentNickDisplay").innerText = username;
            document.getElementById("currentRoleDisplay").innerHTML = role;
            if(role === "владелец") document.getElementById("currentRoleDisplay").classList.add("rgb-role");
            if(currentAvatar) document.getElementById("myAvatar").src = currentAvatar;
            renderMembers();
        });

        socket.on("servers-list", (servers) => { serversList = servers; renderServersBar(); });
        socket.on("all-users", (users) => {
            allUsers = users;
            renderMembers();
        });
        socket.on("user-status-update", ({ username, status }) => {
            const user = allUsers.find(u => u.username === username);
            if(user) user.status = status;
            renderMembers();
        });

        socket.on("chat", (msg) => {
            if(msg.author === currentUser) document.querySelector(`.message-group[data-id*="_temp_"]`)?.remove();
            addMessageToUI(msg);
            if(msg.author !== currentUser) playMessageSound();
        });
        socket.on("voice-msg", (msg) => { addMessageToUI(msg); if(msg.author !== currentUser) playMessageSound(); });
        socket.on("private-message", ({ from, msg }) => {
            if(from === currentUser) document.querySelector(`.message-group[data-id*="_temp_"]`)?.remove();
            addMessageToUI(msg);
            if(msg.author !== currentUser && from !== "🛡️ СИСТЕМА") playMessageSound();
        });
        socket.on("private-messages-history", ({ withUser, messages }) => {
            if(currentPrivateChat === withUser) {
                document.getElementById("messages").innerHTML = "";
                messages.forEach(m => addMessageToUI(m));
            }
        });
        socket.on("message-edited", ({ msgId, newText }) => {
            const el = document.querySelector(`.message-group[data-id="${msgId}"] .message-text`);
            if(el) el.innerText = newText;
        });
        socket.on("message-deleted", ({ msgId }) => document.querySelector(`.message-group[data-id="${msgId}"]`)?.remove());
        socket.on("voice-users-update", (users) => {
            const container = document.getElementById("voiceUsersList");
            if(container) {
                container.innerHTML = users.map(u => `<div class="voice-user">🔊 ${escapeHtml(u.username)}</div>`).join("");
            }
        });
        socket.on("clear-chat", () => { document.getElementById("messages").innerHTML = ""; });
    }

    function renderServersBar() {
        const bar = document.getElementById("serversBar");
        bar.innerHTML = `<div class="server-icon" onclick="switchServer('main')">🏠</div><div class="separator"></div>`;
        serversList.forEach(s => {
            bar.innerHTML += `<div class="server-icon" onclick="switchServer('${s.id}')" title="${s.name}">${s.icon ? `<img src="${s.icon}">` : s.name[0]}</div>`;
        });
        bar.innerHTML += `<div class="server-icon add-server-btn" onclick="openCreateServerModal()">+</div>`;
    }

    window.switchServer = (id) => {
        currentServerId = id;
        currentRoom = "general";
        currentPrivateChat = null;
        document.getElementById("chatHeaderTitle").innerHTML = "# general";
        document.getElementById("messages").innerHTML = "";
        socket.emit("auth", { username: currentUser, serverId: id, room: "general" });
    };
    window.switchRoom = (room) => {
        currentRoom = room;
        currentPrivateChat = null;
        document.getElementById("chatHeaderTitle").innerHTML = `# ${room}`;
        document.getElementById("messages").innerHTML = "";
        socket.emit("auth", { username: currentUser, serverId: currentServerId, room });
    };

    function openCreateServerModal() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `<div class="modal-card"><h3>➕ Создать сервер</h3><input id="serverName" placeholder="Название"><input type="file" id="serverIcon" accept="image/*"><button id="createBtn">Создать</button><button id="cancelBtn">Отмена</button></div>`;
        document.body.appendChild(modal);
        document.getElementById("createBtn").onclick = async () => {
            const name = document.getElementById("serverName").value.trim();
            if(!name) return alert("Введите название");
            const file = document.getElementById("serverIcon").files[0];
            const fd = new FormData();
            fd.append("serverName", name);
            fd.append("username", currentUser);
            if(file) fd.append("icon", file);
            const res = await fetch("/create-server", { method:"POST", body:fd });
            const data = await res.json();
            if(data.success) alert(`Сервер "${name}" создан!`);
            else alert(data.error);
            modal.remove();
        };
        document.getElementById("cancelBtn").onclick = () => modal.remove();
    }

    // настройки (смена ника, аватарка)
    function openSettings() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `<div class="modal-card"><h3>⚙️ Настройки</h3><input type="text" id="newNick" placeholder="Новый ник" value="${currentUser}"><button id="changeNickBtn">Сменить ник</button><input type="file" id="avatarUpload" accept="image/*"><button id="uploadAvatarBtn">Загрузить аватар</button><button id="closeSettings" style="margin-top:16px;">Закрыть</button></div>`;
        document.body.appendChild(modal);
        document.getElementById("changeNickBtn").onclick = async () => {
            const newNick = document.getElementById("newNick").value.trim();
            if(!newNick || newNick === currentUser) return;
            const res = await fetch("/change-nick", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ oldUsername: currentUser, newUsername: newNick, password: localStorage.getItem("nexus_pass") || "" })
            });
            const data = await res.json();
            if(data.success) {
                currentUser = newNick;
                document.getElementById("currentNickDisplay").innerText = currentUser;
                const saved = JSON.parse(localStorage.getItem("nexus_session"));
                if(saved) localStorage.setItem("nexus_session", JSON.stringify({ username: newNick, password: saved.password }));
                socket.emit("auth", { username: currentUser, serverId: currentServerId, room: currentRoom });
                alert("Ник изменён");
                modal.remove();
            } else alert(data.error);
        };
        document.getElementById("uploadAvatarBtn").onclick = async () => {
            const file = document.getElementById("avatarUpload").files[0];
            if(!file) return;
            const fd = new FormData();
            fd.append("avatar", file);
            fd.append("username", currentUser);
            const res = await fetch("/upload-avatar", { method: "POST", body: fd });
            const data = await res.json();
            if(data.url) {
                currentAvatar = data.url;
                document.getElementById("myAvatar").src = currentAvatar;
                alert("Аватар обновлён");
                modal.remove();
            } else alert(data.error);
        };
        document.getElementById("closeSettings").onclick = () => modal.remove();
    }
    document.getElementById("settingsBtn").onclick = openSettings;

    document.getElementById("sendBtn").onclick = () => {
        const inp = document.getElementById("input");
        sendMessage(inp.value);
        inp.value = "";
    };
    document.getElementById("input").onkeydown = (e) => { if(e.key === "Enter") document.getElementById("sendBtn").click(); };

    document.getElementById("mediaInput").onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        if(file.size > 15*1024*1024) return alert("Максимум 15 МБ");
        const fd = new FormData();
        fd.append("file", file);
        const res = await fetch("/upload-media", { method:"POST", body:fd });
        const data = await res.json();
        if(data.url) {
            if(currentPrivateChat) socket.emit("private-media", { to: currentPrivateChat, url: data.url, fileType: data.fileType });
            else socket.emit("media", data.url, data.fileType);
        }
    };

    document.getElementById("roomsList").innerHTML = `
        <div class="room active" onclick="switchRoom('general')"># general</div>
        <div class="room" onclick="switchRoom('gaming')">🎮 gaming</div>
        <div class="room" onclick="switchRoom('music')">🎵 music</div>
        <div class="room" onclick="switchRoom('other-fuckin-shit')">💩 other-fuckin-shit</div>
        <div class="voice-channel">
            <div class="voice-channel-title">🔊 ГОЛОСОВЫЕ КАНАЛЫ</div>
            <div class="room" onclick="joinVoiceChannel()">🎤 Голосовой чат</div>
            <div id="voiceUsersList" class="voice-users-list"></div>
        </div>
    `;
</script>
</body>
</html>
