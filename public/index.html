<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Mini Chat</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0e1621;
    color: white;
}

.app {
    display: flex;
    height: 100vh;
}

/* sidebar */
.sidebar {
    width: 260px;
    background: #17212b;
    padding: 10px;
    border-right: 1px solid #0f1a24;
}

#users li {
    background: #0f1a24;
    padding: 8px;
    margin-bottom: 6px;
    border-radius: 8px;
}

/* chat */
.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.msg {
    max-width: 60%;
    padding: 10px 12px;
    border-radius: 12px;
    background: #182533;
}

.name {
    font-size: 12px;
    opacity: 0.6;
    margin-bottom: 3px;
}

/* input */
.input-bar {
    display: flex;
    padding: 10px;
    background: #17212b;
    border-top: 1px solid #0f1a24;
}

.input-bar input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
    border-radius: 10px;
    background: #0f1a24;
    color: white;
}

button {
    margin-left: 8px;
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    background: #2b5278;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #37608c;
}

.topbar {
    background: #17212b;
    padding: 10px;
    border-bottom: 1px solid #0f1a24;
}
</style>
</head>

<body>

<div class="topbar">
    <input id="nickname" placeholder="Ник...">
    <button onclick="setNick()">OK</button>
    <button onclick="toggleVoice()">🎤</button>
    <button onclick="startVoiceChat()">📞</button>
</div>

<div class="app">

    <div class="sidebar">
        <h3>👥 Онлайн</h3>
        <ul id="users"></ul>
    </div>

    <div class="chat">

        <div id="messages" class="messages"></div>

        <div class="input-bar">
            <input id="input" placeholder="Сообщение...">
            <button onclick="sendMessage()">➤</button>
        </div>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

/* ENTER */
document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
});

function setNick() {
    const nick = document.getElementById("nickname").value;
    if (nick) socket.emit("set nickname", nick);
}

function sendMessage() {
    const input = document.getElementById("input");
    if (input.value) {
        socket.emit("chat message", input.value);
        input.value = "";
    }
}

/* messages */
function addMessage(msg) {
    const div = document.createElement("div");
    div.classList.add("msg");

    if (msg.type === "text") {
        div.innerHTML = `<div class="name">${msg.name}</div>${msg.text}`;
    }

    if (msg.type === "voice") {
        div.innerHTML = `<div class="name">${msg.name}</div><audio controls src="${msg.audio}"></audio>`;
    }

    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop = 999999;
}

socket.on("chat history", data => data.forEach(addMessage));
socket.on("chat message", msg => addMessage(msg));

socket.on("users list", users => {
    const ul = document.getElementById("users");
    ul.innerHTML = "";
    users.forEach(u => {
        const li = document.createElement("li");
        li.textContent = u;
        ul.appendChild(li);
    });
});

/* 🎤 voice file (10 sec) */
let recorder;
let chunks = [];
let isRecording = false;

async function toggleVoice() {
    if (!isRecording) {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        recorder = new MediaRecorder(stream, {
            mimeType: "audio/webm;codecs=opus"
        });

        chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);

        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: "audio/webm" });
            const url = URL.createObjectURL(blob);
            socket.emit("voice message", url);
        };

        recorder.start();
        isRecording = true;

        setTimeout(() => {
            if (isRecording) {
                recorder.stop();
                isRecording = false;
            }
        }, 10000); // 10 sec max

    } else {
        recorder.stop();
        isRecording = false;
    }
}

/* 🔊 REAL VOICE CHAT (WEBRTC) */
let localStream;
let peers = {};

async function startVoiceChat() {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    socket.emit("join voice");

    socket.on("user-joined-voice", async (id) => {
        const pc = createPeer(id);

        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        socket.emit("offer", { to: id, offer });
    });

    socket.on("offer", async (data) => {
        const pc = createPeer(data.from);

        await pc.setRemoteDescription(data.offer);

        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        socket.emit("answer", { to: data.from, answer });
    });

    socket.on("answer", async (data) => {
        await peers[data.from].setRemoteDescription(data.answer);
    });

    socket.on("ice-candidate", (data) => {
        if (peers[data.from]) {
            peers[data.from].addIceCandidate(data.candidate);
        }
    });
}

function createPeer(id) {
    const pc = new RTCPeerConnection({
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    });

    pc.onicecandidate = e => {
        if (e.candidate) {
            socket.emit("ice-candidate", {
                to: id,
                candidate: e.candidate
            });
        }
    };

    pc.ontrack = e => {
        const audio = new Audio();
        audio.srcObject = e.streams[0];
        audio.play();
    };

    peers[id] = pc;
    return pc;
}
</script>

</body>
</html>
