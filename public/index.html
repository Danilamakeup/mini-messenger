<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — голосовой чат</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: radial-gradient(circle at 20% 30%, #0a0c14, #020308);
    font-family: 'Inter', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    color: #f0f3fa;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #1a1d27; border-radius: 10px; }
::-webkit-scrollbar-thumb { background: #5865f2; border-radius: 10px; }

.app { display: flex; height: 100vh; backdrop-filter: blur(2px); }

.sidebar {
    width: 270px;
    background: rgba(18, 22, 30, 0.85);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255,255,255,0.06);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.logo-area {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #8f9eff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.settings-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    font-size: 20px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    transition: 0.2s;
}

.settings-btn:hover {
    background: #5865f2;
    transform: rotate(90deg);
}

.room {
    padding: 12px 16px;
    margin: 4px 0;
    border-radius: 14px;
    cursor: pointer;
    transition: 0.2s;
    background: rgba(255,255,255,0.02);
    border: 1px solid transparent;
    font-weight: 500;
}

.room:hover {
    background: rgba(88,101,242,0.2);
    border-color: rgba(88,101,242,0.5);
    transform: translateX(4px);
}

.stats {
    margin-top: auto;
    background: rgba(0,0,0,0.3);
    border-radius: 20px;
    padding: 16px;
    font-size: 13px;
}

.current-nick {
    margin-top: 8px;
    font-size: 11px;
    color: #8f9eff;
    word-break: break-all;
}

.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: rgba(8, 10, 18, 0.4);
}

.messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.message-bubble { max-width: 80%; animation: fadeUp 0.2s ease; }
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px);}
    to { opacity: 1; transform: translateY(0);}
}

.message-name {
    font-size: 12px;
    font-weight: 600;
    color: #a6a9c2;
    margin-bottom: 4px;
}

.message-text {
    background: rgba(46, 51, 64, 0.7);
    backdrop-filter: blur(8px);
    padding: 10px 18px;
    border-radius: 24px;
    border-top-left-radius: 6px;
    font-size: 14px;
    width: fit-content;
}

.voice-bubble {
    background: rgba(46, 51, 64, 0.6);
    backdrop-filter: blur(12px);
    padding: 12px 20px;
    border-radius: 34px;
    display: flex;
    align-items: center;
    gap: 14px;
    width: fit-content;
}

audio { border-radius: 40px; height: 36px; background: #10121c; }

.input-panel { padding: 20px 28px 28px; background: linear-gradient(to top, rgba(0,0,0,0.5), transparent); }
.input-wrapper {
    display: flex;
    gap: 12px;
    background: rgba(30, 34, 46, 0.9);
    backdrop-filter: blur(16px);
    border-radius: 60px;
    padding: 6px 6px 6px 20px;
    border: 1px solid rgba(255,255,255,0.1);
}
.input-wrapper input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 14px 0;
    color: white;
    font-size: 15px;
    outline: none;
}
.btn-icon {
    background: rgba(255,255,255,0.05);
    border: none;
    color: white;
    font-size: 20px;
    width: 44px;
    height: 44px;
    border-radius: 40px;
    cursor: pointer;
    transition: 0.15s;
}
.btn-icon:hover { background: #5865f2; transform: scale(1.05); }
.btn-send { background: #5865f2; }
.recording-active { background: #e03a3a; animation: pulse 0.8s infinite; }
@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(224,58,58,0.7); }
    100% { box-shadow: 0 0 0 10px rgba(224,58,58,0); }
}
.speaking { box-shadow: 0 0 0 3px #5865f2, 0 0 0 8px rgba(88,101,242,0.3); transition: 0.06s linear; }
#recTime { font-size: 14px; font-weight: bold; color: #ff8c8c; background: #1e1f2a; padding: 6px 12px; border-radius: 40px; }

.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}
.modal-content {
    background: #1a1d27;
    border-radius: 28px;
    padding: 28px;
    width: 320px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
}
.modal-content input {
    width: 100%;
    padding: 12px;
    margin: 16px 0;
    background: #0f1118;
    border: 1px solid #2c2f3a;
    border-radius: 40px;
    color: white;
    font-size: 14px;
    outline: none;
}
.modal-content button {
    background: #5865f2;
    border: none;
    padding: 10px 20px;
    border-radius: 40px;
    color: white;
    cursor: pointer;
    margin: 5px;
}
.modal-content button:hover { background: #4752c4; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="logo-area">
            <div class="logo">✨ NEXUS</div>
            <button class="settings-btn" onclick="openSettings()">⚙️</button>
        </div>
        <div>
            <div class="room" onclick="join('general')"># general</div>
            <div class="room" onclick="join('gaming')">🎮 gaming</div>
            <div class="room" onclick="join('music')">🎵 music</div>
        </div>
        <div class="stats">
            <div>🌐 Online: <span id="online">0</span></div>
            <div>🎙️ Voice: <span id="voiceOnline">0</span></div>
            <div id="roomUsersList" style="font-size:12px; margin-top:8px;"></div>
            <div class="current-nick" id="currentNickDisplay"></div>
        </div>
    </div>
    <div class="chat">
        <div id="messages" class="messages"></div>
        <div class="input-panel">
            <div class="input-wrapper">
                <input id="input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') send()">
                <button class="btn-icon" id="voiceMsgBtn">🎙️</button>
                <span id="recTime"></span>
                <button class="btn-icon" onclick="joinVoiceChat()">🔊</button>
                <button class="btn-icon" onclick="muteMic()">🎧</button>
                <button class="btn-icon" onclick="leaveVoiceChat()">❌</button>
                <button class="btn-icon btn-send" onclick="send()">➤</button>
            </div>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>⚙️ Настройки</h3>
        <input type="text" id="newNickInput" placeholder="Новый никнейм">
        <button onclick="changeNickname()">Сохранить</button>
        <button onclick="closeSettings()">Отмена</button>
    </div>
</div>

<script>
const socket = io();
let name = localStorage.getItem("name") || prompt("🔮 Твой ник:");
if (!name) name = "Explorer";
localStorage.setItem("name", name);

let currentRoom = "general";
let stream = null;
let peers = {};
let inVoice = false;

const messagesDiv = document.getElementById("messages");
const onlineSpan = document.getElementById("online");
const voiceOnlineSpan = document.getElementById("voiceOnline");
const roomUsersList = document.getElementById("roomUsersList");
const currentNickDisplay = document.getElementById("currentNickDisplay");

function updateNickDisplay() {
    currentNickDisplay.innerText = `👤 ${name}`;
}
updateNickDisplay();

function join(room) {
    currentRoom = room;
    messagesDiv.innerHTML = "";
    socket.emit("join", { name, room });
}

function send() {
    const input = document.getElementById("input");
    if (input.value.trim()) {
        socket.emit("chat", input.value);
        input.value = "";
    }
}

function addMessage(msg) {
    const div = document.createElement("div");
    div.className = "message-bubble";
    if (msg.type === "text") {
        div.innerHTML = `<div class="message-name">${escapeHtml(msg.name)}</div><div class="message-text">${escapeHtml(msg.text)}</div>`;
    } else if (msg.type === "voice") {
        div.innerHTML = `<div class="message-name">🎙️ ${escapeHtml(msg.name)}</div><div class="voice-bubble"><audio controls src="${msg.audio}"></audio></div>`;
    }
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

socket.on("history", msgs => { messagesDiv.innerHTML = ""; msgs.forEach(addMessage); });
socket.on("chat", addMessage);
socket.on("online", n => onlineSpan.innerText = n);
socket.on("voice-count", n => voiceOnlineSpan.innerText = n);
socket.on("room-users", list => { roomUsersList.innerText = "👥 " + list.join(", "); });

// ========== ГОЛОСОВЫЕ СООБЩЕНИЯ (ПОЛНОСТЬЮ ПЕРЕПИСАНО) ==========
let mediaRecorder = null;
let audioChunks = [];
let recordTimer = null;
let recordSeconds = 0;
let recordingStream = null;
let isRecording = false;

const voiceBtn = document.getElementById("voiceMsgBtn");
const recTimeSpan = document.getElementById("recTime");

// Функция начала записи
async function startVoiceRecording() {
    if (isRecording) return;
    
    try {
        recordingStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(recordingStream);
        audioChunks = [];
        
        mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) {
                audioChunks.push(event.data);
            }
        };
        
        mediaRecorder.onstop = async () => {
            if (audioChunks.length === 0) {
                cleanRecording();
                return;
            }
            
            const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
            const formData = new FormData();
            formData.append("audio", audioBlob);
            
            try {
                const response = await fetch("/upload", { method: "POST", body: formData });
                const data = await response.json();
                socket.emit("voice-msg", data.url);
            } catch (err) {
                console.error("Ошибка загрузки:", err);
            }
            
            cleanRecording();
        };
        
        mediaRecorder.start(100);
        isRecording = true;
        recordSeconds = 0;
        recTimeSpan.innerText = "🔴 0с";
        voiceBtn.classList.add("recording-active");
        
        recordTimer = setInterval(() => {
            if (isRecording) {
                recordSeconds++;
                const remaining = 20 - recordSeconds;
                if (remaining <= 0) {
                    stopVoiceRecording();
                } else {
                    recTimeSpan.innerText = `🔴 ${recordSeconds}с / ${remaining}с`;
                }
            }
        }, 1000);
        
    } catch (err) {
        console.error("Ошибка доступа к микрофону:", err);
    }
}

// Функция остановки записи
function stopVoiceRecording() {
    if (!isRecording) return;
    
    if (recordTimer) {
        clearInterval(recordTimer);
        recordTimer = null;
    }
    
    if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
    }
}

// Очистка после записи
function cleanRecording() {
    isRecording = false;
    if (recordTimer) {
        clearInterval(recordTimer);
        recordTimer = null;
    }
    if (recordingStream) {
        recordingStream.getTracks().forEach(track => track.stop());
        recordingStream = null;
    }
    mediaRecorder = null;
    recTimeSpan.innerText = "";
    voiceBtn.classList.remove("recording-active");
}

// События мыши и касания
voiceBtn.addEventListener("mousedown", (e) => {
    e.preventDefault();
    startVoiceRecording();
});

voiceBtn.addEventListener("mouseup", (e) => {
    e.preventDefault();
    if (isRecording) stopVoiceRecording();
});

voiceBtn.addEventListener("mouseleave", (e) => {
    if (isRecording) stopVoiceRecording();
});

// Для мобильных устройств
voiceBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    startVoiceRecording();
});

voiceBtn.addEventListener("touchend", (e) => {
    e.preventDefault();
    if (isRecording) stopVoiceRecording();
});

// ========== НАСТРОЙКИ ==========
function openSettings() {
    document.getElementById("settingsModal").style.display = "flex";
    document.getElementById("newNickInput").value = name;
}

function closeSettings() {
    document.getElementById("settingsModal").style.display = "none";
}

function changeNickname() {
    const newNick = document.getElementById("newNickInput").value.trim();
    if (newNick && newNick !== name) {
        name = newNick;
        localStorage.setItem("name", name);
        updateNickDisplay();
        socket.emit("join", { name, room: currentRoom });
        closeSettings();
    }
}

// ========== ГОЛОСОВОЙ ЧАТ ==========
async function joinVoiceChat() {
    if (inVoice) return;
    inVoice = true;
    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const ctx = new AudioContext();
        const src = ctx.createMediaStreamSource(stream);
        const analyser = ctx.createAnalyser();
        src.connect(analyser);
        const data = new Uint8Array(analyser.frequencyBinCount);
        function checkVolume() {
            if (!inVoice) return;
            analyser.getByteFrequencyData(data);
            const vol = data.reduce((a,b)=>a+b,0)/data.length;
            if (vol > 20) document.body.classList.add("speaking");
            else document.body.classList.remove("speaking");
            requestAnimationFrame(checkVolume);
        }
        checkVolume();
        socket.emit("voice-join", currentRoom);
    } catch(e) { inVoice = false; }
}

socket.on("voice-user", id => { if (stream) createPeer(id, true); });
socket.on("user-joined", id => { if (stream) createPeer(id, false); });
socket.on("signal", ({ from, data }) => {
    if (!peers[from]) createPeer(from, false);
    peers[from]?.signal(data);
});

function createPeer(id, init) {
    const peer = new SimplePeer({ 
        initiator: init, 
        trickle: false, 
        stream, 
        config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] } 
    });
    peer.on("signal", data => socket.emit("signal", { to: id, data }));
    peer.on("stream", remote => { const a = new Audio(); a.srcObject = remote; a.autoplay = true; });
    peer.on("close", () => delete peers[id]);
    peers[id] = peer;
}

function leaveVoiceChat() {
    inVoice = false;
    Object.values(peers).forEach(p => p.destroy());
    peers = {};
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = null;
    document.body.classList.remove("speaking");
    socket.emit("voice-leave", currentRoom);
}

function muteMic() { 
    if (stream) stream.getAudioTracks().forEach(t => t.enabled = !t.enabled); 
}

join("general");
</script>
</body>
</html>
