<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS — Полный ультимативный чат</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Тёмная тема (по умолчанию) */
        body.dark {
            background: #0a0c14;
            color: #e1e7f0;
        }
        body.dark .sidebar { background: #11131c; border-right-color: #1e2029; }
        body.dark .server-header { background: #151721; border-bottom-color: #1e2029; }
        body.dark .room:hover { background: #1e2029; color: #e1e7f0; }
        body.dark .room.active { background: #2b2d31; color: #fff; }
        body.dark .user-section { background: #0e1017; border-top-color: #1e2029; }
        body.dark .stats { background: #151721; }
        body.dark .current-user { background: #151721; }
        body.dark .chat { background: #0f1117; }
        body.dark .chat-header { background: #11131c; border-bottom-color: #1e2029; }
        body.dark .message-group:hover { background: #151721; }
        body.dark .message-text { color: #e1e7f0; }
        body.dark .input-panel { background: #0f1117; }
        body.dark .input-wrapper { background: #1a1d2e; border-color: #2c2f3a; }
        body.dark .voice-user { background: #151721; }
        body.dark .voice-user:hover { background: #1e2029; }
        
        /* Светлая тема */
        body.light {
            background: #f2f3f5;
            color: #2c2f33;
        }
        body.light .sidebar { background: #ffffff; border-right-color: #e3e5e8; }
        body.light .server-header { background: #f6f6f7; border-bottom-color: #e3e5e8; color: #2c2f33; }
        body.light .room { color: #4f545c; }
        body.light .room:hover { background: #e3e5e8; color: #2c2f33; }
        body.light .room.active { background: #e3e5e8; color: #2c2f33; }
        body.light .user-section { background: #f6f6f7; border-top-color: #e3e5e8; }
        body.light .stats { background: #ffffff; color: #2c2f33; }
        body.light .current-user { background: #ffffff; }
        body.light .chat { background: #ffffff; }
        body.light .chat-header { background: #f6f6f7; border-bottom-color: #e3e5e8; color: #2c2f33; }
        body.light .message-group:hover { background: #f6f6f7; }
        body.light .message-text { color: #2c2f33; }
        body.light .input-panel { background: #ffffff; }
        body.light .input-wrapper { background: #e3e5e8; border-color: #c4c9d1; }
        body.light .input-wrapper input { color: #2c2f33; }
        body.light .voice-user { background: #f6f6f7; color: #2c2f33; }
        body.light .voice-user:hover { background: #e3e5e8; }
        body.light .voice-channel-title { color: #4f545c; }
        body.light .login-box { background: #ffffff; border-color: #e3e5e8; }
        body.light .login-box input { background: #f6f6f7; border-color: #e3e5e8; color: #2c2f33; }
        body.light .settings-box { background: #ffffff; border-color: #e3e5e8; }
        body.light .settings-box input { background: #f6f6f7; border-color: #e3e5e8; color: #2c2f33; }
        
        ::-webkit-scrollbar { width: 6px; }
        body.dark ::-webkit-scrollbar-track { background: #1a1d2e; }
        body.light ::-webkit-scrollbar-track { background: #e3e5e8; }
        ::-webkit-scrollbar-thumb { background: #5865f2; border-radius: 10px; }
        
        .login-modal { position: fixed; inset: 0; backdrop-filter: blur(20px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        body.dark .login-modal { background: rgba(10,12,20,0.95); }
        body.light .login-modal { background: rgba(255,255,255,0.95); }
        .login-box { border-radius: 28px; padding: 32px; width: 340px; text-align: center; border: 1px solid rgba(88,101,242,0.3); }
        body.dark .login-box { background: linear-gradient(135deg, #1a1d2e, #0f111c); }
        body.light .login-box { background: #ffffff; }
        .login-box h2 { margin-bottom: 20px; background: linear-gradient(135deg, #fff, #8f9eff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .login-box input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 16px; }
        body.dark .login-box input { background: #0f1118; border: 1px solid #2c2f3a; color: white; }
        body.light .login-box input { background: #f6f6f7; border: 1px solid #e3e5e8; color: #2c2f33; }
        .login-box input:focus { outline: none; border-color: #5865f2; }
        .login-box button { background: #5865f2; border: none; padding: 12px 24px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; }
        .switch-mode { margin-top: 16px; font-size: 13px; color: #8f9eff; cursor: pointer; }
        .login-error { color: #e03a3a; margin-top: 12px; font-size: 13px; }
        
        .app { display: flex; height: 100%; }
        .sidebar { width: 260px; display: flex; flex-direction: column; transition: transform 0.2s; z-index: 10; border-right: 1px solid; }
        .server-header { padding: 18px 16px; font-weight: 700; border-bottom: 1px solid; }
        .rooms-list { flex: 1; padding: 12px; }
        .room { padding: 10px 12px; margin: 4px 0; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.1s; }
        .room.notification { border: 1px solid #5865f2; box-shadow: 0 0 8px rgba(88,101,242,0.3); background: rgba(88,101,242,0.1); }
        
        .voice-channel { margin-top: 20px; border-top: 1px solid; padding-top: 12px; }
        .voice-channel-title { font-size: 12px; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        body.dark .voice-channel-title { color: #8e9297; }
        body.light .voice-channel-title { color: #4f545c; }
        .voice-users-list { display: flex; flex-direction: column; gap: 6px; }
        .voice-user { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 10px; cursor: pointer; transition: 0.1s; }
        .voice-user-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        .voice-user-name { font-size: 13px; font-weight: 500; }
        .voice-speaking { box-shadow: 0 0 0 2px #5865f2; background: #2b2d31; }
        
        .user-section { padding: 16px; border-top: 1px solid; }
        .stats { padding: 12px; border-radius: 16px; margin-bottom: 12px; font-size: 13px; }
        .stat-value { color: #8f9eff; font-weight: bold; }
        .current-user { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 16px; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #5865f2; }
        
        .sound-settings { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; padding: 8px 0; border-top: 1px solid; }
        .theme-settings { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; }
        .switch { position: relative; display: inline-block; width: 46px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #2b2d31; transition: 0.2s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: 0.2s; border-radius: 50%; }
        input:checked + .slider { background-color: #5865f2; }
        input:checked + .slider:before { transform: translateX(24px); }
        
        .chat { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 16px 20px; border-bottom: 1px solid; font-weight: 600; }
        .messages { flex: 1; overflow-y: auto; padding: 16px 0; }
        
        .message-group { padding: 10px 20px; display: flex; gap: 16px; transition: background 0.1s; position: relative; }
        .message-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #5865f2; flex-shrink: 0; }
        .message-content { flex: 1; }
        .message-header { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
        .message-author { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 6px; }
        .message-time { font-size: 11px; color: #6e727a; }
        .message-text { font-size: 14px; line-height: 1.4; }
        .media-preview { max-width: 300px; max-height: 200px; border-radius: 16px; margin-top: 6px; cursor: pointer; }
        .voice-bubble { padding: 8px 16px; border-radius: 20px; display: inline-block; margin-top: 4px; }
        body.dark .voice-bubble { background: #1e2029; }
        body.light .voice-bubble { background: #e3e5e8; }
        audio { border-radius: 30px; height: 34px; }
        body.dark audio { background: #0f1117; }
        body.light audio { background: #f6f6f7; }
        
        .reactions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .reaction { border-radius: 20px; padding: 3px 10px; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
        body.dark .reaction { background: #1e2029; }
        body.light .reaction { background: #e3e5e8; color: #2c2f33; }
        .reaction:hover { background: #2b2d31; }
        .message-menu { position: absolute; right: 20px; top: 8px; border-radius: 12px; padding: 5px; display: none; gap: 5px; }
        body.dark .message-menu { background: #1e2029; }
        body.light .message-menu { background: #e3e5e8; }
        .message-group:hover .message-menu { display: flex; }
        .menu-btn { background: none; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
        body.dark .menu-btn { color: #e1e7f0; }
        body.light .menu-btn { color: #2c2f33; }
        .menu-btn:hover { background: #e03a3a; color: white; }
        
        .input-panel { padding: 16px 20px 24px; }
        .input-wrapper { display: flex; gap: 10px; border-radius: 44px; padding: 6px 6px 6px 20px; border: 1px solid; }
        .input-wrapper input { flex: 1; background: transparent; border: none; padding: 12px 0; outline: none; }
        .btn-icon { border: none; font-size: 18px; width: 42px; height: 42px; border-radius: 30px; cursor: pointer; }
        body.dark .btn-icon { background: #2b2d31; color: white; }
        body.light .btn-icon { background: #e3e5e8; color: #2c2f33; }
        .btn-icon:hover { background: #5865f2; color: white; }
        .btn-send { background: #5865f2; color: white; }
        .recording-active { background: #e03a3a; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        .speaking { box-shadow: 0 0 0 2px #5865f2; transition: 0.05s; }
        .wave-container { display: inline-flex; align-items: center; gap: 3px; margin-left: 8px; }
        .wave { width: 3px; height: 12px; background: #ff6666; border-radius: 2px; animation: waveAnim 0.5s infinite alternate; }
        @keyframes waveAnim { from { transform: scaleY(0.5); } to { transform: scaleY(1.5); } }
        @keyframes rgbText { 0% { color: #ff0000; } 33% { color: #00ff00; } 66% { color: #0088ff; } 100% { color: #ff0000; } }
        .rgb-role { animation: rgbText 1.5s infinite linear; font-weight: bold; }
        
        .settings-modal { display: none; position: fixed; inset: 0; backdrop-filter: blur(12px); justify-content: center; align-items: center; z-index: 1000; }
        body.dark .settings-modal { background: rgba(0,0,0,0.8); }
        body.light .settings-modal { background: rgba(255,255,255,0.8); }
        .settings-box { border-radius: 28px; padding: 28px; width: 320px; text-align: center; border: 1px solid rgba(88,101,242,0.3); }
        body.dark .settings-box { background: linear-gradient(135deg, #1a1d2e, #0f111c); }
        body.light .settings-box { background: #ffffff; }
        .settings-box input { width: 100%; padding: 12px; margin: 12px 0; border-radius: 16px; }
        body.dark .settings-box input { background: #0f1118; border: 1px solid #2c2f3a; color: white; }
        body.light .settings-box input { background: #f6f6f7; border: 1px solid #e3e5e8; color: #2c2f33; }
        .settings-box button { background: #5865f2; border: none; padding: 10px 20px; border-radius: 40px; color: white; margin: 5px; cursor: pointer; }
        
        .voice-control-buttons { display: flex; gap: 5px; margin-top: 8px; }
        .voice-control-btn { background: #2b2d31; border: none; padding: 5px 10px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .mic-off { background: #e03a3a; }
        .speaker-off { background: #e03a3a; }
        
        @media (max-width: 700px) {
            .sidebar { position: fixed; left: -260px; top: 0; bottom: 0; z-index: 100; }
            .sidebar.open { left: 0; }
            .menu-toggle { display: flex; position: fixed; bottom: 20px; left: 20px; z-index: 101; background: #5865f2; border: none; width: 48px; height: 48px; border-radius: 30px; align-items: center; justify-content: center; font-size: 24px; color: white; }
            .message-menu { display: flex; position: static; margin-top: 6px; background: none; gap: 8px; }
        }
        @media (min-width: 701px) { .menu-toggle { display: none; } }
    </style>
</head>
<body class="dark">

<div id="loginModal" class="login-modal">
    <div class="login-box">
        <h2 id="formTitle">🔐 Вход</h2>
        <input type="text" id="loginUsername" placeholder="Никнейм">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button id="submitBtn">Войти</button>
        <div class="switch-mode" id="switchMode">Нет аккаунта? Зарегистрироваться</div>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<div class="app" style="display: none;" id="app">
    <div class="sidebar" id="sidebar">
        <div class="server-header">✨ NEXUS</div>
        <div class="rooms-list" id="roomsList">
            <div class="room" data-room="general" onclick="joinRoom('general')"># general</div>
            <div class="room" data-room="gaming" onclick="joinRoom('gaming')">🎮 gaming</div>
            <div class="room" data-room="music" onclick="joinRoom('music')">🎵 music</div>
            <div class="room" data-room="other-fuckin-shit" onclick="joinRoom('other-fuckin-shit')">💩 other-fuckin-shit</div>
            
            <div class="voice-channel">
                <div class="voice-channel-title">🔊 ГОЛОСОВЫЕ КАНАЛЫ</div>
                <div class="room" data-room="voice-chat" onclick="joinVoiceChannel('voice-chat')">🎤 Голосовой чат</div>
                <div id="voiceUsersList" class="voice-users-list" style="margin-top: 8px;"></div>
            </div>
        </div>
        <div class="user-section">
            <div class="stats">
                <div>🌐 Online: <span class="stat-value" id="online">0</span></div>
                <div>🎙️ Voice: <span class="stat-value" id="voiceOnline">0</span></div>
                <div id="roomUsersList" style="font-size:12px; margin-top:8px;"></div>
            </div>
            <div class="current-user">
                <img class="avatar" id="myAvatar" src="">
                <div>
                    <div id="currentNickDisplay" style="font-weight:600;"></div>
                    <div id="currentRoleDisplay" style="font-size:11px;"></div>
                </div>
                <label style="margin-left:auto; background:#2b2d31; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;">📷<input type="file" id="avatarInput" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none;"></label>
                <button onclick="openSettings()" style="background:#2b2d31; border:none; width:32px; height:32px; border-radius:50%; cursor:pointer;">⚙️</button>
            </div>
            <div class="theme-settings">
                <span>🌓 Тема (светлая/тёмная)</span>
                <label class="switch">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
    </div>

    <div class="chat">
        <div class="chat-header"># <span id="currentRoomName">general</span></div>
        <div id="messages" class="messages"></div>
        <div class="input-panel">
            <div class="input-wrapper">
                <input id="input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendText()">
                <label class="btn-icon" style="display:inline-flex; align-items:center; justify-content:center; cursor:pointer;">📎<input type="file" id="mediaInput" accept="image/*,video/*,audio/*" style="display:none;"></label>
                <div class="voice-controls">
                    <button class="btn-icon" id="recordBtn">🎙️</button>
                    <button class="btn-icon" id="cancelVoiceBtn" style="display:none; background:#e03a3a;">❌</button>
                    <span id="recTimer"></span>
                    <div id="waveVisual" class="wave-container" style="display:none;"><div class="wave"></div><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>
                </div>
                <button class="btn-icon btn-send" onclick="sendText()">➤</button>
            </div>
        </div>
    </div>
</div>

<button class="menu-toggle" onclick="toggleSidebar()">☰</button>

<div id="settingsModal" class="settings-modal">
    <div class="settings-box">
        <h3>⚙️ Сменить ник</h3>
        <input type="text" id="newNickInput" placeholder="Новый никнейм">
        <input type="password" id="passwordForNick" placeholder="Ваш пароль">
        <button onclick="changeNickname()">Сохранить</button>
        <button onclick="closeSettings()">Отмена</button>
    </div>
</div>

<script>
    // ========== ПЕРЕМЕННЫЕ ==========
    let currentUser = null, currentRole = null, currentAvatar = null, currentRoom = "general", socket = null;
    let roomNotifications = {};
    let voiceStream = null, voicePeers = {}, inVoiceChannel = false, currentVoiceChannel = null;
    let isMicMuted = false, isSpeakerMuted = false;
    
    const loginModal = document.getElementById("loginModal");
    const appDiv = document.getElementById("app");
    const loginError = document.getElementById("loginError");
    
    // ========== ТЕМА ==========
    let isDarkTheme = localStorage.getItem("theme") !== "light";
    function applyTheme() {
        const body = document.body;
        if (isDarkTheme) {
            body.classList.remove("light");
            body.classList.add("dark");
            document.getElementById("themeToggle").checked = false;
        } else {
            body.classList.remove("dark");
            body.classList.add("light");
            document.getElementById("themeToggle").checked = true;
        }
        localStorage.setItem("theme", isDarkTheme ? "dark" : "light");
    }
    document.getElementById("themeToggle").addEventListener("change", (e) => {
        isDarkTheme = !e.target.checked;
        applyTheme();
    });
    applyTheme();
    
    // ========== АВТОЛОГИН ==========
    const savedSession = localStorage.getItem("nexus_session");
    if (savedSession) {
        try {
            const { username, password } = JSON.parse(savedSession);
            fetch("/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username, password }) })
                .then(res => res.json()).then(data => {
                    if (data.success) {
                        currentUser = username; currentRole = data.role; currentAvatar = data.avatar;
                        loginModal.style.display = "none"; appDiv.style.display = "flex";
                        initSocket();
                        document.getElementById("currentNickDisplay").innerText = currentUser;
                        updateRoleUI(currentRole);
                        document.getElementById("myAvatar").src = currentAvatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser)}&background=5865f2&color=fff&size=36`;
                    } else { localStorage.removeItem("nexus_session"); }
                });
        } catch(e) { localStorage.removeItem("nexus_session"); }
    }
    
    function saveSession(username, password) { localStorage.setItem("nexus_session", JSON.stringify({ username, password })); }
    
    // ========== ЛОГИН/РЕГИСТРАЦИЯ ==========
    let isLoginMode = true;
    const formTitle = document.getElementById("formTitle");
    const submitBtn = document.getElementById("submitBtn");
    const switchMode = document.getElementById("switchMode");
    
    switchMode.onclick = () => {
        isLoginMode = !isLoginMode;
        formTitle.innerText = isLoginMode ? "🔐 Вход" : "📝 Регистрация";
        switchMode.innerText = isLoginMode ? "Нет аккаунта? Зарегистрироваться" : "Уже есть аккаунт? Войти";
        loginError.innerText = "";
    };
    
    submitBtn.onclick = async () => {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value.trim();
        if (!username || !password) { loginError.innerText = "Заполните все поля"; return; }
        
        const endpoint = isLoginMode ? "/login" : "/register";
        const res = await fetch(endpoint, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (res.ok) {
            currentUser = username; currentRole = data.role; currentAvatar = data.avatar || null;
            saveSession(username, password);
            loginModal.style.display = "none"; appDiv.style.display = "flex";
            initSocket();
            document.getElementById("currentNickDisplay").innerText = currentUser;
            updateRoleUI(currentRole);
            document.getElementById("myAvatar").src = currentAvatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser)}&background=5865f2&color=fff&size=36`;
        } else { loginError.innerText = data.error; }
    };
    
    // ========== АВАТАРКА ==========
    document.getElementById("avatarInput").onchange = async (e) => {
        const file = e.target.files[0];
        if (!file || !file.type.match(/image\/(jpeg|png|gif|webp)/)) { alert("Можно только PNG, JPG, GIF, WEBP!"); return; }
        const fd = new FormData(); fd.append("avatar", file); fd.append("username", currentUser);
        const res = await fetch("/upload-avatar", { method: "POST", body: fd });
        const data = await res.json();
        if (data.url) { currentAvatar = data.url; document.getElementById("myAvatar").src = currentAvatar; }
    };
    
    // ========== МЕДИА ==========
    document.getElementById("mediaInput").onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 15 * 1024 * 1024) { alert("❌ Файл больше 15 МБ!"); return; }
        const fd = new FormData(); fd.append("file", file);
        const res = await fetch("/upload-media", { method: "POST", body: fd });
        const data = await res.json();
        if (data.url) socket.emit("media", data.url, data.fileType);
        else alert("Ошибка загрузки");
    };
    
    // ========== УПРАВЛЕНИЕ МИКРОФОНОМ И ДИНАМИКОМ ==========
    function toggleMic() {
        if (!voiceStream) return;
        isMicMuted = !isMicMuted;
        voiceStream.getAudioTracks().forEach(track => track.enabled = !isMicMuted);
        const micBtn = document.getElementById("micToggleBtn");
        if (micBtn) {
            micBtn.innerText = isMicMuted ? "🎤🔇" : "🎤🎙️";
            micBtn.classList.toggle("mic-off", isMicMuted);
        }
    }
    
    function toggleSpeaker() {
        isSpeakerMuted = !isSpeakerMuted;
        // Mute всех удалённых аудио потоков
        for (let id in voicePeers) {
            // В simple-peer нет прямого метода, но можно пересоздать?
        }
        const speakerBtn = document.getElementById("speakerToggleBtn");
        if (speakerBtn) {
            speakerBtn.innerText = isSpeakerMuted ? "🔊🔇" : "🔊🔈";
            speakerBtn.classList.toggle("speaker-off", isSpeakerMuted);
        }
    }
    
    // ========== ГОЛОСОВАЯ КОМНАТА ==========
    async function joinVoiceChannel(channelName) {
        if (inVoiceChannel && currentVoiceChannel === channelName) {
            leaveVoiceChannel();
            return;
        }
        
        if (inVoiceChannel) leaveVoiceChannel();
        
        currentVoiceChannel = channelName;
        inVoiceChannel = true;
        
        try {
            voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            socket.emit("join-voice-channel", channelName);
            
            // Добавляем кнопки управления микрофоном и динамиком в интерфейс
            const voiceUsersList = document.getElementById("voiceUsersList");
            const controlsDiv = document.createElement("div");
            controlsDiv.className = "voice-control-buttons";
            controlsDiv.id = "voiceControls";
            controlsDiv.innerHTML = `
                <button id="micToggleBtn" class="voice-control-btn" onclick="toggleMic()">🎤🎙️</button>
                <button id="speakerToggleBtn" class="voice-control-btn" onclick="toggleSpeaker()">🔊🔈</button>
            `;
            voiceUsersList.parentNode.insertBefore(controlsDiv, voiceUsersList.nextSibling);
            
            socket.on("voice-user", (userId) => { if (voiceStream) createVoicePeer(userId, true); });
            socket.on("user-joined", (userId) => { if (voiceStream) createVoicePeer(userId, false); });
            
            const ctx = new AudioContext();
            const src = ctx.createMediaStreamSource(voiceStream);
            const analyser = ctx.createAnalyser();
            src.connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);
            setInterval(() => {
                if (inVoiceChannel) {
                    analyser.getByteFrequencyData(data);
                    const vol = data.reduce((a,b)=>a+b,0)/data.length;
                    if (vol > 20) document.body.classList.add("speaking");
                    else document.body.classList.remove("speaking");
                }
            }, 100);
            
            socket.on("voice-users-update", (users) => {
                const container = document.getElementById("voiceUsersList");
                if (!container) return;
                container.innerHTML = users.map(user => `
                    <div class="voice-user" data-username="${user.username}">
                        <img class="voice-user-avatar" src="${user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.username)}&background=5865f2&color=fff&size=28`}">
                        <span class="voice-user-name">${escapeHtml(user.username)}</span>
                    </div>
                `).join("");
                document.getElementById("voiceOnline").innerText = users.length;
            });
            
            socket.on("voice-count", (count) => { document.getElementById("voiceOnline").innerText = count; });
            
        } catch(e) { console.error("Микрофон не доступен", e); inVoiceChannel = false; }
    }
    
    function createVoicePeer(id, init) {
        if (!voiceStream) return;
        let peer = new SimplePeer({
            initiator: init,
            trickle: false,
            stream: voiceStream,
            config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] }
        });
        peer.on("signal", data => socket.emit("signal", { to: id, data }));
        peer.on("stream", remote => { 
            let a = new Audio(); 
            a.srcObject = remote; 
            a.autoplay = true;
            if (isSpeakerMuted) a.volume = 0;
            else a.volume = 0.8;
        });
        peer.on("close", () => delete voicePeers[id]);
        voicePeers[id] = peer;
    }
    
    function leaveVoiceChannel() {
        if (!inVoiceChannel) return;
        inVoiceChannel = false;
        currentVoiceChannel = null;
        Object.values(voicePeers).forEach(p => p.destroy());
        voicePeers = {};
        if (voiceStream) voiceStream.getTracks().forEach(t => t.stop());
        voiceStream = null;
        document.body.classList.remove("speaking");
        socket.emit("leave-voice-channel");
        socket.off("voice-users-update");
        socket.off("voice-count");
        document.getElementById("voiceUsersList").innerHTML = "";
        document.getElementById("voiceOnline").innerText = "0";
        const controls = document.getElementById("voiceControls");
        if (controls) controls.remove();
    }
    
    // ========== SOCKET ==========
    function initSocket() {
        socket = io();
        socket.on("connect", () => socket.emit("auth", { username: currentUser, room: currentRoom }));
        socket.on("auth-error", (msg) => alert(msg));
        socket.on("kick", (msg) => { alert(msg); location.reload(); });
        socket.on("ban", (msg) => { alert(msg); localStorage.removeItem("nexus_session"); location.reload(); });
        socket.on("mute", (msg) => alert(msg));
        
        socket.on("user-data", ({ username, role, avatar }) => {
            document.getElementById("currentNickDisplay").innerText = username;
            updateRoleUI(role);
            if (avatar) document.getElementById("myAvatar").src = avatar;
        });
        
        socket.on("history", (msgs) => { document.getElementById("messages").innerHTML = ""; msgs.forEach(msg => addMessageToUI(msg)); });
        socket.on("chat", (msg) => {
            addMessageToUI(msg);
            if (msg.author !== currentUser && msg.room !== currentRoom) {
                const roomEl = document.querySelector(`.room[data-room="${msg.room}"]`);
                if (roomEl) roomEl.classList.add("notification");
                roomNotifications[msg.room] = true;
            }
        });
        socket.on("message-deleted", ({ msgId }) => document.querySelector(`.message-group[data-msg-id="${msgId}"]`)?.remove());
        socket.on("reaction-updated", ({ msgId, reactions }) => {
            const msgDiv = document.querySelector(`.message-group[data-msg-id="${msgId}"]`);
            if (msgDiv) {
                let reactionsDiv = msgDiv.querySelector('.reactions');
                if (reactionsDiv) {
                    let html = '';
                    for (let [emoji, users] of Object.entries(reactions)) html += `<div class="reaction" onclick="addReaction('${msgId}','${emoji}')">${emoji} <span class="reaction-count">${users.length}</span></div>`;
                    reactionsDiv.innerHTML = html;
                }
            }
        });
        socket.on("online", n => document.getElementById("online").innerText = n);
        socket.on("room-users", list => document.getElementById("roomUsersList").innerHTML = "👥 " + (list ? list.join(", ") : ""));
        socket.on("clear-chat", () => document.getElementById("messages").innerHTML = "");
        socket.on("new-room", (roomName) => {
            const roomsList = document.getElementById("roomsList");
            const newRoom = document.createElement("div");
            newRoom.className = "room";
            newRoom.setAttribute("data-room", roomName);
            newRoom.setAttribute("onclick", `joinRoom('${roomName}')`);
            newRoom.innerHTML = `# ${roomName}`;
            roomsList.insertBefore(newRoom, roomsList.querySelector(".voice-channel"));
        });
        socket.on("delete-room", (roomName) => {
            document.querySelector(`.room[data-room="${roomName}"]`)?.remove();
            if (currentRoom === roomName) joinRoom("general");
        });
        
        socket.on("signal", ({ from, data }) => {
            if (!voicePeers[from]) createVoicePeer(from, false);
            voicePeers[from]?.signal(data);
        });
    }
    
    function joinRoom(room) {
        currentRoom = room;
        document.getElementById("currentRoomName").innerText = room;
        document.querySelectorAll(".room").forEach(r => r.classList.remove("active", "notification"));
        const roomEl = document.querySelector(`.room[data-room="${room}"]`);
        if (roomEl) roomEl.classList.add("active");
        roomNotifications[room] = false;
        document.getElementById("messages").innerHTML = "";
        socket.emit("auth", { username: currentUser, room });
        if (window.innerWidth <= 700) toggleSidebar();
    }
    
    function sendText() {
        let input = document.getElementById("input");
        if (input.value.trim()) { socket.emit("chat", input.value); input.value = ""; }
    }
    
    function deleteMessage(msgId, author) {
        let canDelete = currentRole === "владелец" || currentRole === "админ" || currentRole === "модер" || author === currentUser;
        if (canDelete) socket.emit("delete-message", { room: currentRoom, msgId });
    }
    
    function addReaction(msgId, emoji) { socket.emit("add-reaction", { room: currentRoom, msgId, emoji }); }
    
    function addMessageToUI(msg) {
        const container = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "message-group";
        div.setAttribute("data-msg-id", msg.id);
        
        const avatarUrl = msg.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(msg.author)}&background=5865f2&color=fff&size=40`;
        const roleTag = `<span class="role-tag" style="${msg.role === 'владелец' ? 'animation: rgbText 1.5s infinite linear;' : ''}">${msg.role}</span>`;
        
        let contentHtml = '';
        if (msg.type === 'text') contentHtml = `<div class="message-text">${escapeHtml(msg.text)}</div>`;
        else if (msg.type === 'voice') contentHtml = `<div class="voice-bubble"><audio controls src="${msg.audio}"></audio></div>`;
        else if (msg.type === 'media') {
            if (msg.mediaType === 'video') contentHtml = `<video controls class="media-preview" src="${msg.mediaUrl}"></video>`;
            else if (msg.mediaType === 'audio') contentHtml = `<audio controls src="${msg.mediaUrl}"></audio>`;
            else contentHtml = `<img class="media-preview" src="${msg.mediaUrl}" onclick="window.open('${msg.mediaUrl}')">`;
        }
        
        let reactionsHtml = '';
        if (msg.reactions) {
            for (let [emoji, users] of Object.entries(msg.reactions)) {
                reactionsHtml += `<div class="reaction" onclick="addReaction('${msg.id}','${emoji}')">${emoji} <span class="reaction-count">${users.length}</span></div>`;
            }
        }
        
        div.innerHTML = `
            <img class="message-avatar" src="${avatarUrl}">
            <div class="message-content">
                <div class="message-header">
                    <div class="message-author">${escapeHtml(msg.author)} ${roleTag}</div>
                    <div class="message-time">${new Date(msg.time).toLocaleTimeString()}</div>
                </div>
                ${contentHtml}
                <div class="reactions">${reactionsHtml}</div>
            </div>
            <div class="message-menu"><button class="menu-btn" onclick="deleteMessage('${msg.id}','${msg.author}')">🗑️</button></div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function updateRoleUI(role) { currentRole = role; const span = document.getElementById("currentRoleDisplay"); span.innerHTML = role; if (role === "владелец") span.classList.add("rgb-role"); else span.classList.remove("rgb-role"); }
    
    // ========== ЗАПИСЬ ГОЛОСА ==========
    let mediaRec = null, isRecording = false, audioCtx = null, recordedSamples = [], recordTimer = null;
    const recordBtn = document.getElementById("recordBtn"), cancelBtn = document.getElementById("cancelVoiceBtn"), recTimerSpan = document.getElementById("recTimer"), waveVisual = document.getElementById("waveVisual");
    
    async function startRecording() {
        if (isRecording) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new AudioContext();
            const source = audioCtx.createMediaStreamSource(stream);
            const processor = audioCtx.createScriptProcessor(4096, 1, 1);
            recordedSamples = [];
            processor.onaudioprocess = (e) => { if (isRecording) recordedSamples.push(new Float32Array(e.inputBuffer.getChannelData(0))); };
            source.connect(processor); processor.connect(audioCtx.destination);
            isRecording = true;
            recordBtn.classList.add("recording-active"); recordBtn.innerText = "⏹️";
            cancelBtn.style.display = "inline-flex"; waveVisual.style.display = "inline-flex";
            let seconds = 0;
            recordTimer = setInterval(() => {
                seconds++;
                recTimerSpan.innerText = `🔴 ${seconds}s / 20s`;
                if (seconds >= 20) stopAndSend();
            }, 1000);
        } catch(e) { recTimerSpan.innerText = "❌"; }
    }
    
    function stopAndSend() {
        if (!isRecording) return;
        isRecording = false;
        clearInterval(recordTimer);
        if (audioCtx) audioCtx.close();
        const total = recordedSamples.reduce((a,b)=>a+b.length,0);
        const combined = new Float32Array(total);
        let off = 0;
        for (let arr of recordedSamples) { combined.set(arr, off); off += arr.length; }
        if (combined.length > 3000) {
            const int16 = new Int16Array(combined.length);
            for (let i = 0; i < combined.length; i++) int16[i] = combined[i] * 0x7FFF;
            const mp3encoder = new lamejs.Mp3Encoder(1, 44100, 128);
            let mp3Data = [];
            for (let i = 0; i < int16.length; i += 1152) {
                let chunk = int16.subarray(i, i + 1152);
                let buf = mp3encoder.encodeBuffer(chunk);
                if (buf.length) mp3Data.push(buf);
            }
            let end = mp3encoder.flush();
            if (end.length) mp3Data.push(end);
            const blob = new Blob(mp3Data, { type: "audio/mp3" });
            const fd = new FormData(); fd.append("audio", blob);
            fetch("/upload-audio", { method: "POST", body: fd }).then(res=>res.json()).then(data=> socket.emit("voice-msg", data.url));
        }
        recordBtn.classList.remove("recording-active"); recordBtn.innerText = "🎙️";
        cancelBtn.style.display = "none"; waveVisual.style.display = "none";
        recTimerSpan.innerText = "";
    }
    
    function cancelRecording() {
        if (isRecording) {
            isRecording = false;
            clearInterval(recordTimer);
            if (audioCtx) audioCtx.close();
            recordBtn.classList.remove("recording-active"); recordBtn.innerText = "🎙️";
            cancelBtn.style.display = "none"; waveVisual.style.display = "none";
            recTimerSpan.innerText = "🗑 Отменено";
            setTimeout(() => recTimerSpan.innerText = "", 1000);
        }
    }
    
    recordBtn.onclick = () => { if (isRecording) stopAndSend(); else startRecording(); };
    cancelBtn.onclick = cancelRecording;
    
    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("open"); }
    function openSettings() { document.getElementById("settingsModal").style.display = "flex"; document.getElementById("newNickInput").value = currentUser; document.getElementById("passwordForNick").value = ""; }
    function closeSettings() { document.getElementById("settingsModal").style.display = "none"; }
    async function changeNickname() {
        let newNick = document.getElementById("newNickInput").value.trim();
        let password = document.getElementById("passwordForNick").value;
        if (!newNick || !password) { alert("Введите ник и пароль"); return; }
        const res = await fetch("/change-nick", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ oldUsername: currentUser, newUsername: newNick, password })
        });
        const data = await res.json();
        if (data.success) {
            currentUser = newNick;
            document.getElementById("currentNickDisplay").innerText = currentUser;
            const saved = JSON.parse(localStorage.getItem("nexus_session"));
            saveSession(newNick, saved.password);
            socket.emit("auth", { username: currentUser, room: currentRoom });
            closeSettings();
        } else { alert(data.error); }
    }
