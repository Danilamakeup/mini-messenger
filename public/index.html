<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Discord MAX</title>

<style>
:root{
    --bg:#313338;
    --panel:#2b2d31;
    --text:#fff;
}

.light{
    --bg:#f2f3f5;
    --panel:#fff;
    --text:#000;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Arial;
}

.app{
    display:flex;
    height:100vh;
}

/* sidebar */
.sidebar{
    width:220px;
    background:var(--panel);
    padding:10px;
}

.room{
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.room:hover{
    background:#404249;
}

/* chat */
.chat{
    flex:1;
    display:flex;
    flex-direction:column;
}

.messages{
    flex:1;
    padding:10px;
    overflow:auto;
}

.msg{
    margin-bottom:8px;
}

/* input */
.input{
    display:flex;
    padding:10px;
    background:var(--panel);
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#1e1f22;
    color:white;
}

button{
    margin-left:5px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#5865f2;
    color:white;
}

/* MOBILE */
@media(max-width:700px){
    .sidebar{
        width:70px;
    }

    .room{
        font-size:12px;
        padding:6px;
    }
}
</style>
</head>

<body>

<button onclick="toggleTheme()">🌓</button>

<div class="app">

<div class="sidebar">
    <div class="room" onclick="join('general')">general</div>
    <div class="room" onclick="join('gaming')">gaming</div>
    <div class="room" onclick="join('music')">music</div>

    <hr>
    Online: <span id="online">0</span>
</div>

<div class="chat">

<div id="messages" class="messages"></div>

<div class="input">
    <input id="input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') send()">
    <button onclick="send()">➤</button>
    <button onclick="voiceMsg()">🎤</button>
    <button onclick="joinVoice()">🎧</button>
    <button onclick="leaveVoice()">❌</button>
    <button onclick="mute()">🔇</button>
</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-peer/simplepeer.min.js"></script>

<script>
const socket = io();

let name = localStorage.getItem("name") || prompt("Nick");
localStorage.setItem("name", name);

let room="general";
let stream=null;
let peers={};
let inVoice=false;

// THEME SAVE
if(localStorage.getItem("theme")==="light"){
    document.body.classList.add("light");
}

function toggleTheme(){
    document.body.classList.toggle("light");
    localStorage.setItem("theme",
        document.body.classList.contains("light")?"light":"dark");
}

// JOIN
function join(r){
    room=r;
    messages.innerHTML="";
    socket.emit("join",{name,room});
}

// CHAT
function send(){
    if(input.value){
        socket.emit("chat",input.value);
        input.value="";
    }
}

// RENDER
function add(m){
    const d=document.createElement("div");
    d.className="msg";

    if(m.type==="text"){
        d.innerText=m.name+": "+m.text;
    }

    if(m.type==="voice"){
        const a=document.createElement("audio");
        a.src=m.audio;
        a.controls=true;
        d.innerText=m.name+": ";
        d.appendChild(a);
    }

    messages.appendChild(d);
}

// HISTORY
socket.on("history",msgs=>{
    messages.innerHTML="";
    msgs.forEach(add);
});

socket.on("chat",add);

// VOICE MSG
async function voiceMsg(){
    const s=await navigator.mediaDevices.getUserMedia({audio:true});
    const rec=new MediaRecorder(s);
    let chunks=[];

    rec.ondataavailable=e=>chunks.push(e.data);

    rec.onstop=async()=>{
        const blob=new Blob(chunks,{type:"audio/webm"});
        const fd=new FormData();
        fd.append("audio",blob);

        const res=await fetch("/upload",{method:"POST",body:fd});
        const data=await res.json();

        socket.emit("voice-msg",data.url);
    };

    rec.start();
    setTimeout(()=>rec.stop(),4000);
}

// VOICE CHAT
async function joinVoice(){
    if(inVoice) return;

    inVoice=true;

    stream=await navigator.mediaDevices.getUserMedia({audio:true});
    socket.emit("voice-join",room);
}

function leaveVoice(){
    inVoice=false;

    Object.values(peers).forEach(p=>p.destroy());
    peers={};

    if(stream){
        stream.getTracks().forEach(t=>t.stop());
        stream=null;
    }
}

socket.on("user-joined",id=>{
    createPeer(id,true);
});

socket.on("signal",({from,data})=>{
    if(!peers[from]) createPeer(from,false);
    peers[from].signal(data);
});

function createPeer(id,initiator){

    const peer=new SimplePeer({
        initiator,
        trickle:false,
        stream,
        config:{
            iceServers:[
                {urls:"stun:stun.l.google.com:19302"}
            ]
        }
    });

    peer.on("signal",data=>{
        socket.emit("signal",{to:id,data});
    });

    peer.on("stream",remote=>{
        const a=new Audio();
        a.srcObject=remote;
        a.autoplay=true;
        a.play().catch(()=>{});
    });

    peer.on("close",()=>delete peers[id]);
    peer.on("error",()=>delete peers[id]);

    peers[id]=peer;
}

// ONLINE
socket.on("online",n=>{
    online.innerText=n;
});

join("general");
</script>

</body>
</html>
