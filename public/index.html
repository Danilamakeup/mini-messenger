<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Discord Clone</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #313338;
    color: white;
}

.app {
    display: flex;
    height: 100vh;
}

/* servers */
.servers {
    width: 70px;
    background: #1e1f22;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 10px;
}

.server {
    width: 50px;
    height: 50px;
    background: #5865f2;
    border-radius: 50%;
    margin-bottom: 10px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

/* channels */
.channels {
    width: 240px;
    background: #2b2d31;
    padding: 10px;
}

.channel {
    padding: 8px;
    border-radius: 6px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
}

.channel:hover {
    background:#404249;
}

/* chat */
.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    margin-bottom: 10px;
}

/* input */
.input {
    display:flex;
    padding:10px;
    background:#2b2d31;
    gap:5px;
}

input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#1e1f22;
    color:white;
}

button {
    padding:10px;
    border:none;
    background:#5865f2;
    color:white;
    border-radius:8px;
}

/* notification */
.badge {
    background:red;
    border-radius:10px;
    padding:2px 6px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="app">

<div class="servers">
    <div class="server" onclick="join('general')">G</div>
    <div class="server" onclick="join('gaming')">🎮</div>
    <div class="server" onclick="join('music')">🎵</div>
</div>

<div class="channels">
    <h3>Комнаты</h3>

    <div class="channel" onclick="join('general')">
        general <span id="c-general">0</span>
    </div>

    <div class="channel" onclick="join('gaming')">
        gaming <span id="c-gaming">0</span>
    </div>

    <div class="channel" onclick="join('music')">
        music <span id="c-music">0</span>
    </div>

    <hr>

    <div>🌍 Online: <span id="online">0</span></div>
</div>

<div class="chat">

<div id="messages" class="messages"></div>

<div class="input">
    <input id="input">
    <button onclick="send()">➤</button>
    <button onclick="voice()">🎤</button>
</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let name = localStorage.getItem("name");
if(!name){
    name = prompt("Nick");
    localStorage.setItem("name", name);
}

let room="general";
let unread={};

function join(r){
    room=r;
    messages.innerHTML="";
    socket.emit("join",{name,room});
}

function send(){
    if(input.value){
        socket.emit("chat",input.value);
        input.value="";
    }
}

/* CHAT */
socket.on("chat",msg=>{

    if(msg.type==="voice"){
        const audio=new Audio(msg.audio);
        audio.play();
    }

    const div=document.createElement("div");
    div.innerText=`${msg.name}: ${msg.text||""}`;
    messages.appendChild(div);

    if(room!==msg.room){
        unread[msg.room]=(unread[msg.room]||0)+1;
    }
});

/* ROOM STATS */
socket.on("room stats",stats=>{
    c_general.innerText=stats.general||0;
    c_gaming.innerText=stats.gaming||0;
    c_music.innerText=stats.music||0;
});

/* ONLINE */
socket.on("online count",n=>{
    online.innerText=n;
});

join("general");
</script>

</body>
</html>
