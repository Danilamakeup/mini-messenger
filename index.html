<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Discord Clone</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #313338;
    color: white;
}

/* layout */
.app {
    display: flex;
    height: 100vh;
}

/* servers (левая полоса) */
.servers {
    width: 70px;
    background: #1e1f22;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 10px;
}

.server {
    width: 50px;
    height: 50px;
    background: #5865f2;
    border-radius: 50%;
    margin-bottom: 10px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

/* channels */
.channels {
    width: 220px;
    background: #2b2d31;
    padding: 10px;
}

.channel {
    padding: 8px;
    border-radius: 6px;
    cursor:pointer;
}

.channel:hover {
    background: #404249;
}

/* chat */
.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    margin-bottom: 10px;
}

.name {
    font-weight: bold;
}

/* input */
.input {
    display: flex;
    padding: 10px;
    background: #383a40;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #1e1f22;
    color: white;
}

button {
    margin-left: 5px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #5865f2;
    color: white;
    cursor:pointer;
}

/* mobile */
@media (max-width: 700px) {
    .channels {
        display: none;
    }
}
</style>
</head>

<body>

<div class="app">

<div class="servers">
    <div class="server" onclick="joinRoom('general')">G</div>
    <div class="server" onclick="joinRoom('gaming')">🎮</div>
    <div class="server" onclick="joinRoom('music')">🎵</div>
</div>

<div class="channels">
    <h3>Комнаты</h3>
    <div class="channel" onclick="joinRoom('general')"># general</div>
    <div class="channel" onclick="joinRoom('gaming')"># gaming</div>
    <div class="channel" onclick="joinRoom('music')"># music</div>
</div>

<div class="chat">

<div id="messages" class="messages"></div>

<div class="input">
    <input id="input">
    <button onclick="send()">➤</button>
    <button onclick="toggleMute()">🔇</button>
    <button onclick="toggleDeaf()">🔊</button>
    <button onclick="voice()">🎤</button>
</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let name = localStorage.getItem("name");
if(!name){
    name = prompt("Ник");
    localStorage.setItem("name", name);
}

let room = "general";
let muted = false;
let deaf = false;

/* комнаты */
function joinRoom(r){
    room = r;
    document.getElementById("messages").innerHTML="";
    socket.emit("join",{name, room});
}

/* отправка */
function send(){
    const input = document.getElementById("input");
    if(input.value){
        socket.emit("chat", input.value);
        input.value="";
    }
}

/* ENTER */
document.getElementById("input").addEventListener("keydown",e=>{
    if(e.key==="Enter") send();
});

/* сообщения */
socket.on("chat", msg=>{
    const div = document.createElement("div");
    div.className="msg";

    if(msg.type==="text"){
        div.innerHTML=`<span class="name">${msg.name}:</span> ${msg.text}`;
    }

    if(msg.type==="voice"){
        if(!deaf){
            div.innerHTML=`<span class="name">${msg.name}:</span>
            <audio controls src="${msg.audio}"></audio>`;
        }
    }

    document.getElementById("messages").appendChild(div);
});

/* 🎤 голос */
async function voice(){
    if(muted) return;

    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const rec = new MediaRecorder(stream);

    let chunks=[];

    rec.ondataavailable=e=>chunks.push(e.data);

    rec.onstop=()=>{
        const blob = new Blob(chunks);
        const reader = new FileReader();

        reader.onload=()=>{
            socket.emit("voice", reader.result);
        };

        reader.readAsDataURL(blob);
    };

    rec.start();
    setTimeout(()=>rec.stop(),5000);
}

/* 🔇 mute */
function toggleMute(){
    muted=!muted;
    alert(muted ? "Микрофон выкл" : "Микрофон вкл");
}

/* 🔊 deaf */
function toggleDeaf(){
    deaf=!deaf;
    alert(deaf ? "Звук выкл" : "Звук вкл");
}

/* старт */
joinRoom("general");
</script>

</body>
</html>
