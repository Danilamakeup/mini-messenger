<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b141a;
    color: white;
}

.app {
    display: flex;
    height: 100vh;
}

/* sidebar */
.sidebar {
    width: 250px;
    background: #111b21;
    padding: 10px;
}

.user {
    padding: 8px;
    border-radius: 8px;
    background: #202c33;
    margin-bottom: 5px;
}

/* chat */
.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.msg {
    background: #202c33;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    max-width: 60%;
}

.name {
    font-size: 12px;
    opacity: 0.6;
}

.input {
    display: flex;
    padding: 10px;
    background: #111b21;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #202c33;
    color: white;
}

button {
    margin-left: 5px;
    padding: 10px;
    border: none;
    background: #00a884;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
    <h3>Онлайн</h3>
    <div id="users"></div>
</div>

<div class="chat">

<div id="messages" class="messages"></div>

<div class="input">
    <input id="input" placeholder="Сообщение">
    <button onclick="send()">➤</button>
    <button onclick="voice()">🎤</button>
</div>

</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

/* 💾 НИК СОХРАНЕНИЕ */
let name = localStorage.getItem("name");

if (!name) {
    name = prompt("Введите ник");
    localStorage.setItem("name", name);
}

socket.emit("set name", name);

/* 💬 SEND */
function send() {
    const input = document.getElementById("input");
    if (input.value) {
        socket.emit("chat", input.value);
        input.value = "";
    }
}

/* ENTER */
document.getElementById("input").addEventListener("keydown", e=>{
    if(e.key==="Enter") send();
});

/* 🎤 VOICE FIX (BASE64) */
async function voice() {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const rec = new MediaRecorder(stream);
    let chunks = [];

    rec.ondataavailable = e => chunks.push(e.data);

    rec.onstop = () => {
        const blob = new Blob(chunks);
        const reader = new FileReader();

        reader.onload = () => {
            socket.emit("voice", reader.result);
        };

        reader.readAsDataURL(blob);
    };

    rec.start();

    setTimeout(()=>rec.stop(), 5000); // 5 сек
}

/* 📥 MESSAGES */
function add(msg){
    const div = document.createElement("div");
    div.className = "msg";

    if(msg.type==="text"){
        div.innerHTML = `<div class="name">${msg.name}</div>${msg.text}`;
    }

    if(msg.type==="voice"){
        div.innerHTML = `<div class="name">${msg.name}</div>
        <audio controls src="${msg.audio}"></audio>`;
    }

    document.getElementById("messages").appendChild(div);
}

socket.on("history", data => data.forEach(add));
socket.on("chat", msg => add(msg));

/* 👥 USERS */
socket.on("users", users => {
    const div = document.getElementById("users");
    div.innerHTML = "";

    Object.values(users).forEach(u=>{
        const el = document.createElement("div");
        el.className="user";
        el.innerText = "🟢 " + u.name;
        div.appendChild(el);
    });
});
</script>

</body>
</html>
